function _generateHouseholdCode() {
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no 0/O or 1/I
  var code = "";
  for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];

        _householdCode = cached;
        // Repair: re-sync householdCode back to Firestore so next login (any device) finds it.

function parseRecipeMD(md) {
  if (typeof md !== "string") return null;
  var out = { ingredients: [], steps: [], time: "" };
  var current = null;
  md.split("\n").forEach(function(raw){
    var l = raw.trim();
    if (/^#+\s*ingredients/i.test(l)) { current = "ingredients"; return; }
    if (/^#+\s*steps/i.test(l)) { current = "steps"; return; }
    if (/^#+\s*time/i.test(l)) { current = "time"; return; }
    if (!l) return;
    if (current === "ingredients") out.ingredients.push(l.replace(/^[-*]\s*/, ""));
    else if (current === "steps") out.steps.push(l.replace(/^\d+[\.\)]\s*/, ""));
    else if (current === "time") out.time += (out.time ? " " : "") + l;
  });
  if (!out.ingredients.length && !out.steps.length) return null;
  return out;
}
function filterToPantryIngredients(raw, items) {
  return (raw||[]).map(function(ing){
    var asNum = Number(ing);
    if (!isNaN(asNum) && asNum > 0) {
      var it = (items||[]).find(function(i){ return i.id === asNum || i.id === ing; });
      return it ? it.name : null;
    }
    var sl = normIngName2(ing);
    if (!sl) return null;
    var exact = DEFAULT_ITEMS.find(function(di){ return normIngName2(di.name) === sl; });
    if (exact) return exact.name;
    // whole-word token match — rescues phrases like "Fresh Coriander Leaves" -> "Coriander",
    // "Mint Leaves" -> "Mint", "Spring Onions" -> "Spring Onion", while avoiding loose
    // substring false-positives (e.g. "Herbs" should NOT match "Herbal Tea").
    var slWords = sl.split(/\s+/);
    var fuzzy = DEFAULT_ITEMS.find(function(di){
      var dn = normIngName2(di.name);
      if (dn.length < 3) return false;
      var dnWords = dn.split(/\s+/);
      return dnWords.every(function(w){ return slWords.indexOf(w) >= 0; });
    });

  "Idli Sambar": `## Ingredients\n- Dosa Batter (1 cup, fermented)\n- Toor Dal (½ cup)\n- Tomatoes (2)\n- Sambar Powder (2 tsp)\n- Tamarind Paste (1 tbsp)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (10)\n- Ghee (1 tbsp)\n## Steps\n1. Steam batter in idli moulds 10–12 min until firm.\n2. Pressure cook dal until soft.\n3. In a pot sauté mustard seeds and curry leaves.\n4. Add tomatoes, sambar powder and tamarind, cook 5 min.\n5. Add cooked dal with 1½ cups water, simmer 10 min.\n6. Serve idlis hot with sambar and coconut chutney.\n## Time\nPrep: 8 min · Cook: 25 min`,

  "Palak Paneer": `## Ingredients\n- Paneer (250g)\n- Spinach (400g)\n- Onions (1)\n- Tomatoes (1)\n- Garlic (3 cloves)\n- Ginger (1 inch)\n- Garam Masala (1 tsp)\n- Fresh Cream (2 tbsp)\n## Steps\n1. Blanch spinach 2 min, drain and blend smooth.\n2. Sauté onions until golden, add garlic and ginger.\n3. Add tomatoes and garam masala, cook until oil separates.\n4. Stir in spinach purée, simmer 5 min.\n5. Add paneer cubes, cook 3 min.\n6. Stir in cream and serve with roti or naan.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Rajma Chawal": `## Ingredients\n- Rajma (1 cup, soaked overnight)\n- Basmati Rice (1 cup)\n- Onions (1, chopped)\n- Tomatoes (2, pureed)\n- Garam Masala (2 tsp)\n- Ginger (1 inch)\n- Garlic (3 cloves)\n- Ghee (2 tbsp)\n## Steps\n1. Pressure cook rajma until tender.\n2. Cook basmati rice and keep warm.\n3. Sauté onions in ghee until golden.\n4. Add ginger, garlic and tomato purée, cook 8 min.\n5. Add cooked rajma, garam masala and ½ cup water, simmer 10 min.\n6. Serve rajma over steamed rice with raw onion and pickle.\n## Time\nPrep: 10 min · Cook: 35 min (+ overnight soak)`,

  "Aloo Paratha": `## Ingredients\n- Wheat Flour (2 cups)\n- Potatoes (3, boiled)\n- Ghee (3 tbsp)\n- Cumin Seeds (1 tsp)\n- Green Chilli (1, minced)\n- Coriander (handful)\n## Steps\n1. Knead flour with water and a pinch of salt into soft dough, rest 15 min.\n2. Mash potatoes with cumin seeds, green chilli and coriander.\n3. Divide dough into balls, flatten, stuff with potato filling, seal.\n4. Roll into discs, cook on hot tawa with generous ghee.\n5. Cook 2–3 min per side until golden spots appear.\n6. Serve with yogurt, butter and pickle.\n## Time\nPrep: 25 min · Cook: 20 min`,

  "Tofu Scramble": `## Ingredients\n- Tofu (400g, firm)\n- Nutritional Yeast (2 tbsp)\n- Turmeric Powder (½ tsp)\n- Spinach (2 cups)\n- Mushrooms (150g)\n- Garlic (2 cloves)\n- Soy Sauce (2 tbsp)\n## Steps\n1. Press tofu dry, crumble into chunky pieces.\n2. Sauté garlic and mushrooms in olive oil 3 min.\n3. Add crumbled tofu, cook on high heat 3 min.\n4. Add turmeric, nutritional yeast and soy sauce.\n5. Fold in spinach, cook until wilted.\n6. Serve on toast or with rice.\n## Time\nPrep: 5 min · Cook: 12 min`,

  // ── West Asian ──
  "Shakshuka West Asian": `## Ingredients\n- Eggs (4)\n- Tomatoes (4, chopped)\n- Onions (1)\n- Garlic (3 cloves)\n- Cumin Powder (1 tsp)\n- Smoked Paprika (1 tsp)\n- Harissa (1 tbsp)\n- Olive Oil (2 tbsp)\n## Steps\n1. Sauté onions in olive oil until soft.\n2. Add garlic, cumin and paprika, cook 1 min.\n3. Add harissa and tomatoes, simmer 12 min until sauce thickens.\n4. Make 4 wells, crack an egg into each.\n5. Cover and cook 5–7 min until whites set and yolks are runny.\n6. Serve with pita bread and fresh parsley.\n## Time\nPrep: 5 min · Cook: 25 min`,

  "Falafel Wrap": `## Ingredients\n- Chickpeas (400g, cooked)\n- Pita Bread (4)\n- Cucumber (1)\n- Tomatoes (2)\n- Tahini (4 tbsp)\n- Garlic (2 cloves)\n- Cumin Powder (1 tsp)\n- Parsley (handful)\n## Steps\n1. Blend chickpeas, garlic, cumin, parsley and salt into rough mix.\n2. Shape into balls, refrigerate 15 min.\n3. Shallow-fry falafels 3 min per side until crispy.\n4. Mix tahini with lemon juice and water into smooth sauce.\n5. Warm pita, layer with cucumber, tomatoes and falafels.\n6. Drizzle tahini sauce and serve.\n## Time\nPrep: 25 min · Cook: 10 min`,

  "Tabbouleh": `## Ingredients\n- Bulgur Wheat (1 cup)\n- Parsley (2 bunches)\n- Mint (½ bunch)\n- Tomatoes (3)\n- Onions (½)\n- Lemons (2)\n- Olive Oil (4 tbsp)\n## Steps\n1. Cover bulgur with boiling water, rest 20 min until absorbed.\n2. Finely chop parsley, mint, tomatoes and onion.\n3. Fluff bulgur with fork, cool completely.\n4. Combine all ingredients.\n5. Dress with olive oil and lemon juice, season generously.\n6. Refrigerate 30 min before serving for best flavour.\n## Time\nPrep: 55 min · Cook: 0 min`,

  // ── Mediterranean ──
  "Chicken Souvlaki": `## Ingredients\n- Chicken Breast (500g)\n- Olive Oil (4 tbsp)\n- Lemons (1)\n- Garlic (3 cloves)\n- Oregano (2 tsp)\n- Pita Bread (4)\n- Yogurt (½ cup)\n- Cucumber (½)\n## Steps\n1. Marinate chicken in olive oil, lemon, garlic and oregano 1 hour.\n2. Thread onto skewers, grill 4 min each side.\n3. Mix yogurt with grated cucumber, garlic and salt for tzatziki.\n4. Warm pita on grill 1 min.\n5. Serve chicken in pita with tzatziki, tomatoes and onion.\n## Time\nPrep: 65 min · Cook: 12 min`,

  "Moussaka Style Bake": `## Ingredients\n- Aubergine (2, sliced)\n- Lentils (1 cup)\n- Tomatoes (3)\n- Onions (1)\n- Garlic (3 cloves)\n- Cinnamon (½ tsp)\n- Olive Oil (4 tbsp)\n## Steps\n1. Salt aubergine slices, rest 10 min, pat dry.\n2. Pan-fry aubergine in olive oil until golden, set aside.\n3. Sauté onion and garlic, add tomatoes, cinnamon and cooked lentils.\n4. Simmer meat sauce 10 min.\n5. Layer aubergine then lentil sauce in baking dish, repeat.\n6. Bake at 180°C for 25 min until bubbling.\n## Time\nPrep: 25 min · Cook: 40 min`,

  "Chickpea Tagine": `## Ingredients\n- Chickpeas (400g)\n- Tomatoes (2)\n- Carrots (2, diced)\n- Zucchini (1, diced)\n- Couscous (1 cup)\n- Cumin Powder (2 tsp)\n- Smoked Paprika (1 tsp)\n- Olive Oil (3 tbsp)\n## Steps\n1. Sauté onion and garlic in olive oil.\n2. Add carrots, cumin and paprika, cook 3 min.\n3. Add tomatoes, zucchini and chickpeas, stir well.\n4. Add ½ cup water, cover and simmer 20 min.\n5. Pour boiling water over couscous, cover and rest 5 min, fluff.\n6. Serve tagine over couscous.\n## Time\nPrep: 10 min · Cook: 30 min`,

  // ── Italian ──
  "Spaghetti Aglio e Olio": `## Ingredients\n- Spaghetti (300g)\n- Garlic (6 cloves, sliced)\n- Olive Oil (6 tbsp)\n- Pepper Flakes (1 tsp)\n- Parsley (handful)\n- Parmesan (40g, grated)\n## Steps\n1. Cook spaghetti in salted water until al dente, reserve 1 cup pasta water.\n2. Gently fry garlic and pepper flakes in olive oil until golden — do not burn.\n3. Add ½ cup pasta water to the garlic oil, swirl to emulsify.\n4. Toss hot pasta in the sauce, adding more pasta water as needed.\n5. Season and toss in parsley.\n6. Serve with parmesan.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Mushroom Risotto": `## Ingredients\n- Arborio Rice (300g)\n- Mushrooms (300g, sliced)\n- Parmesan (60g, grated)\n- White Wine (½ cup)\n- Butter (3 tbsp)\n- Onions (1, diced)\n- Garlic (2 cloves)\n## Steps\n1. Sauté onions and garlic in butter until soft.\n2. Add mushrooms, cook until golden.\n3. Add arborio rice, stir 2 min.\n4. Add wine, stir until absorbed.\n5. Add warm stock ladle by ladle over 18–20 min, stirring constantly.\n6. Stir in parmesan and a knob of butter, serve immediately.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Penne Arrabbiata": `## Ingredients\n- Penne (300g)\n- Tomatoes (400g, crushed)\n- Garlic (4 cloves)\n- Pepper Flakes (2 tsp)\n- Olive Oil (4 tbsp)\n- Basil (handful)\n## Steps\n1. Cook penne until al dente, reserve ½ cup pasta water.\n2. Fry garlic and pepper flakes in olive oil until golden.\n3. Add tomatoes, season and simmer 12 min.\n4. Toss pasta in sauce with a splash of pasta water.\n5. Cook together 2 min until sauce coats pasta.\n6. Serve with fresh basil and parmesan.\n## Time\nPrep: 5 min · Cook: 20 min`,

  // ── French Continental ──
  "French Onion Soup": `## Ingredients\n- Onions (4, sliced)\n- Butter (3 tbsp)\n- White Wine (½ cup)\n- Gruyere (100g, grated)\n- White Bread (4 slices)\n- Bay Leaves (2)\n- Thyme (3 sprigs)\n## Steps\n1. Cook onions in butter over low heat 40 min until caramelized.\n2. Add wine, cook 3 min until evaporated.\n3. Add 1L water with bay leaves and thyme, simmer 20 min.\n4. Toast bread slices, top with gruyere and grill until bubbling.\n5. Ladle soup into oven-safe bowls, float cheesy toast on top.\n## Time\nPrep: 5 min · Cook: 65 min`,

  "Ratatouille": `## Ingredients\n- Aubergine (1, diced)\n- Zucchini (2, diced)\n- Capsicum (2, diced)\n- Tomatoes (4)\n- Onions (1)\n- Garlic (4 cloves)\n- Olive Oil (4 tbsp)\n- Thyme (4 sprigs)\n## Steps\n1. Sauté onion and garlic in olive oil until soft.\n2. Add capsicum, cook 4 min.\n3. Add tomatoes, cook until pulpy.\n4. Add aubergine, zucchini and thyme.\n5. Cover and simmer 25 min, stirring occasionally.\n6. Season, serve warm with crusty bread.\n## Time\nPrep: 15 min · Cook: 35 min`,

  "Quiche Lorraine": `## Ingredients\n- All-Purpose Flour (150g)\n- Butter (100g, cold)\n- Eggs (4)\n- Fresh Cream (200ml)\n- Bacon (150g)\n- Gruyere (80g, grated)\n## Steps\n1. Rub butter into flour and salt, add 3 tbsp cold water, form pastry. Chill 20 min.\n2. Roll out, line tart tin, blind bake at 190°C for 12 min.\n3. Fry bacon until crispy, scatter over pastry base.\n4. Whisk eggs with cream, season, pour over bacon.\n5. Top with gruyere.\n6. Bake 25 min at 180°C until set and golden.\n## Time\nPrep: 35 min · Cook: 40 min`,

  // ── Mexican ──
  "Chicken Tacos": `## Ingredients\n- Corn Tortillas (8)\n- Chicken Breast (400g)\n- Onions (½, diced)\n- Coriander (handful)\n- Limes (1)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n## Steps\n1. Season chicken with cumin, paprika and salt.\n2. Grill or pan-fry 5 min per side until cooked through.\n3. Rest 5 min, then slice thinly.\n4. Warm tortillas 30 sec each side in dry pan.\n5. Load each tortilla with chicken, onion and coriander.\n6. Squeeze lime juice over and serve with salsa.\n## Time\nPrep: 10 min · Cook: 15 min`,

  "Mexican Rice Bowl": `## Ingredients\n- White Rice (1½ cups)\n- Black Beans (400g)\n- Corn (1 cup)\n- Tomatoes (2, diced)\n- Coriander (handful)\n- Limes (1)\n- Sour Cream (4 tbsp)\n- Cumin Seeds (1 tsp)\n## Steps\n1. Cook rice.\n2. Warm black beans with cumin seeds and salt.\n3. Mix tomatoes with coriander and lime juice for pico.\n4. Build bowls: rice base, black beans, corn.\n5. Add pico de gallo and sour cream.\n6. Finish with extra lime wedge.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Chipotle Chicken Bowl": `## Ingredients\n- White Rice (1½ cups)\n- Chicken Breast (400g)\n- Black Beans (400g)\n- Corn (1 cup)\n- Chipotle (1 tbsp)\n- Sour Cream (4 tbsp)\n- Coriander (handful)\n- Limes (1)\n## Steps\n1. Cook rice.\n2. Season chicken with chipotle, salt and cumin, grill 5 min per side.\n3. Slice chicken, warm black beans.\n4. Build bowls: rice, black beans, corn.\n5. Top with chipotle chicken and sour cream.\n6. Finish with coriander and lime.\n## Time\nPrep: 10 min · Cook: 20 min`,

  // ── American ──
  "Classic Burger": `## Ingredients\n- Mutton (400g, minced)\n- Burger Buns (4)\n- Lettuce (4 leaves)\n- Tomatoes (2, sliced)\n- Cheddar (4 slices)\n- Onions (1, sliced)\n- Mayonnaise (4 tbsp)\n## Steps\n1. Season mince with salt and pepper, form 4 patties.\n2. Grill patties 4 min per side on high heat.\n3. Add cheddar in last minute to melt.\n4. Toast buns cut-side down 1 min.\n5. Spread mayo on buns.\n6. Layer lettuce, tomato, patty and onion, serve hot.\n## Time\nPrep: 10 min · Cook: 12 min`,

  "Mac and Cheese": `## Ingredients\n- Pasta (300g)\n- Cheddar (200g, grated)\n- Milk (300ml)\n- Butter (3 tbsp)\n- All-Purpose Flour (3 tbsp)\n- Mustard Sauce (1 tsp)\n- Black Pepper (½ tsp)\n## Steps\n1. Cook pasta until al dente, drain.\n2. Melt butter, whisk in flour, cook 1 min.\n3. Gradually add milk, stirring until thick.\n4. Remove from heat, add cheddar, mustard and pepper.\n5. Fold in pasta, reheat gently 2 min.\n6. Serve immediately.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "BBQ Chicken": `## Ingredients\n- Chicken Breast (500g)\n- Barbecue Sauce (6 tbsp)\n- Garlic (3 cloves, minced)\n- Smoked Paprika (1 tsp)\n- Onions (1)\n- Butter (2 tbsp)\n## Steps\n1. Mix barbecue sauce, garlic and smoked paprika.\n2. Marinate chicken 30 min.\n3. Grill or pan-fry on medium-high 5 min per side.\n4. Baste with extra sauce in last 2 min of cooking.\n5. Sauté onions in butter until caramelized.\n6. Serve chicken over onions.\n## Time\nPrep: 35 min · Cook: 15 min`,

  // ── South American ──
  "Feijoada": `## Ingredients\n- Black Beans (400g)\n- Chorizo (200g, sliced)\n- Onions (1)\n- Garlic (4 cloves)\n- Cumin Seeds (1 tsp)\n- Coriander (handful)\n- White Rice (1½ cups)\n- Limes (1)\n## Steps\n1. Cook rice.\n2. Fry chorizo until slightly crispy, remove.\n3. Sauté onion and garlic in chorizo fat.\n4. Add cumin seeds, cook 1 min.\n5. Add black beans and 1 cup water, simmer 20 min with chorizo.\n6. Serve over rice with coriander and lime wedges.\n## Time\nPrep: 10 min · Cook: 35 min`,

  "Fish Ceviche": `## Ingredients\n- Fish Fillet (400g, very fresh)\n- Limes (4, juiced)\n- Onions (½, sliced thin)\n- Coriander (handful)\n- Jalapeños (2, sliced)\n- Capsicum (1, diced)\n- Tomatoes (1, diced)\n## Steps\n1. Cut fish into small cubes, place in glass bowl.\n2. Pour lime juice over fish ensuring all is covered.\n3. Refrigerate 20–30 min until fish turns opaque.\n4. Drain excess lime juice, reserving a little.\n5. Mix in onion, coriander, jalapeño, capsicum and tomato.\n6. Season and serve immediately with corn tortillas.\n## Time\nPrep: 35 min · Cook: 0 min`,

  "Chimichurri Chicken": `## Ingredients\n- Chicken Breast (500g)\n- Coriander (1 bunch)\n- Garlic (4 cloves)\n- Olive Oil (6 tbsp)\n- Limes (1)\n- Smoked Paprika (1 tsp)\n- Onions (1)\n## Steps\n1. Blend coriander, garlic, olive oil, lime juice and salt into chimichurri.\n2. Marinate chicken in half the chimichurri 30 min.\n3. Grill or pan-sear 5–6 min per side.\n4. Sauté onions until golden and caramelized.\n5. Rest chicken 5 min, then slice.\n6. Serve with onions and remaining chimichurri drizzled over.\n## Time\nPrep: 35 min · Cook: 15 min`,

  // ── South Indian additions ──
  "Dosa": `## Ingredients\n- Dosa Batter (2 cups)\n- Coconut Oil (2 tbsp)\n- Mustard Seeds (½ tsp)\n## Steps\n1. Heat tawa on medium-high until a drop of water sizzles off immediately.\n2. Pour ladle of batter and spread quickly in circles.\n3. Drizzle coconut oil around edges.\n4. Cook until edges turn golden and crisp, 2–3 min.\n5. Fold and serve immediately with chutney and sambar.\n## Time\nPrep: 2 min · Cook: 15 min`,

  "Upma": `## Ingredients\n- Semolina (1 cup)\n- Onions (1, chopped)\n- Green Chilli (1)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n- Peanuts (2 tbsp)\n- Ghee (2 tbsp)\n## Steps\n1. Dry-roast semolina until fragrant, set aside.\n2. Heat ghee, splutter mustard seeds and curry leaves.\n3. Add peanuts, fry 1 min. Add onions and chilli, cook until soft.\n4. Add 2 cups boiling water and salt, stir quickly.\n5. Add roasted semolina, stir constantly until absorbed.\n6. Cover and rest 2 min. Serve with lemon and chutney.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Poha": `## Ingredients\n- Poha (2 cups, rinsed)\n- Onions (1, diced)\n- Green Chilli (1)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n- Turmeric Powder (½ tsp)\n- Peanuts (2 tbsp)\n- Limes (½)\n## Steps\n1. Rinse poha and drain, let sit 5 min until soft.\n2. Heat oil, splutter mustard seeds and curry leaves.\n3. Add peanuts, fry 1 min. Add onion and chilli, cook 3 min.\n4. Add turmeric and poha, toss gently on low heat 3 min.\n5. Season with salt, squeeze lime and serve immediately.\n## Time\nPrep: 8 min · Cook: 10 min`,

  "Rava Dosa": `## Ingredients\n- Semolina (½ cup)\n- Rice Flour (¼ cup)\n- Onions (½, fine)\n- Green Chilli (1, minced)\n- Coriander (small handful)\n- Coconut Oil (2 tbsp)\n## Steps\n1. Mix semolina, rice flour, onion, chilli and coriander.\n2. Add 1½ cups water, salt, stir into thin batter (no resting needed).\n3. Heat tawa well, drizzle oil.\n4. Pour batter from edges inward in a lacy pattern.\n5. Cook until crisp and golden, 2–3 min. No flipping needed.\n6. Serve with chutney and sambar.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Coconut Chutney Toast": `## Ingredients\n- White Bread (4 slices)\n- Coconut Grated (½ cup)\n- Green Chilli (1)\n- Ginger (½ inch)\n- Mustard Seeds (½ tsp)\n- Curry Leaves (6)\n## Steps\n1. Blend coconut, green chilli, ginger and salt with 3 tbsp water into thick chutney.\n2. Spread chutney on bread slices.\n3. Toast in pan with butter until golden.\n4. Heat oil, splutter mustard seeds and curry leaves for tempering.\n5. Drizzle tempering over toast and serve hot.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Medu Vada": `## Ingredients\n- Urad Dal (1 cup, soaked 4h)\n- Onions (½, fine)\n- Green Chilli (1)\n- Coriander (handful)\n- Coconut Oil (for frying)\n## Steps\n1. Drain dal and grind with minimal water into thick, fluffy batter.\n2. Add onion, chilli and coriander, season well.\n3. Wet hands, shape batter into ring-doughnuts.\n4. Deep-fry in hot coconut oil 3–4 min until golden.\n5. Drain and serve hot with sambar and coconut chutney.\n## Time\nPrep: 15 min (+ 4h soak) · Cook: 20 min`,

  "Oats Pongal": `## Ingredients\n- Oats (1 cup)\n- Moong Dal (¼ cup)\n- Ghee (2 tbsp)\n- Cumin Seeds (1 tsp)\n- Peppercorn (½ tsp, crushed)\n- Curry Leaves (8)\n- Cashews (8)\n## Steps\n1. Dry-roast moong dal 2 min, add 1 cup water and cook until soft.\n2. Add oats and ½ cup water, cook stirring until thick.\n3. Heat ghee, fry cashews until golden, set aside.\n4. Add cumin seeds, peppercorn and curry leaves to ghee, splutter.\n5. Pour tempering over oats mixture, mix well.\n6. Top with cashews and serve with chutney.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Banana Oats": `## Ingredients\n- Oats (1 cup)\n- Bananas (1, sliced)\n- Coconut Milk (200ml)\n- Honey (1 tbsp)\n- Coconut Grated (2 tbsp)\n## Steps\n1. Bring coconut milk and ½ cup water to simmer.\n2. Add oats, cook stirring 5 min until creamy.\n3. Stir in honey and half the banana slices.\n4. Pour into bowls, top with remaining banana and coconut.\n5. Drizzle extra honey if desired.\n## Time\nPrep: 2 min · Cook: 8 min`,

  "Curd Rice": `## Ingredients\n- White Rice (1 cup, cooked)\n- Yogurt (¾ cup)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n- Green Chilli (1, minced)\n- Ginger (½ inch, grated)\n- Milk (2 tbsp)\n## Steps\n1. Mash warm cooked rice slightly and cool completely.\n2. Mix in yogurt and milk until creamy, season with salt.\n3. Heat oil, splutter mustard seeds and curry leaves.\n4. Add ginger and chilli, cook 30 sec.\n5. Pour tempering over curd rice and mix gently.\n6. Chill 15 min for best flavour; serve with pickle.\n## Time\nPrep: 5 min · Cook: 5 min`,

  "Bisibele Bath": `## Ingredients\n- White Rice (1 cup)\n- Toor Dal (½ cup)\n- Carrots (1, diced)\n- Peas (½ cup)\n- Bisibelebath Powder (2 tbsp)\n- Tamarind (small ball)\n- Ghee (3 tbsp)\n- Cashews (10)\n## Steps\n1. Soak tamarind in ½ cup warm water, extract pulp.\n2. Pressure cook rice and dal with vegetables.\n3. Add bisibelebath powder and tamarind pulp, mix well.\n4. Simmer on low heat 10 min until thick.\n5. Fry cashews in ghee until golden, pour over bath.\n6. Serve hot with papad and raita.\n## Time\nPrep: 10 min · Cook: 30 min`,

  "Lemon Rice": `## Ingredients\n- White Rice (1 cup, cooked)\n- Lemons (1, juiced)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (10)\n- Peanuts (3 tbsp)\n- Turmeric Powder (½ tsp)\n- Dried Red Chilli (2)\n## Steps\n1. Heat oil, splutter mustard seeds and dried chilli.\n2. Add curry leaves and peanuts, fry until peanuts colour.\n3. Add turmeric, stir 30 sec.\n4. Add cooked rice, toss well over medium heat.\n5. Remove from heat, pour lemon juice and mix through.\n6. Season with salt and serve warm.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Rasam Rice": `## Ingredients\n- White Rice (1 cup)\n- Tomatoes (2)\n- Tamarind (small ball)\n- Black Pepper (1 tsp, crushed)\n- Cumin Seeds (1 tsp)\n- Curry Leaves (10)\n- Ghee (1 tbsp)\n## Steps\n1. Cook rice. Soak tamarind in ½ cup water, extract pulp.\n2. Blend tomatoes; combine with tamarind water and 1½ cups water.\n3. Bring to boil, add pepper and salt.\n4. Heat ghee, splutter cumin seeds and curry leaves.\n5. Add tempering to rasam, simmer 5 min.\n6. Pour over rice or serve as soup alongside.\n## Time\nPrep: 8 min · Cook: 20 min`,

  "Kootu": `## Ingredients\n- Lentils (½ cup)\n- Coconut Grated (½ cup)\n- Cumin Seeds (1 tsp)\n- Turmeric Powder (½ tsp)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n## Steps\n1. Cook lentils with turmeric until soft.\n2. Grind coconut with cumin seeds and 3 tbsp water into coarse paste.\n3. Add coconut paste to cooked lentils, simmer 5 min.\n4. Heat oil, splutter mustard seeds and curry leaves.\n5. Add tempering to kootu, mix and cook 2 min.\n6. Serve with rice or as a side dish.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Avial": `## Ingredients\n- Carrots (1, batons)\n- Drumstick (2, pieces)\n- Plantain (½, cubed)\n- Coconut Grated (½ cup)\n- Yogurt (3 tbsp)\n- Coconut Oil (2 tbsp)\n- Curry Leaves (10)\n## Steps\n1. Cook carrots and drumstick in salted water 10 min.\n2. Add plantain, cook 5 more min.\n3. Grind coconut with cumin seeds and green chilli into paste.\n4. Add coconut paste and yogurt to vegetables, mix.\n5. Simmer on low 3 min without boiling.\n6. Drizzle coconut oil and curry leaves before serving.\n## Time\nPrep: 15 min · Cook: 20 min`,

  "Puliyogare": `## Ingredients\n- White Rice (1 cup, cooked)\n- Tamarind (large ball)\n- Peanuts (3 tbsp)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (10)\n- Sesame Seeds (1 tbsp)\n- Dried Red Chilli (2)\n## Steps\n1. Soak tamarind in 1 cup water, extract thick pulp.\n2. Heat oil, splutter mustard seeds, dried chilli and curry leaves.\n3. Add peanuts, fry until golden.\n4. Add tamarind pulp, cook 10 min until thick and oily.\n5. Add sesame seeds and salt.\n6. Toss rice in tamarind paste until evenly coated.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Dal with Rice": `## Ingredients\n- Toor Dal (1 cup)\n- White Rice (1 cup)\n- Ghee (2 tbsp)\n- Cumin Seeds (1 tsp)\n- Tomatoes (1, diced)\n- Onions (½, diced)\n## Steps\n1. Cook rice separately.\n2. Pressure cook dal with turmeric until soft.\n3. Heat ghee, splutter cumin seeds.\n4. Add onions, cook 3 min. Add tomatoes, cook 3 min.\n5. Stir tomato mixture into dal, simmer 5 min.\n6. Serve dal over rice with ghee.\n## Time\nPrep: 5 min · Cook: 25 min`,

  "Veg Kurma": `## Ingredients\n- Carrots (1, diced)\n- Peas (½ cup)\n- Potatoes (2, diced)\n- Coconut Milk (200ml)\n- Onions (1)\n- Tomatoes (1)\n- Cashews (10)\n- Garam Masala (1½ tsp)\n## Steps\n1. Blend onion, tomato and cashews into smooth paste.\n2. Sauté paste until oil separates, 8 min.\n3. Add garam masala and vegetables, stir well.\n4. Add ½ cup water, cook covered 12 min.\n5. Pour in coconut milk, simmer 5 min.\n6. Serve with roti or rice.\n## Time\nPrep: 10 min · Cook: 30 min`,

  "Murukku": `## Ingredients\n- Rice Flour (1 cup)\n- Chickpea Flour (¼ cup)\n- Cumin Seeds (1 tsp)\n- Asafoetida (pinch)\n- Coconut Oil (for frying)\n## Steps\n1. Mix rice flour, chickpea flour, cumin seeds, asafoetida and salt.\n2. Add 1 tbsp hot oil and enough water to make stiff dough.\n3. Press through murukku mould in spiral shapes.\n4. Deep-fry in hot coconut oil on medium heat until crisp.\n5. Drain and cool before storing.\n## Time\nPrep: 15 min · Cook: 20 min`,

  "Coconut Chutney": `## Ingredients\n- Coconut Grated (1 cup)\n- Green Chilli (1)\n- Ginger (½ inch)\n- Mustard Seeds (½ tsp)\n- Curry Leaves (6)\n## Steps\n1. Blend coconut, green chilli, ginger, salt and 4 tbsp water until smooth.\n2. Transfer to serving bowl.\n3. Heat oil, splutter mustard seeds and curry leaves.\n4. Pour tempering over chutney and mix gently.\n5. Serve with dosa, idli or vada.\n## Time\nPrep: 5 min · Cook: 2 min`,

  "Sundal": `## Ingredients\n- Chickpeas (400g, boiled)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n- Coconut Grated (3 tbsp)\n- Green Chilli (1)\n## Steps\n1. Heat oil, splutter mustard seeds and curry leaves.\n2. Add green chilli, cook 30 sec.\n3. Add chickpeas and salt, toss well.\n4. Cook 3 min on medium heat.\n5. Remove from heat, stir in coconut.\n6. Serve warm or at room temperature.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Banana Chips": `## Ingredients\n- Plantain (3, raw green)\n- Coconut Oil (for frying)\n- Turmeric Powder (½ tsp)\n## Steps\n1. Peel plantains and slice very thin on a mandoline.\n2. Soak slices in salted water with turmeric 5 min, drain and pat dry.\n3. Deep-fry in hot coconut oil in batches until golden and crisp.\n4. Drain on paper towels.\n5. Season with salt while hot. Cool completely before storing.\n## Time\nPrep: 10 min · Cook: 15 min`,

  "Appam with Coconut Milk": `## Ingredients\n- Dosa Batter (2 cups)\n- Coconut Milk (400ml)\n- Sugar (1 tbsp)\n- Coconut Oil (1 tbsp)\n## Steps\n1. Thin the dosa batter slightly with water.\n2. Heat appam pan (or small wok), add a few drops of coconut oil.\n3. Pour ladle of batter and swirl pan to spread thin edges.\n4. Cover and cook 2–3 min until centre is soft, edges lacy.\n5. Warm coconut milk with sugar and a pinch of salt.\n6. Serve appam with warm sweet coconut milk.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Vadai": `## Ingredients\n- Urad Dal (1 cup, soaked 4h)\n- Onions (½, fine)\n- Green Chilli (1)\n- Coriander (handful)\n- Curry Leaves (8)\n- Coconut Oil (for frying)\n## Steps\n1. Grind soaked dal with minimal water into thick, airy batter.\n2. Mix in onion, chilli, coriander, curry leaves and salt.\n3. Shape into flat discs with a hole.\n4. Deep-fry in hot coconut oil until golden, 3 min per side.\n5. Serve hot with sambar and coconut chutney.\n## Time\nPrep: 15 min (+ 4h soak) · Cook: 20 min`,

  "Peanut Sundal": `## Ingredients\n- Peanuts (1 cup, boiled)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n- Green Chilli (1)\n- Coconut Grated (3 tbsp)\n## Steps\n1. Heat oil, splutter mustard seeds and curry leaves.\n2. Add green chilli, cook 30 sec.\n3. Add boiled peanuts, toss and cook 3 min.\n4. Season with salt and remove from heat.\n5. Stir in fresh coconut and serve.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Tamarind Rice Balls": `## Ingredients\n- White Rice (1 cup, cooked)\n- Tamarind (small ball)\n- Peanuts (2 tbsp)\n- Sesame Seeds (1 tbsp)\n- Mustard Seeds (½ tsp)\n## Steps\n1. Extract tamarind pulp with ¼ cup water.\n2. Heat oil, splutter mustard seeds, add peanuts and sesame seeds.\n3. Add tamarind pulp, cook 5 min until thick.\n4. Mix paste through cooked rice, adjust salt.\n5. Shape into balls while warm.\n6. Serve as a snack or packed lunch.\n## Time\nPrep: 10 min · Cook: 10 min`,

  "Rava Ladoo": `## Ingredients\n- Semolina (1 cup)\n- Sugar (¾ cup, powdered)\n- Ghee (4 tbsp)\n- Cardamom (½ tsp, ground)\n- Cashews (10)\n## Steps\n1. Dry-roast semolina in ghee until fragrant and golden.\n2. Cool completely, add powdered sugar and cardamom.\n3. Fry cashews in extra ghee, add to mixture.\n4. Add warm milk 1 tbsp at a time until mixture just holds.\n5. Shape into balls while still warm.\n6. Cool fully before storing.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Cucumber Raita": `## Ingredients\n- Yogurt (1 cup)\n- Cucumber (1, grated)\n- Mustard Seeds (½ tsp)\n- Curry Leaves (6)\n- Green Chilli (1, minced)\n## Steps\n1. Grate cucumber and squeeze out excess water.\n2. Whisk yogurt smooth, mix in cucumber.\n3. Heat oil, splutter mustard seeds and curry leaves.\n4. Add green chilli, cook 30 sec.\n5. Cool tempering 1 min, pour over raita and mix.\n6. Chill and serve with rice or biryani.\n## Time\nPrep: 8 min · Cook: 3 min`,

  "Fish Curry South Indian": `## Ingredients\n- Salmon (400g, cubed)\n- Coconut Milk (300ml)\n- Tomatoes (2)\n- Onions (1)\n- Tamarind (small ball)\n- Turmeric Powder (½ tsp)\n- Curry Leaves (10)\n## Steps\n1. Extract tamarind pulp with ½ cup water.\n2. Sauté onions in coconut oil until golden.\n3. Add tomatoes and turmeric, cook 5 min.\n4. Add tamarind water, bring to simmer.\n5. Add coconut milk and fish, cook 8 min on low heat.\n6. Finish with curry leaves and serve with rice.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Chicken Chettinad": `## Ingredients\n- Chicken Breast (500g)\n- Onions (1)\n- Tomatoes (2)\n- Coconut Grated (¼ cup)\n- Garam Masala (2 tsp)\n- Peppercorn (1 tsp, crushed)\n- Curry Leaves (10)\n## Steps\n1. Blend coconut, peppercorn and garam masala into paste.\n2. Sauté onions in oil until golden.\n3. Add tomatoes and spice paste, cook 8 min.\n4. Add chicken, stir to coat, cook 5 min.\n5. Add ½ cup water, cover and cook 15 min.\n6. Finish with curry leaves, serve with rice.\n## Time\nPrep: 15 min · Cook: 30 min`,

  "Prawn Masala": `## Ingredients\n- Prawns (400g, cleaned)\n- Onions (1)\n- Tomatoes (2)\n- Coconut Grated (3 tbsp)\n- Turmeric Powder (½ tsp)\n- Red Chilli Powder (1 tsp)\n- Curry Leaves (10)\n## Steps\n1. Marinate prawns with turmeric and salt 10 min.\n2. Sauté onions until golden, add tomatoes.\n3. Cook until oil separates, add red chilli powder.\n4. Add coconut, stir 2 min.\n5. Add prawns, cook 5–6 min until pink and cooked.\n6. Finish with curry leaves, serve with rice.\n## Time\nPrep: 15 min · Cook: 20 min`,

  "Mutton Kuzhambu": `## Ingredients\n- Mutton (400g, pieces)\n- Onions (1)\n- Tomatoes (2)\n- Coconut Grated (¼ cup)\n- Tamarind (small ball)\n- Garam Masala (2 tsp)\n- Curry Leaves (10)\n## Steps\n1. Pressure cook mutton until tender, reserve stock.\n2. Extract tamarind pulp. Blend coconut into paste.\n3. Sauté onions, add tomatoes and garam masala.\n4. Add coconut paste, cook 5 min.\n5. Add mutton, stock and tamarind, simmer 15 min.\n6. Finish with curry leaves.\n## Time\nPrep: 15 min · Cook: 50 min`,

  "Egg Masala": `## Ingredients\n- Eggs (4, hard-boiled)\n- Onions (1)\n- Tomatoes (2)\n- Coconut Grated (3 tbsp)\n- Turmeric Powder (½ tsp)\n- Red Chilli Powder (1 tsp)\n## Steps\n1. Score boiled eggs and fry in oil until golden, set aside.\n2. Sauté onions until dark golden.\n3. Add tomatoes, turmeric and red chilli, cook 8 min.\n4. Add coconut and ¼ cup water, simmer 5 min.\n5. Add eggs, coat in gravy, cook 3 min.\n6. Serve with rice or roti.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Paneer Butter Masala South": `## Ingredients\n- Paneer (250g)\n- Tomatoes (3, pureed)\n- Butter (2 tbsp)\n- Fresh Cream (3 tbsp)\n- Garam Masala (1½ tsp)\n- Cashews (10, soaked)\n## Steps\n1. Blend cashews into smooth paste.\n2. Cook tomato purée in butter until dark and thick, 10 min.\n3. Add garam masala and cashew paste, cook 3 min.\n4. Add ½ cup water, bring to simmer.\n5. Add paneer cubes, cook 5 min.\n6. Stir in cream and serve with naan.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Chicken Biryani South": `## Ingredients\n- Basmati Rice (1½ cups)\n- Chicken Breast (400g)\n- Yogurt (4 tbsp)\n- Onions (1, fried golden)\n- Garam Masala (2 tsp)\n- Saffron (pinch, soaked in warm milk)\n- Ghee (3 tbsp)\n## Steps\n1. Marinate chicken in yogurt and garam masala 30 min.\n2. Par-cook rice until 70% done, drain.\n3. Cook marinated chicken in a heavy pot 10 min.\n4. Layer rice over chicken, top with fried onions.\n5. Drizzle saffron milk and ghee, cover tightly.\n6. Cook on very low heat (dum) 20 min.\n## Time\nPrep: 40 min · Cook: 35 min`,

  "Vegetable Stew": `## Ingredients\n- Potatoes (2, diced)\n- Carrots (1, diced)\n- Peas (½ cup)\n- Coconut Milk (300ml)\n- Onions (1)\n- Green Chilli (1)\n- Curry Leaves (8)\n## Steps\n1. Sauté onions and green chilli in coconut oil until soft.\n2. Add potatoes and carrots, stir 3 min.\n3. Add ½ cup water, cook covered 12 min.\n4. Add peas and coconut milk, simmer 5 min.\n5. Season, finish with curry leaves.\n6. Serve with appam or bread.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Kathirikkai Gravy": `## Ingredients\n- Brinjal (3, cubed)\n- Onions (1)\n- Tomatoes (2)\n- Tamarind (small ball)\n- Coconut Grated (¼ cup)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n## Steps\n1. Extract tamarind pulp. Sauté mustard seeds and curry leaves.\n2. Add onions, cook until golden.\n3. Add tomatoes and brinjal, cook 8 min.\n4. Add tamarind water and coconut, simmer 10 min.\n5. Season and serve with rice.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Poriyal": `## Ingredients\n- Cabbage (2 cups, shredded)\n- Carrots (1, grated)\n- Coconut Grated (3 tbsp)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n- Turmeric Powder (¼ tsp)\n## Steps\n1. Heat oil, splutter mustard seeds and curry leaves.\n2. Add vegetables and turmeric, stir-fry on high heat 3 min.\n3. Add 2 tbsp water, cover and cook 5 min.\n4. Uncover, cook off any water.\n5. Stir in coconut and season.\n6. Serve as side dish with rice.\n## Time\nPrep: 8 min · Cook: 12 min`,

  // ── North Indian additions ──
  "Besan Chilla": `## Ingredients\n- Chickpea Flour (1 cup)\n- Onions (½, fine)\n- Green Chilli (1, minced)\n- Coriander (handful)\n- Turmeric Powder (¼ tsp)\n## Steps\n1. Whisk chickpea flour with ¾ cup water into smooth batter.\n2. Add onion, chilli, coriander, turmeric and salt.\n3. Heat tawa, add a little oil.\n4. Pour ladle of batter and spread thin.\n5. Cook 2 min, drizzle oil around edges, flip and cook 1 min.\n6. Serve hot with green chutney.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Bread Omelette": `## Ingredients\n- Eggs (3)\n- White Bread (2 slices)\n- Onions (½, fine)\n- Green Chilli (1)\n- Butter (2 tbsp)\n## Steps\n1. Beat eggs with onion, chilli, salt and pepper.\n2. Heat butter in pan, pour egg mixture.\n3. Place bread slices on top of wet egg before it sets.\n4. Flip carefully once egg is set underneath.\n5. Cook 1 min until bread is golden.\n6. Serve with tomato ketchup.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Moong Dal Chilla": `## Ingredients\n- Moong Dal (1 cup, soaked 2h)\n- Ginger (½ inch)\n- Green Chilli (1)\n- Coriander (handful)\n## Steps\n1. Drain moong dal and grind with ginger, chilli and 4 tbsp water.\n2. Add coriander and salt to batter.\n3. Heat tawa with oil, pour ladle and spread thin.\n4. Cook 2 min until edges crisp, flip and cook 1 min.\n5. Serve with green chutney and yogurt.\n## Time\nPrep: 10 min (+ 2h soak) · Cook: 15 min`,

  "Paneer Bhurji Toast": `## Ingredients\n- Paneer (200g, crumbled)\n- Eggs (2)\n- Onions (½, diced)\n- Tomatoes (1, diced)\n- White Bread (4 slices)\n- Butter (2 tbsp)\n## Steps\n1. Sauté onions in butter until soft.\n2. Add tomatoes, cook 3 min.\n3. Add crumbled paneer, mix well.\n4. Push to side, scramble eggs in same pan.\n5. Mix everything together, season.\n6. Pile on buttered toast and serve.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Dal Paratha": `## Ingredients\n- Toor Dal (½ cup, cooked)\n- Wheat Flour (2 cups)\n- Ghee (3 tbsp)\n- Cumin Seeds (1 tsp)\n- Coriander (handful)\n## Steps\n1. Knead flour with water into soft dough, rest 15 min.\n2. Mash cooked dal with cumin seeds, coriander and salt.\n3. Stuff dal filling into dough balls and roll flat.\n4. Cook on hot tawa with ghee, 2 min per side.\n5. Serve with yogurt and pickle.\n## Time\nPrep: 25 min · Cook: 20 min`,

  "Masala Omelette": `## Ingredients\n- Eggs (3)\n- Onions (½, fine)\n- Tomatoes (1, diced)\n- Green Chilli (1)\n- Coriander (handful)\n- Butter (1 tbsp)\n## Steps\n1. Beat eggs well with salt.\n2. Mix in onion, tomato, chilli and coriander.\n3. Heat butter in pan until foamy.\n4. Pour egg mixture, swirl to cover pan.\n5. Cook 2 min, fold and cook 1 more min.\n6. Serve with buttered bread.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Rava Idli": `## Ingredients\n- Semolina (1 cup)\n- Yogurt (½ cup)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n- Coriander (handful)\n## Steps\n1. Heat oil, splutter mustard seeds and curry leaves.\n2. Add semolina, roast 2 min. Cool slightly.\n3. Mix in yogurt, coriander and salt into thick batter.\n4. Rest 10 min. Add water if too thick.\n5. Steam in idli moulds 12 min until firm.\n6. Serve with chutney and sambar.\n## Time\nPrep: 15 min · Cook: 20 min`,

  "Dal Tadka with Rice": `## Ingredients\n- Toor Dal (1 cup)\n- Ghee (2 tbsp)\n- Cumin Seeds (1 tsp)\n- Garlic (3 cloves, sliced)\n- Tomatoes (2, diced)\n- White Rice (1 cup)\n## Steps\n1. Pressure cook dal with turmeric until soft.\n2. Cook rice separately.\n3. Heat ghee until hot, fry garlic slices until golden.\n4. Add cumin seeds, let sizzle.\n5. Add tomatoes, cook 3 min.\n6. Pour tempering over dal, simmer 3 min, serve with rice.\n## Time\nPrep: 5 min · Cook: 25 min`,

  "Chole Chawal": `## Ingredients\n- Chickpeas (400g, boiled)\n- Basmati Rice (1 cup)\n- Onions (1)\n- Tomatoes (2)\n- Cumin Seeds (1 tsp)\n- Garam Masala (2 tsp)\n- Ginger (1 inch)\n## Steps\n1. Cook rice.\n2. Sauté onions until golden, add ginger and cumin seeds.\n3. Add tomatoes and garam masala, cook until oil separates.\n4. Add chickpeas with ¼ cup water, simmer 12 min.\n5. Mash a few chickpeas to thicken gravy.\n6. Serve over rice with raw onion and lemon.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Aloo Matar": `## Ingredients\n- Potatoes (3, diced)\n- Peas (1 cup)\n- Onions (1)\n- Tomatoes (2)\n- Cumin Seeds (1 tsp)\n- Turmeric Powder (½ tsp)\n## Steps\n1. Heat oil, splutter cumin seeds.\n2. Add onions, cook until golden.\n3. Add tomatoes and turmeric, cook until soft.\n4. Add potatoes, stir and cook 5 min.\n5. Add peas and ½ cup water, cook covered 12 min.\n6. Season and serve with roti or puri.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Kadhi Chawal": `## Ingredients\n- Yogurt (1 cup)\n- Chickpea Flour (3 tbsp)\n- Basmati Rice (1 cup)\n- Mustard Seeds (1 tsp)\n- Cumin Seeds (1 tsp)\n- Dried Red Chilli (2)\n## Steps\n1. Cook rice.\n2. Whisk yogurt with chickpea flour and 2 cups water until smooth.\n3. Bring to boil stirring, simmer 20 min until thickened.\n4. Heat ghee, splutter mustard seeds, cumin and red chilli.\n5. Pour tempering into kadhi, simmer 5 min.\n6. Serve over rice.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Paneer Butter Masala": `## Ingredients\n- Paneer (250g)\n- Tomatoes (3, pureed)\n- Butter (3 tbsp)\n- Fresh Cream (3 tbsp)\n- Garam Masala (1½ tsp)\n- Onions (1)\n- Garlic (3 cloves)\n## Steps\n1. Blend onion and garlic, cook in butter 5 min.\n2. Add tomato purée, cook 10 min until thick.\n3. Add garam masala, season.\n4. Add ½ cup water, bring to simmer.\n5. Add paneer, cook 5 min.\n6. Stir in cream and serve with naan or rice.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Baingan Bharta": `## Ingredients\n- Brinjal (2 large)\n- Onions (1)\n- Tomatoes (2)\n- Garlic (3 cloves)\n- Coriander (handful)\n- Ghee (2 tbsp)\n## Steps\n1. Char brinjal directly over flame until skin is blackened all over.\n2. Cool, peel and mash flesh.\n3. Sauté onions in ghee until golden.\n4. Add garlic and tomatoes, cook until oil separates.\n5. Mix in mashed brinjal, cook 5 min.\n6. Finish with coriander and serve with roti.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Jeera Rice with Dal Fry": `## Ingredients\n- Basmati Rice (1 cup)\n- Toor Dal (1 cup)\n- Ghee (3 tbsp)\n- Cumin Seeds (2 tsp)\n- Garlic (3 cloves)\n- Tomatoes (1)\n## Steps\n1. Pressure cook dal until soft.\n2. Cook rice with ghee and 1 tsp cumin seeds.\n3. Heat ghee, fry garlic and 1 tsp cumin until golden.\n4. Add tomatoes, cook 4 min.\n5. Pour tempering over dal, simmer 3 min.\n6. Serve jeera rice with dal fry.\n## Time\nPrep: 5 min · Cook: 25 min`,

  "Aloo Gobi": `## Ingredients\n- Potatoes (2, cubed)\n- Cauliflower (1 small head)\n- Cumin Seeds (1 tsp)\n- Turmeric Powder (½ tsp)\n- Coriander Powder (1 tsp)\n- Coriander (handful)\n## Steps\n1. Heat oil, splutter cumin seeds.\n2. Add potatoes, cook 5 min stirring.\n3. Add cauliflower, turmeric and coriander powder.\n4. Add 3 tbsp water, cover and cook 12 min.\n5. Uncover, cook on high 2 min to dry out.\n6. Garnish with coriander and serve with roti.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Chana Chaat": `## Ingredients\n- Chickpeas (400g)\n- Onions (½, diced)\n- Tomatoes (1, diced)\n- Coriander (handful)\n- Lemons (1, juiced)\n- Chaat Masala (1 tsp)\n## Steps\n1. Warm chickpeas or use at room temperature.\n2. Toss with onion, tomato and coriander.\n3. Add lemon juice, chaat masala and salt.\n4. Mix well and adjust seasoning.\n5. Serve immediately as a snack.\n## Time\nPrep: 8 min · Cook: 0 min`,

  "Aloo Tikki": `## Ingredients\n- Potatoes (4, boiled)\n- White Bread (1 slice)\n- Cumin Seeds (1 tsp)\n- Coriander (handful)\n- Green Chilli (1)\n## Steps\n1. Mash potatoes smooth, tear bread and mix in.\n2. Add cumin seeds, coriander, chilli and salt.\n3. Shape into flat patties.\n4. Shallow-fry on medium heat 3 min per side until golden crust forms.\n5. Serve with green chutney and yogurt.\n## Time\nPrep: 15 min · Cook: 15 min`,

  "Onion Pakoda": `## Ingredients\n- Onions (2, sliced thin)\n- Chickpea Flour (¾ cup)\n- Green Chilli (1)\n- Cumin Seeds (½ tsp)\n- Oil (for frying)\n## Steps\n1. Mix onions with chickpea flour, chilli, cumin, salt and 3 tbsp water.\n2. Batter should be thick enough to coat.\n3. Drop spoonfuls into hot oil.\n4. Fry on medium heat until golden and crisp, 3–4 min.\n5. Drain and serve immediately with chutney.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Roasted Chana": `## Ingredients\n- Chickpeas (400g, boiled)\n- Cumin Powder (1 tsp)\n- Red Chilli Powder (½ tsp)\n- Lemons (½)\n- Olive Oil (1 tbsp)\n## Steps\n1. Drain chickpeas, pat very dry.\n2. Toss with oil, cumin, red chilli and salt.\n3. Spread on baking tray.\n4. Roast at 200°C for 25–30 min, shaking halfway.\n5. Remove when crispy, squeeze lemon over.\n6. Cool before eating — they crisp more as they cool.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Peanut Chaat": `## Ingredients\n- Peanuts (1 cup, boiled or roasted)\n- Onions (½, diced)\n- Tomatoes (1, diced)\n- Coriander (handful)\n- Lemons (1)\n- Chaat Masala (1 tsp)\n## Steps\n1. Combine peanuts, onion, tomato and coriander.\n2. Add lemon juice, chaat masala and salt.\n3. Toss well and taste for seasoning.\n4. Serve immediately.\n## Time\nPrep: 8 min · Cook: 0 min`,

  "Bread Upma": `## Ingredients\n- White Bread (6 slices, cubed)\n- Onions (1)\n- Green Chilli (1)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n- Tomatoes (1)\n## Steps\n1. Heat oil, splutter mustard seeds and curry leaves.\n2. Add onion and chilli, cook 3 min.\n3. Add tomatoes, cook 3 min.\n4. Add bread cubes, toss on medium heat 3 min.\n5. Season with salt and lemon juice.\n6. Serve with chutney.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Boiled Eggs Masala": `## Ingredients\n- Eggs (4, hard-boiled)\n- Red Chilli Powder (1 tsp)\n- Cumin Seeds (½ tsp)\n- Coriander (handful)\n- Lemons (½)\n## Steps\n1. Peel and halve boiled eggs.\n2. Sprinkle red chilli powder and cumin seeds over.\n3. Heat a little oil in pan, add eggs cut-side down.\n4. Cook 2 min until slightly caramelised.\n5. Squeeze lemon and garnish with coriander.\n6. Serve as a snack or side.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Moong Dal Chaat": `## Ingredients\n- Moong Dal (1 cup, sprouted or boiled)\n- Onions (½, diced)\n- Tomatoes (1, diced)\n- Coriander (handful)\n- Lemons (1)\n- Cumin Powder (½ tsp)\n## Steps\n1. Boil moong dal until just tender but not mushy.\n2. Cool and combine with onion, tomato and coriander.\n3. Add lemon juice, cumin powder and salt.\n4. Mix well and serve immediately.\n## Time\nPrep: 10 min · Cook: 15 min`,

  "Samosa Wrap": `## Ingredients\n- Wheat Flour (1½ cups)\n- Potatoes (3, boiled)\n- Peas (½ cup)\n- Cumin Seeds (1 tsp)\n- Coriander (handful)\n## Steps\n1. Mash potatoes with peas, cumin, coriander and salt.\n2. Make soft dough from flour and water.\n3. Roll into thin circles, place filling on one side.\n4. Fold over, seal edges and press with fork.\n5. Fry in oil on medium heat until golden.\n6. Serve with chutney.\n## Time\nPrep: 25 min · Cook: 20 min`,

  "Besan Ladoo": `## Ingredients\n- Chickpea Flour (1 cup)\n- Ghee (4 tbsp)\n- Sugar (¾ cup, powdered)\n- Cardamom (½ tsp, ground)\n## Steps\n1. Heat ghee in a heavy pan, add chickpea flour.\n2. Roast on low heat 12–15 min stirring constantly until fragrant and golden.\n3. Cool completely off heat.\n4. Add powdered sugar and cardamom, mix well.\n5. Shape into balls while mixture is warm.\n6. Cool fully before storing.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Dal Makhani": `## Ingredients\n- Urad Dal (¾ cup, soaked overnight)\n- Rajma (¼ cup, soaked overnight)\n- Butter (3 tbsp)\n- Fresh Cream (3 tbsp)\n- Tomatoes (2, pureed)\n- Garam Masala (1½ tsp)\n## Steps\n1. Pressure cook both dals until very soft.\n2. Sauté tomato purée in butter 8 min until dark.\n3. Add garam masala, stir 1 min.\n4. Add cooked dals with cooking liquid.\n5. Simmer on low heat 20 min until creamy.\n6. Stir in cream and serve with naan.\n## Time\nPrep: 10 min (+ overnight soak) · Cook: 45 min`,

  "Butter Chicken": `## Ingredients\n- Chicken Breast (500g)\n- Tomatoes (3, pureed)\n- Butter (3 tbsp)\n- Fresh Cream (4 tbsp)\n- Garam Masala (2 tsp)\n- Ginger (1 inch)\n- Kasturi Methi (1 tbsp)\n## Steps\n1. Marinate chicken in yogurt and garam masala 30 min, grill or pan-fry.\n2. Cook tomato purée in butter 10 min until very thick.\n3. Add garam masala and ginger, cook 2 min.\n4. Add ½ cup water, bring to simmer.\n5. Add chicken pieces, cook 8 min.\n6. Stir in cream and kasturi methi, serve with naan.\n## Time\nPrep: 35 min · Cook: 30 min`,

  "Paneer Tikka Masala": `## Ingredients\n- Paneer (300g, cubed)\n- Yogurt (3 tbsp)\n- Onions (1)\n- Tomatoes (2)\n- Garam Masala (2 tsp)\n- Kashmiri Chilli (1 tsp)\n## Steps\n1. Marinate paneer in yogurt and 1 tsp garam masala 20 min.\n2. Grill or pan-fry paneer until slightly charred.\n3. Sauté onions until golden, add tomatoes.\n4. Add remaining garam masala and kashmiri chilli.\n5. Add paneer, ¼ cup water, simmer 5 min.\n6. Serve with naan.\n## Time\nPrep: 25 min · Cook: 25 min`,

  "Chana Masala": `## Ingredients\n- Chickpeas (400g)\n- Onions (1)\n- Tomatoes (2)\n- Ginger (1 inch)\n- Cumin Seeds (1 tsp)\n- Garam Masala (2 tsp)\n## Steps\n1. Sauté onions until dark golden.\n2. Add ginger and cumin seeds, cook 1 min.\n3. Add tomatoes and garam masala, cook until oil separates.\n4. Add chickpeas with ¼ cup water, mash a few.\n5. Simmer 12 min until gravy is thick.\n6. Serve with puri or rice.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Mutton Curry": `## Ingredients\n- Mutton (500g, pieces)\n- Onions (1)\n- Tomatoes (2)\n- Yogurt (3 tbsp)\n- Garam Masala (2 tsp)\n- Garlic (4 cloves)\n## Steps\n1. Marinate mutton in yogurt and garam masala 30 min.\n2. Sauté onions until very dark golden.\n3. Add garlic and tomatoes, cook until oil separates.\n4. Add marinated mutton, sear 5 min.\n5. Add ½ cup water, pressure cook 3 whistles.\n6. Simmer uncovered 5 min to thicken gravy.\n## Time\nPrep: 35 min · Cook: 40 min`,

  "Egg Curry": `## Ingredients\n- Eggs (4, hard-boiled)\n- Onions (1)\n- Tomatoes (2)\n- Garlic (3 cloves)\n- Ginger (½ inch)\n- Garam Masala (1½ tsp)\n## Steps\n1. Score eggs and fry in oil until golden, set aside.\n2. Sauté onions until golden.\n3. Add garlic, ginger and tomatoes, cook until oil separates.\n4. Add garam masala and ¼ cup water, simmer 5 min.\n5. Add eggs, coat in gravy, cook 3 min.\n6. Serve with rice or roti.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Vegetable Biryani": `## Ingredients\n- Basmati Rice (1½ cups)\n- Carrots (1, diced)\n- Peas (½ cup)\n- Potatoes (1, diced)\n- Biryani Masala (2 tbsp)\n- Yogurt (3 tbsp)\n- Onions (1, fried golden)\n## Steps\n1. Par-cook rice until 70% done, drain.\n2. Sauté vegetables with biryani masala 5 min.\n3. Add yogurt, cook 3 min.\n4. Layer vegetables in pot, top with rice.\n5. Cover tightly, cook on very low heat 20 min.\n6. Fluff gently and serve with raita.\n## Time\nPrep: 15 min · Cook: 40 min`,

  "Chicken Biryani": `## Ingredients\n- Basmati Rice (1½ cups)\n- Chicken Breast (400g)\n- Yogurt (4 tbsp)\n- Saffron (pinch)\n- Garam Masala (2 tsp)\n- Onions (1, fried golden)\n- Ghee (3 tbsp)\n## Steps\n1. Marinate chicken in yogurt and garam masala 30 min.\n2. Par-cook rice until 70% done, drain.\n3. Cook chicken in heavy pot 10 min.\n4. Layer rice over chicken, add fried onions.\n5. Mix saffron with warm milk, drizzle over rice with ghee.\n6. Seal and dum-cook on low heat 25 min.\n## Time\nPrep: 40 min · Cook: 40 min`,

  "Keema Matar": `## Ingredients\n- Mutton (400g, minced)\n- Peas (1 cup)\n- Onions (1)\n- Tomatoes (2)\n- Garlic (3 cloves)\n- Garam Masala (2 tsp)\n## Steps\n1. Sauté onions until dark golden.\n2. Add garlic and tomatoes, cook until oil separates.\n3. Add garam masala, stir 1 min.\n4. Add minced meat, cook on high heat breaking up lumps, 8 min.\n5. Add peas and ¼ cup water, cook covered 10 min.\n6. Serve with roti.\n## Time\nPrep: 10 min · Cook: 30 min`,

  "Fish Curry North Indian": `## Ingredients\n- Salmon (400g)\n- Onions (1)\n- Tomatoes (2)\n- Turmeric Powder (½ tsp)\n- Red Chilli Powder (1 tsp)\n- Yogurt (2 tbsp)\n## Steps\n1. Marinate fish with turmeric and salt 10 min.\n2. Sauté onions until golden.\n3. Add tomatoes and red chilli powder, cook until thick.\n4. Add yogurt, stir and cook 3 min.\n5. Add fish and ½ cup water, cook 8 min without stirring much.\n6. Serve with rice.\n## Time\nPrep: 15 min · Cook: 25 min`,

  // ── Vegetarian additions ──
  "Vegetable Upma": `## Ingredients\n- Semolina (1 cup)\n- Carrots (1, diced)\n- Peas (½ cup)\n- Mustard Seeds (1 tsp)\n- Curry Leaves (8)\n- Onions (1)\n- Cumin Seeds (½ tsp)\n## Steps\n1. Dry-roast semolina until fragrant.\n2. Splutter mustard seeds and curry leaves in oil.\n3. Add onions and cumin seeds, cook until soft.\n4. Add carrots and peas, cook 3 min.\n5. Add 2 cups boiling water and salt, stir quickly.\n6. Add semolina, stir until absorbed. Rest 2 min.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Paneer Paratha": `## Ingredients\n- Wheat Flour (2 cups)\n- Paneer (200g, grated)\n- Onions (½, fine)\n- Green Chilli (1)\n- Coriander (handful)\n- Butter (3 tbsp)\n## Steps\n1. Knead flour with water into soft dough, rest 15 min.\n2. Mix paneer, onion, chilli and coriander for filling.\n3. Stuff filling into dough balls and roll flat.\n4. Cook on hot tawa with butter, 2 min per side.\n5. Serve with yogurt and pickle.\n## Time\nPrep: 25 min · Cook: 20 min`,

  "Vegetable Sandwich": `## Ingredients\n- White Bread (8 slices)\n- Cucumber (½, sliced)\n- Tomatoes (1, sliced)\n- Capsicum (½, sliced)\n- Butter (2 tbsp)\n- Mayonnaise (2 tbsp)\n## Steps\n1. Butter all bread slices.\n2. Spread mayonnaise on one side of each pair.\n3. Layer cucumber, tomato and capsicum.\n4. Season with salt and pepper.\n5. Press sandwiches together and cut diagonally.\n6. Serve with chutney or ketchup.\n## Time\nPrep: 8 min · Cook: 0 min`,

  "Greek Yogurt Parfait": `## Ingredients\n- Yogurt (1 cup)\n- Berries (½ cup)\n- Oats (3 tbsp, toasted)\n- Honey (2 tbsp)\n## Steps\n1. Toast oats in dry pan 3 min until golden.\n2. Layer yogurt in a glass.\n3. Add berries layer.\n4. Add toasted oats.\n5. Drizzle honey over top.\n6. Serve immediately.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Paneer Tikka Wrap": `## Ingredients\n- Paneer (250g, cubed)\n- Tortilla Wraps (4)\n- Capsicum (1, strips)\n- Onions (1, strips)\n- Yogurt (4 tbsp)\n- Garam Masala (1½ tsp)\n## Steps\n1. Marinate paneer and vegetables in yogurt and garam masala 20 min.\n2. Grill or pan-fry until charred at edges.\n3. Warm tortillas 30 sec each side.\n4. Layer paneer and vegetables on tortilla.\n5. Add chutney and roll tightly.\n## Time\nPrep: 25 min · Cook: 15 min`,

  "Margherita Pizza": `## Ingredients\n- 00 Flour (2 cups)\n- Mozzarella (200g, sliced)\n- Tomatoes (3, crushed)\n- Basil (handful)\n- Olive Oil (3 tbsp)\n- Yeast (1 tsp)\n## Steps\n1. Mix flour, yeast, salt and water into dough, knead 8 min, prove 1 hour.\n2. Simmer tomatoes with olive oil and salt 10 min.\n3. Stretch dough thin on floured surface.\n4. Spread tomato sauce, top with mozzarella.\n5. Bake at 250°C (max oven) 10–12 min until blistered.\n6. Top with basil and drizzle olive oil.\n## Time\nPrep: 75 min · Cook: 12 min`,

  "Vegetable Fried Rice": `## Ingredients\n- White Rice (2 cups, cooked cold)\n- Carrots (1, diced)\n- Peas (½ cup)\n- Spring Onion (3 stalks)\n- Soy Sauce (3 tbsp)\n- Capsicum (½)\n## Steps\n1. Heat wok until very hot, add oil.\n2. Stir-fry carrots and capsicum 2 min.\n3. Add peas, toss 1 min.\n4. Add cold rice, press and toss on high heat 2 min.\n5. Add soy sauce and spring onion, toss well.\n6. Season and serve.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Caprese Salad": `## Ingredients\n- Mozzarella (250g, sliced)\n- Tomatoes (3, sliced)\n- Basil (handful)\n- Olive Oil (3 tbsp)\n- Black Pepper (½ tsp)\n## Steps\n1. Alternate mozzarella and tomato slices on a plate.\n2. Tuck basil leaves between slices.\n3. Drizzle olive oil generously.\n4. Season with salt and black pepper.\n5. Serve immediately at room temperature.\n## Time\nPrep: 5 min · Cook: 0 min`,

  "Masala Peanuts": `## Ingredients\n- Peanuts (1 cup)\n- Red Chilli Powder (1 tsp)\n- Limes (½)\n- Chaat Masala (½ tsp)\n## Steps\n1. Roast peanuts in dry pan 5 min until skins blister.\n2. Cool slightly.\n3. Toss with red chilli powder and salt.\n4. Squeeze lime juice over.\n5. Sprinkle chaat masala and toss.\n6. Serve warm.\n## Time\nPrep: 2 min · Cook: 5 min`,

  "Bhel Puri": `## Ingredients\n- Poha Chivda (2 cups)\n- Onions (½, fine)\n- Tomatoes (1, fine)\n- Green Chutney (2 tbsp)\n- Tamarind Paste (2 tbsp)\n- Coriander (handful)\n## Steps\n1. Mix green chutney and tamarind paste.\n2. Toss poha chivda with onion and tomato.\n3. Add chutney mixture and toss quickly.\n4. Garnish with coriander.\n5. Serve immediately — bhel puri goes soggy fast.\n## Time\nPrep: 5 min · Cook: 0 min`,

  "Hummus with Pita": `## Ingredients\n- Chickpeas (400g)\n- Tahini (3 tbsp)\n- Lemons (1)\n- Garlic (1 clove)\n- Olive Oil (3 tbsp)\n- Pita Bread (4)\n## Steps\n1. Blend chickpeas, tahini, lemon juice, garlic and salt until smooth.\n2. Add ice water 1 tbsp at a time until creamy.\n3. Spread in bowl, drizzle olive oil and paprika.\n4. Warm pita in dry pan 30 sec per side.\n5. Serve together.\n## Time\nPrep: 8 min · Cook: 3 min`,

  "Cheese Toast": `## Ingredients\n- White Bread (4 slices)\n- Cheddar (100g, grated)\n- Butter (1 tbsp)\n- Oregano (½ tsp)\n## Steps\n1. Butter bread slices lightly.\n2. Top generously with cheddar.\n3. Sprinkle oregano.\n4. Grill or toast until cheese is bubbling and golden.\n5. Serve immediately.\n## Time\nPrep: 3 min · Cook: 5 min`,

  "Fruit Salad": `## Ingredients\n- Apples (2, diced)\n- Bananas (1, sliced)\n- Pomegranate (½ cup, seeds)\n- Honey (2 tbsp)\n## Steps\n1. Dice apples and slice bananas.\n2. Combine in a bowl with pomegranate seeds.\n3. Drizzle honey over and toss gently.\n4. Serve immediately or chill 10 min.\n## Time\nPrep: 8 min · Cook: 0 min`,

  "Vegetable Spring Rolls": `## Ingredients\n- Spring Roll Wrappers (12)\n- Cabbage (1 cup, shredded)\n- Carrots (1, julienned)\n- Spring Onion (3 stalks)\n- Soy Sauce (2 tbsp)\n- Oil (for frying)\n## Steps\n1. Stir-fry vegetables with soy sauce 3 min. Cool.\n2. Place filling on wrapper, roll tightly, seal with water.\n3. Deep-fry in hot oil until golden, 3 min.\n4. Drain on paper towel.\n5. Serve with chilli sauce.\n## Time\nPrep: 15 min · Cook: 15 min`,

  "Tofu Vegetable Stir Fry": `## Ingredients\n- Tofu (300g, firm)\n- Broccoli (1 cup)\n- Capsicum (1, strips)\n- Carrots (1, sliced)\n- Soy Sauce (3 tbsp)\n- Garlic (2 cloves)\n- Ginger (1 inch)\n## Steps\n1. Press and cube tofu, fry until golden on all sides.\n2. Remove tofu. Stir-fry garlic and ginger 30 sec.\n3. Add carrots and broccoli, cook 3 min on high.\n4. Add capsicum, cook 2 min.\n5. Return tofu and soy sauce, toss well.\n6. Serve over rice.\n## Time\nPrep: 10 min · Cook: 15 min`,

  // ── East Asian additions ──
  "Congee": `## Ingredients\n- White Rice (½ cup)\n- Ginger (2 inch, sliced)\n- Spring Onion (3 stalks)\n- Soy Sauce (2 tbsp)\n## Steps\n1. Rinse rice and add to pot with 6 cups water.\n2. Add ginger slices, bring to boil.\n3. Reduce heat, simmer 45 min stirring occasionally until porridge-thick.\n4. Season with soy sauce and salt.\n5. Serve topped with spring onion and sesame oil.\n## Time\nPrep: 2 min · Cook: 45 min`,

  "Steamed Eggs": `## Ingredients\n- Eggs (3)\n- Soy Sauce (2 tbsp)\n- Sesame Oil (1 tsp)\n- Spring Onion (2 stalks)\n## Steps\n1. Beat eggs with equal volume of warm water, strain through sieve.\n2. Season with a pinch of salt.\n3. Pour into shallow bowl, cover with plastic wrap.\n4. Steam on low heat 12 min until just set but wobbly.\n5. Drizzle soy sauce and sesame oil, top with spring onion.\n## Time\nPrep: 3 min · Cook: 12 min`,

  "Egg Fried Rice": `## Ingredients\n- White Rice (2 cups, cold cooked)\n- Eggs (3)\n- Soy Sauce (3 tbsp)\n- Spring Onion (3 stalks)\n- Garlic (2 cloves)\n## Steps\n1. Scramble eggs in hot wok and break into pieces, set aside.\n2. Add garlic, fry 30 sec.\n3. Add cold rice, press and fry on high heat 2 min.\n4. Add soy sauce and toss.\n5. Return eggs and spring onion, toss once and serve.\n## Time\nPrep: 3 min · Cook: 8 min`,

  "Korean Porridge": `## Ingredients\n- White Rice (½ cup)\n- Mushrooms (100g, sliced)\n- Sesame Oil (1 tsp)\n- Soy Sauce (2 tbsp)\n- Garlic (1 clove)\n## Steps\n1. Cook rice with 5 cups water, simmering 35 min.\n2. Sauté garlic and mushrooms in sesame oil.\n3. Add to rice porridge, stir well.\n4. Season with soy sauce.\n5. Serve with kimchi or pickled vegetables.\n## Time\nPrep: 3 min · Cook: 40 min`,

  "Miso Soup with Tofu": `## Ingredients\n- Miso Paste (2 tbsp)\n- Tofu (200g, cubed)\n- Spring Onion (2 stalks)\n## Steps\n1. Bring 700ml water to near boil.\n2. Dissolve miso in a ladle of warm water first.\n3. Stir miso into pot — never boil after adding miso.\n4. Add tofu and warm 2 min.\n5. Serve topped with spring onion.\n## Time\nPrep: 3 min · Cook: 5 min`,

  "Scallion Pancakes": `## Ingredients\n- Wheat Flour (1½ cups)\n- Spring Onion (4 stalks, sliced)\n- Sesame Oil (2 tbsp)\n## Steps\n1. Mix flour with ½ cup boiling water to scald, then add cold water to make soft dough.\n2. Rest 20 min. Roll thin, brush sesame oil and scatter spring onion.\n3. Roll up like a scroll, coil into disc and roll flat again.\n4. Pan-fry in oil 3 min per side until golden and crisp.\n5. Serve with soy-vinegar dipping sauce.\n## Time\nPrep: 30 min · Cook: 15 min`,

  "Korean Egg Toast": `## Ingredients\n- Eggs (2)\n- White Bread (2 slices)\n- Cabbage (½ cup, shredded)\n- Carrots (¼ cup, grated)\n- Onions (¼, diced)\n- Butter (2 tbsp)\n## Steps\n1. Mix cabbage, carrot and onion with eggs and a pinch of salt.\n2. Heat butter, pour vegetable-egg mixture and press flat.\n3. Cook 2 min per side like a thick pancake.\n4. Toast bread in same pan.\n5. Stack the egg patty between toast slices.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Rice with Nori": `## Ingredients\n- White Rice (1 cup, cooked)\n- Nori Sheets (2, cut strips)\n- Soy Sauce (1 tbsp)\n- Sesame Oil (1 tsp)\n## Steps\n1. Warm cooked rice.\n2. Season with soy sauce and sesame oil, mix gently.\n3. Cut nori sheets into strips.\n4. Serve rice in bowls topped generously with nori.\n## Time\nPrep: 2 min · Cook: 3 min`,

  "Soy Milk Oats": `## Ingredients\n- Oats (1 cup)\n- Sesame Seeds (1 tbsp)\n- Honey (2 tbsp)\n- Sesame Oil (½ tsp)\n## Steps\n1. Cook oats with 1½ cups water until creamy.\n2. Toast sesame seeds in dry pan 1 min.\n3. Stir honey and sesame oil into oats.\n4. Serve topped with toasted sesame seeds.\n## Time\nPrep: 2 min · Cook: 8 min`,

  "Tamago Gohan": `## Ingredients\n- White Rice (1 cup, hot cooked)\n- Eggs (1, very fresh)\n- Soy Sauce (1 tbsp)\n- Sesame Oil (½ tsp)\n- Spring Onion (1 stalk)\n## Steps\n1. Place very hot freshly cooked rice in bowl.\n2. Crack raw egg directly over hot rice.\n3. Add soy sauce and sesame oil.\n4. Mix vigorously until egg becomes frothy and coats rice.\n5. Top with sliced spring onion.\n## Time\nPrep: 2 min · Cook: 0 min`,

  "Noodle Soup": `## Ingredients\n- Noodles (200g)\n- Tofu (200g, cubed)\n- Soy Sauce (3 tbsp)\n- Ginger (1 inch, sliced)\n- Spring Onion (3 stalks)\n- Bok Choy (2 heads)\n## Steps\n1. Bring 1L water with ginger and soy sauce to boil.\n2. Add tofu, simmer 5 min.\n3. Cook noodles separately until just done, drain.\n4. Add bok choy to broth, cook 2 min.\n5. Place noodles in bowls, ladle broth and toppings over.\n6. Garnish with spring onion.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Mapo Tofu": `## Ingredients\n- Tofu (400g, silken)\n- Gochujang (2 tbsp)\n- Soy Sauce (2 tbsp)\n- Ginger (1 inch)\n- Garlic (2 cloves)\n- Spring Onion (3 stalks)\n## Steps\n1. Cut tofu into cubes gently.\n2. Sauté garlic and ginger in oil 1 min.\n3. Add gochujang and soy sauce, fry 1 min.\n4. Add tofu and ½ cup water, simmer 5 min without stirring.\n5. Mix cornstarch with water, drizzle to thicken.\n6. Serve over rice, topped with spring onion.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Stir Fried Bok Choy": `## Ingredients\n- Bok Choy (4 heads)\n- Carrots (1, julienned)\n- Mushrooms (100g)\n- Soy Sauce (2 tbsp)\n- Oyster Sauce (1 tbsp)\n- Garlic (2 cloves)\n## Steps\n1. Heat wok until very hot.\n2. Add oil and garlic, fry 30 sec.\n3. Add carrots and mushrooms, toss 2 min.\n4. Add bok choy, toss on high heat 2 min.\n5. Add soy sauce and oyster sauce, toss well.\n6. Serve immediately.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Dan Dan Noodles": `## Ingredients\n- Noodles (250g)\n- Peanut Butter (3 tbsp)\n- Soy Sauce (3 tbsp)\n- Garlic (2 cloves, minced)\n- Ginger (1 inch, grated)\n- Sesame Oil (2 tbsp)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Cook noodles, drain and rinse cold.\n2. Whisk peanut butter, soy sauce, garlic, ginger, sesame oil with 3 tbsp water.\n3. Toss noodles in sauce.\n4. Serve at room temperature topped with sesame seeds and sliced spring onion.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Kimchi Fried Rice": `## Ingredients\n- White Rice (2 cups, cold cooked)\n- Gochujang (2 tbsp)\n- Eggs (2)\n- Sesame Oil (1 tbsp)\n- Spring Onion (3 stalks)\n## Steps\n1. Fry eggs sunny-side up, set aside.\n2. Heat wok, add gochujang and cook 1 min.\n3. Add cold rice, toss on high heat until coated and hot.\n4. Drizzle sesame oil, toss once more.\n5. Serve topped with fried egg and spring onion.\n## Time\nPrep: 3 min · Cook: 10 min`,

  "Sweet and Sour Tofu": `## Ingredients\n- Tofu (300g, firm)\n- Capsicum (1, diced)\n- Corn Flour (2 tbsp)\n- Soy Sauce (2 tbsp)\n- Vinegar (2 tbsp)\n- Honey (2 tbsp)\n## Steps\n1. Cube tofu, toss in cornflour and fry until golden.\n2. Mix soy sauce, vinegar and honey into sauce.\n3. Stir-fry capsicum 2 min.\n4. Pour sauce into pan, bring to boil.\n5. Add tofu, toss to coat.\n6. Serve over rice.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Hot and Sour Soup": `## Ingredients\n- Tofu (200g, cubed)\n- Mushrooms (100g, sliced)\n- Eggs (2)\n- Corn Flour (2 tbsp)\n- Soy Sauce (3 tbsp)\n- Vinegar (3 tbsp)\n## Steps\n1. Bring 1L water to boil with mushrooms and soy sauce.\n2. Simmer 5 min. Add tofu.\n3. Mix cornflour with water, drizzle into soup while stirring.\n4. Beat eggs and drizzle slowly into simmering soup.\n5. Add vinegar, stir and season.\n6. Serve hot.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Kung Pao Tofu": `## Ingredients\n- Tofu (300g, firm)\n- Capsicum (1, diced)\n- Peanuts (3 tbsp)\n- Soy Sauce (3 tbsp)\n- Gochujang (1 tbsp)\n- Garlic (2 cloves)\n## Steps\n1. Cube and fry tofu until golden, set aside.\n2. Stir-fry garlic and gochujang 1 min.\n3. Add capsicum, cook 2 min.\n4. Mix soy sauce with 2 tbsp water, add to pan.\n5. Return tofu and add peanuts, toss well.\n6. Serve over rice.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Edamame with Salt": `## Ingredients\n- Edamame (400g, in pods)\n- Sesame Oil (1 tsp)\n## Steps\n1. Boil edamame in salted water 4–5 min.\n2. Drain and drizzle sesame oil.\n3. Toss with extra sea salt.\n4. Serve warm in pods.\n## Time\nPrep: 2 min · Cook: 5 min`,

  "Spring Rolls": `## Ingredients\n- Spring Roll Wrappers (12)\n- Carrots (1, julienned)\n- Cabbage (1 cup, shredded)\n- Noodles (50g, cooked)\n- Soy Sauce (2 tbsp)\n- Oil (for frying)\n## Steps\n1. Stir-fry carrots, cabbage and noodles with soy sauce 3 min. Cool.\n2. Roll filling tightly in spring roll wrappers, seal with water.\n3. Deep-fry in oil until golden and crisp, 3 min.\n4. Drain and serve with sweet chilli sauce.\n## Time\nPrep: 15 min · Cook: 15 min`,

  "Gyoza": `## Ingredients\n- Wonton Wrappers (20)\n- Cabbage (1 cup, fine)\n- Ginger (1 inch, grated)\n- Soy Sauce (2 tbsp)\n- Sesame Oil (1 tsp)\n## Steps\n1. Squeeze water from cabbage, mix with ginger, soy sauce and sesame oil.\n2. Place filling on wrapper, fold and pleat to seal.\n3. Fry in oiled pan 2 min until golden on bottom.\n4. Add ¼ cup water, cover immediately, steam 4 min.\n5. Uncover, cook until water evaporates.\n6. Serve with soy-vinegar dip.\n## Time\nPrep: 20 min · Cook: 15 min`,

  "Sesame Noodles": `## Ingredients\n- Noodles (250g)\n- Sesame Oil (3 tbsp)\n- Soy Sauce (3 tbsp)\n- Ginger (1 inch, grated)\n- Spring Onion (3 stalks)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Cook noodles, drain and rinse cold.\n2. Toss immediately with sesame oil, soy sauce and ginger.\n3. Garnish with spring onion and sesame seeds.\n4. Serve cold or at room temperature.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Cucumber Kimchi": `## Ingredients\n- Cucumber (2, thick slices)\n- Gochujang (2 tbsp)\n- Garlic (2 cloves, minced)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Salt cucumber slices, rest 15 min, rinse and squeeze dry.\n2. Mix gochujang and garlic.\n3. Toss cucumber in paste.\n4. Scatter sesame seeds.\n5. Rest 30 min at room temperature before serving.\n## Time\nPrep: 25 min · Cook: 0 min`,

  "Crispy Tofu Bites": `## Ingredients\n- Tofu (300g, firm)\n- Corn Flour (3 tbsp)\n- Soy Sauce (2 tbsp)\n- Sesame Oil (1 tsp)\n- Garlic (1 clove, minced)\n## Steps\n1. Press tofu dry, cut into cubes.\n2. Toss in cornflour with salt.\n3. Pan-fry in generous oil on medium-high until golden on all sides.\n4. Mix soy sauce, sesame oil and garlic into dipping sauce.\n5. Serve immediately.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Rice Paper Rolls": `## Ingredients\n- Rice Noodles (100g, cooked)\n- Carrots (1, julienned)\n- Cucumber (½, julienned)\n- Coriander (handful)\n- Soy Sauce (3 tbsp)\n## Steps\n1. Soak rice paper briefly in warm water until pliable.\n2. Lay flat and arrange noodles, carrot, cucumber and coriander.\n3. Roll tightly, folding in sides as you go.\n4. Serve immediately with soy dipping sauce.\n## Time\nPrep: 15 min · Cook: 5 min`,

  "Miso Glazed Edamame": `## Ingredients\n- Edamame (400g)\n- Miso Paste (2 tbsp)\n- Honey (1 tbsp)\n- Sesame Oil (1 tsp)\n## Steps\n1. Boil edamame 4 min, drain.\n2. Mix miso, honey and sesame oil in a pan.\n3. Heat sauce until bubbling.\n4. Toss edamame in glaze.\n5. Serve warm.\n## Time\nPrep: 3 min · Cook: 8 min`,

  "Wonton Soup": `## Ingredients\n- Wonton Wrappers (16)\n- Cabbage (¾ cup, fine)\n- Ginger (1 inch, grated)\n- Soy Sauce (3 tbsp)\n- Spring Onion (3 stalks)\n## Steps\n1. Mix cabbage and ginger for filling, season.\n2. Place filling on wrappers, fold into triangles and seal.\n3. Bring 1L water with soy sauce to boil.\n4. Drop wontons in, cook 4–5 min until they float.\n5. Ladle into bowls with broth and spring onion.\n## Time\nPrep: 20 min · Cook: 10 min`,

  "Steamed Buns": `## Ingredients\n- Wheat Flour (2 cups)\n- Mushrooms (200g, diced)\n- Soy Sauce (2 tbsp)\n- Sesame Oil (1 tsp)\n- Spring Onion (3 stalks)\n- Yeast (1 tsp)\n## Steps\n1. Make soft dough from flour, yeast and water. Prove 1 hour.\n2. Stir-fry mushrooms with soy sauce and sesame oil, cool.\n3. Divide dough into balls, flatten, fill and seal.\n4. Prove 20 min.\n5. Steam on medium heat 12 min.\n6. Serve warm.\n## Time\nPrep: 90 min · Cook: 15 min`,

  "Ramen": `## Ingredients\n- Noodles (300g)\n- Soy Sauce (4 tbsp)\n- Miso Paste (2 tbsp)\n- Mushrooms (150g)\n- Eggs (2)\n- Bok Choy (2 heads)\n- Ginger (1 inch)\n## Steps\n1. Combine miso, soy sauce and ginger in 1.2L water, bring to simmer.\n2. Add mushrooms, simmer 10 min.\n3. Soft-boil eggs 6½ min, peel.\n4. Cook noodles separately, drain.\n5. Add bok choy to broth, cook 2 min.\n6. Ladle broth over noodles, top with egg and vegetables.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Korean BBQ Chicken": `## Ingredients\n- Chicken Breast (500g, sliced)\n- Gochujang (3 tbsp)\n- Soy Sauce (2 tbsp)\n- Garlic (3 cloves)\n- Sesame Oil (2 tbsp)\n- Honey (2 tbsp)\n## Steps\n1. Mix gochujang, soy sauce, garlic, sesame oil and honey.\n2. Marinate chicken 30 min.\n3. Grill or pan-fry on high heat 4 min per side until charred.\n4. Rest 3 min before slicing.\n5. Serve with rice and sliced spring onion.\n## Time\nPrep: 35 min · Cook: 12 min`,

  "Tofu Stir Fry": `## Ingredients\n- Tofu (300g, firm)\n- Bok Choy (3 heads)\n- Mushrooms (150g)\n- Soy Sauce (3 tbsp)\n- Oyster Sauce (2 tbsp)\n- Garlic (3 cloves)\n## Steps\n1. Cube and pan-fry tofu until golden, set aside.\n2. Stir-fry garlic 30 sec on high heat.\n3. Add mushrooms and bok choy, toss 3 min.\n4. Return tofu, add soy sauce and oyster sauce.\n5. Toss well and serve over rice.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Steamed Fish": `## Ingredients\n- Salmon (4 fillets)\n- Soy Sauce (3 tbsp)\n- Ginger (2 inch, julienned)\n- Spring Onion (3 stalks)\n- Sesame Oil (2 tbsp)\n## Steps\n1. Place fish in steaming dish, top with ginger.\n2. Steam 8–10 min until fish flakes easily.\n3. Heat sesame oil in small pan until smoking.\n4. Pour soy sauce over fish.\n5. Pour hot sesame oil over immediately — it will sizzle.\n6. Top with spring onion and serve.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Miso Glazed Salmon": `## Ingredients\n- Salmon (4 fillets)\n- Miso Paste (3 tbsp)\n- Mirin (2 tbsp)\n- Soy Sauce (1 tbsp)\n## Steps\n1. Mix miso, mirin and soy sauce into glaze.\n2. Marinate salmon in glaze 30 min.\n3. Preheat grill or oven to high.\n4. Grill salmon 4–5 min per side, basting with glaze.\n5. Serve with rice and steamed greens.\n## Time\nPrep: 35 min · Cook: 10 min`,

  "Udon Noodle Soup": `## Ingredients\n- Udon Noodles (300g)\n- Soy Sauce (4 tbsp)\n- Miso Paste (2 tbsp)\n- Bok Choy (2 heads)\n- Mushrooms (150g)\n- Spring Onion (3 stalks)\n## Steps\n1. Combine soy sauce, miso and 1.2L water, bring to simmer.\n2. Add mushrooms, cook 5 min.\n3. Cook udon noodles per packet, drain.\n4. Add bok choy to broth, cook 2 min.\n5. Divide noodles into bowls, ladle broth over.\n6. Top with spring onion.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "General Tso Chicken": `## Ingredients\n- Chicken Breast (500g, cubed)\n- Soy Sauce (4 tbsp)\n- Gochujang (2 tbsp)\n- Garlic (3 cloves)\n- Ginger (1 inch)\n- Corn Flour (4 tbsp)\n## Steps\n1. Toss chicken in cornflour and salt, deep-fry until golden.\n2. Mix soy sauce, gochujang, garlic and ginger.\n3. Fry sauce in hot wok 1 min.\n4. Add fried chicken, toss to coat.\n5. Serve over rice with spring onion.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Hot Pot Vegetables": `## Ingredients\n- Bok Choy (2 heads)\n- Mushrooms (200g)\n- Tofu (200g)\n- Noodles (200g)\n- Soy Sauce (4 tbsp)\n- Sesame Oil (2 tbsp)\n## Steps\n1. Bring 1.5L water with soy sauce to boil.\n2. Add mushrooms, simmer 5 min.\n3. Add tofu and noodles, cook 3 min.\n4. Add bok choy, cook 2 min.\n5. Drizzle sesame oil and serve in the pot.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Teriyaki Chicken": `## Ingredients\n- Chicken Breast (500g)\n- Soy Sauce (4 tbsp)\n- Mirin (3 tbsp)\n- Honey (2 tbsp)\n- Garlic (2 cloves)\n- Ginger (1 inch)\n## Steps\n1. Mix soy sauce, mirin, honey, garlic and ginger into marinade.\n2. Marinate chicken 20 min.\n3. Pan-fry on medium-high 4 min per side.\n4. Add remaining marinade to pan, cook 2 min until glazed.\n5. Slice and serve over rice.\n## Time\nPrep: 25 min · Cook: 12 min`,

  "Vegetable Fried Noodles": `## Ingredients\n- Noodles (250g)\n- Cabbage (1 cup, shredded)\n- Carrots (1, julienned)\n- Bean Sprouts (1 cup)\n- Soy Sauce (3 tbsp)\n- Sesame Oil (1 tbsp)\n- Eggs (2)\n## Steps\n1. Cook noodles, drain and toss with sesame oil.\n2. Scramble eggs in hot wok, set aside.\n3. Stir-fry cabbage and carrots 2 min on high.\n4. Add noodles and soy sauce, toss 2 min.\n5. Add bean sprouts and eggs, toss once.\n6. Serve immediately.\n## Time\nPrep: 8 min · Cook: 12 min`,

  // ── South East Asian additions ──
  "Thai Rice Porridge": `## Ingredients\n- White Rice (½ cup)\n- Ginger (1 inch, sliced)\n- Garlic (2 cloves)\n- Spring Onion (3 stalks)\n- Fish Sauce (2 tbsp)\n- Sesame Oil (1 tsp)\n## Steps\n1. Simmer rice with ginger, garlic and 6 cups water 45 min.\n2. Stir often until very soft and porridge-like.\n3. Season with fish sauce and sesame oil.\n4. Serve topped with spring onion and fried shallots.\n## Time\nPrep: 3 min · Cook: 45 min`,

  "Coconut Pancakes": `## Ingredients\n- Rice Flour (1 cup)\n- Coconut Milk (200ml)\n- Eggs (2)\n- Sugar (2 tbsp)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Whisk rice flour, coconut milk, eggs, sugar and a pinch of salt.\n2. Rest batter 10 min.\n3. Heat lightly oiled pan.\n4. Pour small ladles of batter, scatter sesame seeds on top.\n5. Cook 2 min per side until golden.\n6. Serve with fresh mango or syrup.\n## Time\nPrep: 15 min · Cook: 15 min`,

  "Vietnamese Egg Crepe": `## Ingredients\n- Rice Flour (½ cup)\n- Eggs (2)\n- Coconut Milk (100ml)\n- Spring Onion (2 stalks)\n- Bean Sprouts (½ cup)\n## Steps\n1. Whisk rice flour, eggs, coconut milk into thin batter.\n2. Pour thin layer in hot oiled pan.\n3. Top with spring onion and bean sprouts on one half.\n4. Fold over once set.\n5. Cook 1 min until golden.\n6. Serve with soy dipping sauce.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Lemongrass Omelette": `## Ingredients\n- Eggs (3)\n- Lemongrass (1 stalk, fine)\n- Fish Sauce (1 tbsp)\n- Spring Onion (2 stalks)\n- Sesame Oil (1 tsp)\n## Steps\n1. Beat eggs with fish sauce and lemongrass.\n2. Add spring onion and sesame oil.\n3. Heat oil in pan until hot.\n4. Pour egg mixture, swirl to cover.\n5. Cook 2 min, fold and serve immediately.\n## Time\nPrep: 5 min · Cook: 5 min`,

  "Coconut Oats": `## Ingredients\n- Oats (1 cup)\n- Coconut Milk (300ml)\n- Bananas (1)\n- Honey (2 tbsp)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Cook oats with coconut milk, stirring, 5 min.\n2. Slice bananas.\n3. Serve oats in bowls.\n4. Top with banana, drizzle honey.\n5. Scatter sesame seeds.\n## Time\nPrep: 2 min · Cook: 8 min`,

  "Rice with Soft Egg": `## Ingredients\n- White Rice (1 cup, cooked)\n- Eggs (2)\n- Soy Sauce (2 tbsp)\n- Sesame Oil (1 tsp)\n- Spring Onion (2 stalks)\n- Garlic (1 clove)\n## Steps\n1. Fry garlic in oil 30 sec.\n2. Push aside, fry eggs until whites set but yolks soft.\n3. Place over rice in bowls.\n4. Drizzle soy sauce and sesame oil.\n5. Top with spring onion.\n## Time\nPrep: 2 min · Cook: 8 min`,

  "Tofu Scramble Thai": `## Ingredients\n- Tofu (300g, firm)\n- Garlic (2 cloves)\n- Soy Sauce (2 tbsp)\n- Sesame Oil (1 tsp)\n- Spring Onion (3 stalks)\n- Bean Sprouts (½ cup)\n## Steps\n1. Crumble tofu.\n2. Fry garlic in oil 30 sec.\n3. Add tofu and cook on high heat 4 min.\n4. Add soy sauce, sesame oil and bean sprouts.\n5. Toss 1 min and garnish with spring onion.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Pandan Coconut Rice": `## Ingredients\n- White Rice (1½ cups)\n- Coconut Milk (200ml)\n- Palm Sugar (2 tbsp)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Rinse rice well.\n2. Cook rice with coconut milk and equal water mix.\n3. Add palm sugar, stir to dissolve.\n4. Cook until absorbed and slightly sticky.\n5. Serve in bowls topped with sesame seeds.\n## Time\nPrep: 3 min · Cook: 20 min`,

  "Spring Onion Omelette": `## Ingredients\n- Eggs (3)\n- Spring Onion (4 stalks, sliced)\n- Fish Sauce (1 tbsp)\n- Sesame Oil (1 tsp)\n## Steps\n1. Beat eggs with fish sauce and sesame oil.\n2. Add spring onion and mix.\n3. Heat oil in pan until very hot.\n4. Pour egg mixture, swirl to cover.\n5. Cook 2 min until golden underneath, fold and serve.\n## Time\nPrep: 3 min · Cook: 5 min`,

  "Mango Sticky Rice Breakfast": `## Ingredients\n- White Rice (1 cup, cooked sticky)\n- Coconut Milk (200ml)\n- Mango (1, sliced)\n- Palm Sugar (3 tbsp)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Warm coconut milk with palm sugar until dissolved.\n2. Pour over warm sticky rice, mix and rest 10 min.\n3. Slice mango.\n4. Serve rice with mango alongside.\n5. Drizzle any remaining coconut sauce over.\n## Time\nPrep: 5 min · Cook: 5 min`,

  "Thai Red Curry": `## Ingredients\n- Chicken Breast (400g, sliced)\n- Thai Red Curry Paste (3 tbsp)\n- Coconut Milk (400ml)\n- Capsicum (1)\n- Fish Sauce (2 tbsp)\n- Basil (handful)\n- Limes (1)\n## Steps\n1. Fry curry paste in 3 tbsp coconut milk 2 min until fragrant.\n2. Add chicken, cook until sealed.\n3. Pour in remaining coconut milk and ¼ cup water.\n4. Simmer 12 min. Add capsicum, cook 3 min.\n5. Season with fish sauce and lime.\n6. Serve over rice topped with basil.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Pad See Ew": `## Ingredients\n- Rice Noodles (250g)\n- Chicken Breast (300g, sliced)\n- Bok Choy (3 heads)\n- Eggs (2)\n- Soy Sauce (3 tbsp)\n- Garlic (2 cloves)\n- Sesame Oil (1 tsp)\n## Steps\n1. Soak noodles 20 min, drain.\n2. Fry garlic and chicken on high heat until cooked.\n3. Push aside, scramble eggs.\n4. Add noodles and soy sauce, toss on high heat 2 min.\n5. Add bok choy, toss 1 min.\n6. Drizzle sesame oil and serve.\n## Time\nPrep: 25 min · Cook: 12 min`,
