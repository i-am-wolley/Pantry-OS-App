  "Spiced Chickpeas": `## Ingredients\n- Chickpeas (400g)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n- Chipotle (1 tbsp)\n- Limes (½)\n## Steps\n1. Drain chickpeas, pat dry.\n2. Toss with cumin, paprika, chipotle and oil.\n3. Roast at 200°C 25 min until crispy.\n4. Squeeze lime over.\n5. Serve warm.\n## Time\nPrep: 3 min · Cook: 25 min`,

  "Pico de Gallo": `## Ingredients\n- Tomatoes (4, diced fine)\n- Onions (½, fine)\n- Coriander (handful)\n- Limes (1)\n- Jalapeños (1)\n- Garlic (1 clove)\n## Steps\n1. Dice tomatoes and drain excess juice.\n2. Combine with onion, coriander, jalapeño and garlic.\n3. Squeeze lime juice over.\n4. Season and rest 10 min.\n## Time\nPrep: 10 min · Cook: 0 min`,

  "Elote Corn": `## Ingredients\n- Corn (4 cobs)\n- Sour Cream (4 tbsp)\n- Cheddar (60g, grated)\n- Limes (1)\n- Smoked Paprika (1 tsp)\n- Coriander (handful)\n## Steps\n1. Grill or boil corn cobs until cooked.\n2. Brush sour cream over each.\n3. Roll in cheddar.\n4. Sprinkle smoked paprika.\n5. Squeeze lime and scatter coriander.\n## Time\nPrep: 3 min · Cook: 10 min`,

  "Avocado Lime Dip": `## Ingredients\n- Avocado (2)\n- Sour Cream (4 tbsp)\n- Limes (1)\n- Garlic (1 clove)\n- Coriander (handful)\n## Steps\n1. Blend avocado, sour cream, lime juice and garlic.\n2. Season well.\n3. Transfer to bowl.\n4. Top with coriander.\n5. Serve with tortilla chips.\n## Time\nPrep: 5 min · Cook: 0 min`,

  "Bean Stuffed Peppers": `## Ingredients\n- Capsicum (4)\n- Black Beans (400g)\n- White Rice (1 cup)\n- Cheddar (150g)\n- Salsa (4 tbsp)\n## Steps\n1. Cook rice.\n2. Mix rice, beans and salsa.\n3. Cut tops off capsicums, fill with mixture.\n4. Top with cheddar.\n5. Bake at 180°C 25 min.\n## Time\nPrep: 10 min · Cook: 30 min`,

  "Chicken Enchiladas": `## Ingredients\n- Corn Tortillas (8)\n- Chicken Breast (400g)\n- Tomatoes (3)\n- Onions (1)\n- Cheddar (150g)\n- Chilli Sauce (4 tbsp)\n- Sour Cream (4 tbsp)\n- Coriander (handful)\n## Steps\n1. Cook and shred chicken.\n2. Simmer tomatoes, onion and chilli sauce 8 min.\n3. Fill tortillas with chicken, roll and place in dish.\n4. Pour sauce over, top with cheddar.\n5. Bake at 180°C 20 min.\n## Time\nPrep: 15 min · Cook: 35 min`,

  "Beef Style Chilli": `## Ingredients\n- Mutton (500g, minced)\n- Black Beans (400g)\n- Tomatoes (3)\n- Onions (1)\n- Garlic (3 cloves)\n- Chipotle (2 tbsp)\n- Cumin Seeds (2 tsp)\n- Smoked Paprika (1 tsp)\n## Steps\n1. Brown minced meat with onions and garlic.\n2. Add cumin, paprika and chipotle.\n3. Add tomatoes and black beans.\n4. Simmer 25 min until thick.\n5. Serve with rice or tortillas.\n## Time\nPrep: 10 min · Cook: 35 min`,

  "Chicken Tinga": `## Ingredients\n- Chicken Breast (500g)\n- Tomatoes (3)\n- Onions (1)\n- Garlic (3 cloves)\n- Chipotle (2 tbsp)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n## Steps\n1. Poach chicken 15 min, shred.\n2. Blend tomatoes, onion, garlic and chipotle.\n3. Cook sauce with cumin and paprika 8 min.\n4. Add shredded chicken, simmer 10 min.\n5. Serve in tacos or over rice.\n## Time\nPrep: 10 min · Cook: 35 min`,

  "Black Bean Tacos": `## Ingredients\n- Corn Tortillas (8)\n- Black Beans (400g)\n- Avocado (2)\n- Tomatoes (2)\n- Coriander (handful)\n- Limes (1)\n- Sour Cream (4 tbsp)\n## Steps\n1. Warm black beans with cumin and salt.\n2. Warm tortillas.\n3. Fill with beans and sliced avocado.\n4. Add tomatoes and sour cream.\n5. Top with coriander and lime.\n## Time\nPrep: 8 min · Cook: 8 min`,

  "Chicken Burrito Bowl": `## Ingredients\n- White Rice (1½ cups)\n- Chicken Breast (400g)\n- Black Beans (400g)\n- Corn (1 cup)\n- Salsa (4 tbsp)\n- Sour Cream (4 tbsp)\n- Cheddar (100g)\n- Coriander (handful)\n## Steps\n1. Cook rice.\n2. Season and grill chicken, slice.\n3. Warm beans and corn.\n4. Build bowls: rice base, chicken, beans, corn.\n5. Top with salsa, sour cream, cheddar and coriander.\n## Time\nPrep: 8 min · Cook: 25 min`,

  "Stuffed Peppers Mexican": `## Ingredients\n- Capsicum (4)\n- White Rice (1 cup)\n- Black Beans (200g)\n- Tomatoes (2)\n- Onions (½)\n- Cheddar (150g)\n- Cumin Seeds (1 tsp)\n- Coriander (handful)\n## Steps\n1. Cook rice with cumin.\n2. Mix rice, beans, tomatoes and onion.\n3. Fill capsicums with mixture.\n4. Top with cheddar.\n5. Bake at 180°C 30 min.\n## Time\nPrep: 10 min · Cook: 35 min`,

  "Veggie Fajitas": `## Ingredients\n- Capsicum (3, strips)\n- Onions (1, strips)\n- Black Beans (400g)\n- Corn (1 cup)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n- Limes (1)\n- Tortilla Wraps (4)\n## Steps\n1. Stir-fry capsicum and onions on high heat 5 min.\n2. Add black beans and corn, cook 3 min.\n3. Season with cumin, paprika and salt.\n4. Warm tortillas.\n5. Fill with vegetables, squeeze lime.\n## Time\nPrep: 8 min · Cook: 12 min`,

  "Prawn Tacos": `## Ingredients\n- Corn Tortillas (8)\n- Prawns (400g)\n- Avocado (1)\n- Limes (1)\n- Coriander (handful)\n- Jalapeños (1)\n- Cumin Seeds (1 tsp)\n## Steps\n1. Season prawns with cumin and salt.\n2. Pan-fry prawns 2 min per side.\n3. Warm tortillas.\n4. Fill with prawns and sliced avocado.\n5. Top with jalapeño, coriander and lime.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Chicken Quesadilla": `## Ingredients\n- Tortilla Wraps (4)\n- Chicken Breast (300g)\n- Cheddar (200g)\n- Capsicum (1, diced)\n- Onions (½)\n- Salsa (4 tbsp)\n- Sour Cream (4 tbsp)\n## Steps\n1. Cook chicken with capsicum and onion, season.\n2. Spread filling on half of each tortilla.\n3. Cover with cheddar and fold.\n4. Cook in dry pan 2 min per side until golden.\n5. Serve with salsa and sour cream.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Mexican Vegetable Soup": `## Ingredients\n- Tomatoes (3)\n- Black Beans (400g)\n- Corn (1 cup)\n- Onions (1)\n- Garlic (3 cloves)\n- Cumin Seeds (1 tsp)\n- Chipotle (1 tbsp)\n- Coriander (handful)\n## Steps\n1. Sauté onions and garlic.\n2. Add cumin and chipotle, cook 1 min.\n3. Add tomatoes, cook 5 min.\n4. Add beans, corn and 2 cups water, simmer 15 min.\n5. Serve with coriander.\n## Time\nPrep: 5 min · Cook: 25 min`,

  // ── American additions ──
  "Pancakes": `## Ingredients\n- All-Purpose Flour (1½ cups)\n- Eggs (2)\n- Milk (300ml)\n- Butter (3 tbsp)\n- Sugar (2 tbsp)\n- Baking Powder (2 tsp)\n## Steps\n1. Whisk flour, sugar and baking powder.\n2. Beat eggs, milk and melted butter.\n3. Combine wet and dry — lumps are fine.\n4. Cook ladles in buttered pan 2 min per side.\n5. Serve with maple syrup.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Bacon and Eggs": `## Ingredients\n- Eggs (4)\n- Bacon (150g)\n- Butter (1 tbsp)\n- White Bread (4 slices)\n## Steps\n1. Fry bacon until crispy.\n2. Fry eggs in bacon fat.\n3. Toast bread.\n4. Serve eggs and bacon on toast.\n## Time\nPrep: 2 min · Cook: 10 min`,

  "French Toast American": `## Ingredients\n- White Bread (6 slices, thick)\n- Eggs (3)\n- Milk (100ml)\n- Butter (2 tbsp)\n- Cinnamon (½ tsp)\n- Vanilla Extract (½ tsp)\n## Steps\n1. Whisk eggs, milk, cinnamon and vanilla.\n2. Dip bread, coat both sides.\n3. Fry in butter 2–3 min per side until golden.\n4. Serve with maple syrup.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Breakfast Scramble": `## Ingredients\n- Eggs (4)\n- Capsicum (½, diced)\n- Onions (½, diced)\n- Bacon (100g)\n- Cheddar (60g)\n- Butter (2 tbsp)\n## Steps\n1. Fry bacon until crispy, break up.\n2. Sauté onion and capsicum in butter 3 min.\n3. Add eggs and scramble gently.\n4. Fold in bacon and cheddar just before serving.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Waffle Stack": `## Ingredients\n- All-Purpose Flour (1½ cups)\n- Eggs (2)\n- Milk (300ml)\n- Butter (3 tbsp)\n- Sugar (2 tbsp)\n- Baking Powder (2 tsp)\n## Steps\n1. Whisk all ingredients into smooth batter.\n2. Heat and grease waffle iron.\n3. Pour batter, cook until golden and crispy.\n4. Stack and drizzle with maple syrup.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Oatmeal with Maple": `## Ingredients\n- Oats (1 cup)\n- Milk (300ml)\n- Honey (3 tbsp)\n- Almonds (3 tbsp)\n- Bananas (1)\n## Steps\n1. Cook oats in milk, stirring, 5 min.\n2. Drizzle honey.\n3. Top with sliced banana and almonds.\n## Time\nPrep: 2 min · Cook: 5 min`,

  "Bagel with Cream Cheese": `## Ingredients\n- White Bread (4 bagels)\n- Creme Fraiche (4 tbsp)\n- Tomatoes (1, sliced)\n- Capers (2 tbsp)\n- Cucumber (½, sliced)\n## Steps\n1. Slice bagels, toast.\n2. Spread creme fraiche generously.\n3. Layer cucumber and tomato.\n4. Top with capers.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Avocado Toast American": `## Ingredients\n- White Bread (4 slices)\n- Avocado (2)\n- Limes (½)\n- Eggs (2)\n- Chilli Sauce (1 tbsp)\n## Steps\n1. Toast bread.\n2. Mash avocado with lime and salt.\n3. Spread on toast.\n4. Fry or poach eggs.\n5. Place egg on top, add chilli sauce.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Banana Bread": `## Ingredients\n- All-Purpose Flour (1½ cups)\n- Bananas (3, very ripe)\n- Eggs (2)\n- Butter (4 tbsp)\n- Sugar (½ cup)\n- Baking Powder (1 tsp)\n- Cinnamon (½ tsp)\n## Steps\n1. Mash bananas with sugar.\n2. Beat in eggs and melted butter.\n3. Fold in flour, baking powder and cinnamon.\n4. Pour into loaf tin.\n5. Bake at 180°C 50–55 min.\n## Time\nPrep: 10 min · Cook: 55 min`,

  "BLT Sandwich": `## Ingredients\n- White Bread (8 slices)\n- Bacon (200g)\n- Tomatoes (2)\n- Lettuce (4 leaves)\n- Butter (2 tbsp)\n## Steps\n1. Fry bacon until crispy.\n2. Toast bread and butter.\n3. Layer bacon, lettuce and tomato.\n4. Top with second slice.\n5. Cut diagonally.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Club Sandwich": `## Ingredients\n- White Bread (12 slices)\n- Bacon (200g)\n- Chicken Breast (300g)\n- Tomatoes (2)\n- Lettuce (4 leaves)\n- Butter (3 tbsp)\n## Steps\n1. Cook bacon and chicken, slice chicken.\n2. Toast all bread.\n3. First layer: chicken, lettuce, tomato.\n4. Add second toast, then bacon layer.\n5. Top with third toast, secure with toothpick.\n## Time\nPrep: 10 min · Cook: 15 min`,

  "Chicken Caesar Salad": `## Ingredients\n- Chicken Breast (400g)\n- Lettuce (1 head)\n- Parmesan (60g)\n- White Bread (3 slices, cubed)\n- Olive Oil (4 tbsp)\n- Garlic (2 cloves)\n- Lemons (½)\n- Dijon Mustard (1 tsp)\n## Steps\n1. Season and grill chicken, slice.\n2. Toss bread cubes with oil and garlic, bake until golden.\n3. Whisk olive oil, lemon and dijon into dressing.\n4. Toss lettuce in dressing.\n5. Top with chicken, croutons and parmesan.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Pulled Chicken Sandwich": `## Ingredients\n- Chicken Breast (500g)\n- Onions (1)\n- Garlic (3 cloves)\n- Chilli Sauce (4 tbsp)\n- Honey (2 tbsp)\n- Smoked Paprika (1 tsp)\n- White Bread (4 buns)\n## Steps\n1. Simmer chicken with onion, garlic and paprika 20 min.\n2. Shred with forks.\n3. Mix in chilli sauce and honey, stir on heat 5 min.\n4. Toast buns.\n5. Pile pulled chicken onto buns.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Cobb Salad": `## Ingredients\n- Chicken Breast (300g)\n- Eggs (3, hard-boiled)\n- Bacon (150g)\n- Avocado (1)\n- Tomatoes (2)\n- Lettuce (4 cups)\n- Cheddar (80g)\n## Steps\n1. Cook chicken and bacon.\n2. Slice eggs and avocado.\n3. Arrange lettuce in bowl.\n4. Place toppings in rows over lettuce.\n5. Drizzle olive oil and season.\n## Time\nPrep: 10 min · Cook: 15 min`,

  "Grilled Cheese Sandwich": `## Ingredients\n- White Bread (8 slices)\n- Cheddar (200g, sliced)\n- Butter (4 tbsp)\n- Dijon Mustard (2 tbsp)\n## Steps\n1. Spread mustard inside bread.\n2. Layer cheddar between slices.\n3. Butter outside generously.\n4. Fry on medium heat 3 min per side until golden.\n5. Rest 1 min before cutting.\n## Time\nPrep: 3 min · Cook: 8 min`,

  "Tuna Melt": `## Ingredients\n- White Bread (8 slices)\n- Salmon (2 cans, drained)\n- Cheddar (150g)\n- Onions (¼, diced)\n- Dijon Mustard (2 tbsp)\n- Butter (2 tbsp)\n## Steps\n1. Mix fish with onion and mustard.\n2. Spread on bread, top with cheddar.\n3. Add second slice, butter outside.\n4. Grill 3 min per side.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Corn Chowder": `## Ingredients\n- Corn (2 cups)\n- Potatoes (3, diced)\n- Onions (1)\n- Butter (2 tbsp)\n- Milk (400ml)\n- Bacon (100g)\n- Thyme (2 sprigs)\n## Steps\n1. Fry bacon, remove.\n2. Sauté onions in butter 3 min.\n3. Add potatoes and corn.\n4. Pour in milk and thyme, simmer 15 min.\n5. Blend half the soup, return to pot, top with bacon.\n## Time\nPrep: 8 min · Cook: 25 min`,

  "Black Bean Burger": `## Ingredients\n- Black Beans (400g)\n- Oats (½ cup)\n- Onions (½, diced)\n- Garlic (2 cloves)\n- Eggs (1)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n- White Bread (4 buns)\n## Steps\n1. Mash black beans, mix in oats, onion, garlic, egg and spices.\n2. Form into patties, chill 20 min.\n3. Pan-fry 4 min per side.\n4. Toast buns.\n5. Serve with salad.\n## Time\nPrep: 25 min · Cook: 12 min`,

  "Nachos": `## Ingredients\n- Corn Tortillas (4, cut and baked)\n- Cheddar (200g)\n- Jalapeños (2, sliced)\n- Black Beans (200g)\n- Sour Cream (4 tbsp)\n- Salsa (4 tbsp)\n## Steps\n1. Spread chips on baking tray.\n2. Scatter beans and jalapeños.\n3. Cover with cheddar.\n4. Bake at 200°C 10 min.\n5. Top with sour cream and salsa.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Buffalo Wings": `## Ingredients\n- Chicken Breast (600g, strips)\n- Chilli Sauce (4 tbsp)\n- Honey (2 tbsp)\n- Smoked Paprika (1 tsp)\n- Butter (2 tbsp)\n- Garlic (2 cloves)\n## Steps\n1. Toss chicken in paprika and salt.\n2. Bake at 220°C 20 min until crispy.\n3. Melt butter with garlic, add chilli sauce and honey.\n4. Toss baked chicken in sauce.\n## Time\nPrep: 5 min · Cook: 25 min`,

  "Potato Skins": `## Ingredients\n- Potatoes (4, large)\n- Cheddar (150g)\n- Bacon (100g)\n- Sour Cream (4 tbsp)\n- Butter (3 tbsp)\n- Chives (handful)\n## Steps\n1. Bake potatoes at 200°C 45 min.\n2. Halve, scoop flesh, brush skins with butter.\n3. Bake skins 10 min more until crispy.\n4. Fill with bacon and cheddar.\n5. Grill 3 min, serve with sour cream and chives.\n## Time\nPrep: 5 min · Cook: 60 min`,

  "Peanut Butter Cookies": `## Ingredients\n- All-Purpose Flour (1 cup)\n- Peanut Butter (1 cup)\n- Eggs (1)\n- Sugar (¾ cup)\n- Butter (4 tbsp)\n- Baking Powder (1 tsp)\n## Steps\n1. Cream butter, peanut butter and sugar.\n2. Beat in egg.\n3. Fold in flour and baking powder.\n4. Roll into balls, press with fork.\n5. Bake at 180°C 12 min.\n## Time\nPrep: 10 min · Cook: 12 min`,

  "Cornbread": `## Ingredients\n- Maize Flour (1 cup)\n- All-Purpose Flour (1 cup)\n- Eggs (2)\n- Milk (200ml)\n- Butter (4 tbsp)\n- Sugar (3 tbsp)\n- Baking Powder (2 tsp)\n## Steps\n1. Mix dry ingredients.\n2. Whisk eggs, milk and melted butter.\n3. Combine wet and dry.\n4. Pour into greased pan.\n5. Bake at 200°C 20 min.\n## Time\nPrep: 8 min · Cook: 20 min`,

  "Quesadillas": `## Ingredients\n- Tortilla Wraps (4)\n- Cheddar (200g)\n- Capsicum (1)\n- Onions (½)\n- Salsa (4 tbsp)\n- Sour Cream (4 tbsp)\n## Steps\n1. Sauté capsicum and onion 3 min.\n2. Spread veg on half of each tortilla.\n3. Cover with cheddar and fold.\n4. Cook in dry pan 2 min per side.\n5. Serve with salsa and sour cream.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Popcorn with Butter": `## Ingredients\n- Oats (½ cup)\n- Butter (3 tbsp)\n- Salt (pinch)\n## Steps\n1. Heat oats in pan with a little oil until they start to pop.\n2. Melt butter.\n3. Drizzle butter over popped grains.\n4. Toss with salt.\n## Time\nPrep: 1 min · Cook: 5 min`,

  "Chocolate Chip Cookies": `## Ingredients\n- All-Purpose Flour (2 cups)\n- Eggs (2)\n- Butter (200g)\n- Sugar (200g)\n- Baking Powder (1 tsp)\n- Vanilla Extract (1 tsp)\n- Almonds (½ cup, chopped)\n## Steps\n1. Cream butter and sugar.\n2. Beat in eggs and vanilla.\n3. Fold in flour and baking powder.\n4. Stir in almonds.\n5. Drop spoonfuls on tray, bake at 180°C 12 min.\n## Time\nPrep: 10 min · Cook: 12 min`,

  "Dip with Chips": `## Ingredients\n- Corn Tortillas (4, cut into triangles)\n- Sour Cream (½ cup)\n- Garlic (1 clove)\n- Chives (handful)\n- Salsa (½ cup)\n## Steps\n1. Mix sour cream with garlic and chives.\n2. Bake tortilla pieces at 200°C 8 min until crispy.\n3. Serve sour cream dip and salsa alongside chips.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Chicken and Waffles": `## Ingredients\n- All-Purpose Flour (1½ cups)\n- Eggs (2)\n- Milk (300ml)\n- Butter (3 tbsp)\n- Chicken Breast (400g)\n- Smoked Paprika (1 tsp)\n- Honey (3 tbsp)\n## Steps\n1. Make waffle batter and cook waffles.\n2. Season chicken with paprika and fry 5 min per side.\n3. Slice chicken.\n4. Serve chicken on waffles.\n5. Drizzle honey.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Meatloaf": `## Ingredients\n- Mutton (700g, minced)\n- Eggs (2)\n- Oats (½ cup)\n- Onions (1)\n- Garlic (3 cloves)\n- Chilli Sauce (3 tbsp)\n- Dijon Mustard (1 tbsp)\n## Steps\n1. Mix all ingredients together.\n2. Press into loaf tin.\n3. Spread chilli sauce over top.\n4. Bake at 180°C 45 min.\n5. Rest 10 min before slicing.\n## Time\nPrep: 10 min · Cook: 45 min`,

  "Pasta with Bacon": `## Ingredients\n- Pasta (300g)\n- Bacon (200g)\n- Garlic (3 cloves)\n- Eggs (2)\n- Parmesan (60g)\n- Black Pepper (1 tsp)\n## Steps\n1. Cook pasta.\n2. Fry bacon with garlic.\n3. Beat eggs with parmesan.\n4. Off heat, toss hot pasta with bacon.\n5. Add egg mixture, toss — heat of pasta cooks eggs.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Chicken Pot Pie": `## Ingredients\n- All-Purpose Flour (200g)\n- Chicken Breast (400g)\n- Potatoes (2, diced)\n- Carrots (2)\n- Onions (1)\n- Butter (100g)\n- Milk (300ml)\n- Thyme (3 sprigs)\n## Steps\n1. Make pastry: rub butter into flour, add water.\n2. Cook chicken, potatoes, carrots and onions in milk 15 min.\n3. Thicken with flour-butter paste.\n4. Pour into dish, top with pastry.\n5. Bake at 200°C 25 min.\n## Time\nPrep: 20 min · Cook: 45 min`,

  "Steak and Potatoes": `## Ingredients\n- Mutton (500g, thick cuts)\n- Potatoes (4, cubed)\n- Butter (3 tbsp)\n- Garlic (3 cloves)\n- Rosemary (3 sprigs)\n- Olive Oil (2 tbsp)\n## Steps\n1. Par-boil potatoes 8 min, drain.\n2. Roast potatoes with oil, garlic and rosemary at 200°C 30 min.\n3. Season mutton, sear in hot pan 3–4 min per side.\n4. Rest meat 5 min.\n5. Serve with roast potatoes.\n## Time\nPrep: 10 min · Cook: 40 min`,

  "Corn on the Cob": `## Ingredients\n- Corn (4 cobs)\n- Butter (3 tbsp)\n- Smoked Paprika (½ tsp)\n## Steps\n1. Boil corn 8–10 min.\n2. Drain and brush with butter.\n3. Sprinkle paprika and salt.\n## Time\nPrep: 2 min · Cook: 10 min`,

  "Southern Fried Chicken": `## Ingredients\n- Chicken Breast (600g)\n- All-Purpose Flour (1 cup)\n- Eggs (2)\n- Milk (100ml)\n- Smoked Paprika (2 tsp)\n- Garlic Powder (1 tsp)\n- Cumin Seeds (1 tsp)\n## Steps\n1. Season flour with paprika, garlic and cumin.\n2. Dip chicken in beaten egg-milk, then flour.\n3. Repeat for extra crunch.\n4. Pan-fry in oil 8 min per side on medium.\n5. Drain on paper towel.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Clam Chowder Style Soup": `## Ingredients\n- Potatoes (4, diced)\n- Onions (1)\n- Bacon (100g)\n- Milk (400ml)\n- Butter (2 tbsp)\n- Thyme (2 sprigs)\n- Garlic (2 cloves)\n## Steps\n1. Fry bacon, set aside.\n2. Sauté onions and garlic in butter.\n3. Add potatoes, milk and thyme.\n4. Simmer 20 min.\n5. Mash some potatoes for texture, top with bacon.\n## Time\nPrep: 8 min · Cook: 30 min`,

  // ── Vegan additions ──
  "Smoothie Bowl": `## Ingredients\n- Bananas (2, frozen)\n- Oats (½ cup)\n- Almonds (3 tbsp)\n- Honey (2 tbsp)\n- Strawberries (½ cup)\n- Coconut Milk (100ml)\n## Steps\n1. Blend frozen banana with coconut milk until thick.\n2. Pour into bowl.\n3. Top with oats, almonds and strawberries.\n4. Drizzle honey.\n## Time\nPrep: 5 min · Cook: 0 min`,

  "Overnight Oats": `## Ingredients\n- Oats (1 cup)\n- Coconut Milk (300ml)\n- Honey (3 tbsp)\n- Almonds (3 tbsp)\n- Bananas (1)\n- Cinnamon (½ tsp)\n## Steps\n1. Mix oats with coconut milk, honey and cinnamon.\n2. Cover and refrigerate overnight.\n3. Top with banana and almonds in morning.\n## Time\nPrep: 3 min · Cook: 0 min`,

  "Avocado Toast Vegan": `## Ingredients\n- White Bread (4 slices)\n- Avocado (2)\n- Limes (½)\n- Tomatoes (1)\n- Coriander (handful)\n## Steps\n1. Toast bread.\n2. Mash avocado with lime and salt.\n3. Spread on toast.\n4. Top with sliced tomato and coriander.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Banana Oat Pancakes": `## Ingredients\n- Oats (1 cup)\n- Bananas (2, ripe)\n- Cinnamon (½ tsp)\n- Vanilla Extract (½ tsp)\n## Steps\n1. Blend oats into flour.\n2. Mash banana and mix with oat flour, cinnamon and vanilla.\n3. Add splash of water to thin.\n4. Cook in oiled pan 2–3 min per side.\n5. Serve with honey.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Chia Pudding": `## Ingredients\n- Chia Seeds (3 tbsp)\n- Coconut Milk (300ml)\n- Honey (2 tbsp)\n- Strawberries (½ cup)\n- Almonds (2 tbsp)\n## Steps\n1. Stir chia seeds into coconut milk with honey.\n2. Refrigerate overnight.\n3. Stir in morning — should be thick.\n4. Top with strawberries and almonds.\n## Time\nPrep: 3 min · Cook: 0 min`,

  "Tempeh Bacon Toast": `## Ingredients\n- White Bread (4 slices)\n- Tofu (200g, sliced thin)\n- Soy Sauce (3 tbsp)\n- Smoked Paprika (1 tsp)\n- Honey (1 tbsp)\n- Garlic (1 clove)\n## Steps\n1. Marinate tofu in soy, paprika, honey and garlic 10 min.\n2. Pan-fry slices 3 min per side until caramelized.\n3. Toast bread.\n4. Serve tofu on toast.\n## Time\nPrep: 12 min · Cook: 8 min`,

  "Green Smoothie": `## Ingredients\n- Bananas (1)\n- Oats (¼ cup)\n- Coconut Milk (300ml)\n- Honey (1 tbsp)\n## Steps\n1. Blend all ingredients together.\n2. Add more coconut milk for thinner consistency.\n3. Drink immediately.\n## Time\nPrep: 2 min · Cook: 0 min`,

  "Granola Bowl": `## Ingredients\n- Oats (1 cup)\n- Honey (3 tbsp)\n- Almonds (3 tbsp)\n- Coconut Milk (1 cup)\n- Strawberries (½ cup)\n## Steps\n1. Toss oats and almonds with honey and oil.\n2. Bake at 180°C 15 min, cool.\n3. Serve granola in bowl with coconut milk.\n4. Top with strawberries.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Sweet Potato Toast": `## Ingredients\n- Sweet Potato (1, large)\n- Avocado (1)\n- Limes (½)\n- Coriander (handful)\n## Steps\n1. Slice sweet potato lengthwise into 1cm slabs.\n2. Toast in toaster 3–4 cycles until cooked through.\n3. Mash avocado with lime.\n4. Spread on sweet potato slabs.\n5. Top with coriander.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Chickpea Salad": `## Ingredients\n- Chickpeas (400g)\n- Tomatoes (2)\n- Cucumber (1)\n- Onions (½)\n- Coriander (handful)\n- Lemons (1)\n- Olive Oil (3 tbsp)\n## Steps\n1. Drain chickpeas.\n2. Dice tomatoes, cucumber and onion.\n3. Combine all with chickpeas.\n4. Dress with lemon and olive oil.\n5. Top with coriander.\n## Time\nPrep: 10 min · Cook: 0 min`,

  "Tempeh Stir Fry": `## Ingredients\n- Tofu (300g, cubed)\n- Broccoli (300g)\n- Capsicum (1)\n- Soy Sauce (4 tbsp)\n- Garlic (3 cloves)\n- Ginger (1cm)\n- Sesame Oil (1 tbsp)\n## Steps\n1. Pan-fry tofu until golden.\n2. Stir-fry garlic and ginger.\n3. Add broccoli and capsicum.\n4. Return tofu, add soy sauce.\n5. Drizzle sesame oil, serve with rice.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Jackfruit Tacos": `## Ingredients\n- Corn Tortillas (8)\n- Chickpeas (400g)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n- Chipotle (2 tbsp)\n- Avocado (1)\n- Coriander (handful)\n- Limes (1)\n## Steps\n1. Cook chickpeas with cumin, paprika and chipotle until sauce is thick.\n2. Warm tortillas.\n3. Fill with chickpeas and sliced avocado.\n4. Top with coriander and lime.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Quinoa Salad": `## Ingredients\n- White Rice (1 cup)\n- Chickpeas (200g)\n- Cucumber (1)\n- Tomatoes (2)\n- Lemons (1)\n- Olive Oil (3 tbsp)\n- Coriander (handful)\n## Steps\n1. Cook grain, cool completely.\n2. Mix with chickpeas, cucumber and tomatoes.\n3. Dress with lemon and olive oil.\n5. Top with coriander.\n## Time\nPrep: 8 min · Cook: 20 min`,

  "Black Bean Bowl": `## Ingredients\n- White Rice (1 cup)\n- Black Beans (400g)\n- Avocado (1)\n- Corn (1 cup)\n- Limes (1)\n- Coriander (handful)\n- Cumin Seeds (1 tsp)\n## Steps\n1. Cook rice.\n2. Warm black beans with cumin.\n3. Build bowls with rice.\n4. Add beans, corn and avocado.\n5. Squeeze lime, top with coriander.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Vegan Poke Bowl": `## Ingredients\n- White Rice (1 cup)\n- Tofu (300g, cubed)\n- Soy Sauce (3 tbsp)\n- Sesame Oil (1 tbsp)\n- Cucumber (1)\n- Avocado (1)\n- Sesame Seeds (2 tbsp)\n## Steps\n1. Cook rice.\n2. Marinate tofu in soy and sesame oil 10 min.\n3. Pan-fry tofu until golden.\n4. Build bowl: rice, tofu, cucumber, avocado.\n5. Drizzle remaining soy and scatter sesame seeds.\n## Time\nPrep: 15 min · Cook: 20 min`,

  "Mushroom Quinoa Soup": `## Ingredients\n- Mushrooms (300g)\n- Onions (1)\n- Garlic (3 cloves)\n- White Rice (½ cup)\n- Soy Sauce (2 tbsp)\n- Thyme (3 sprigs)\n- Olive Oil (2 tbsp)\n## Steps\n1. Sauté onions and garlic in olive oil.\n2. Add mushrooms, cook 6 min.\n3. Add 1.5L water, rice, soy sauce and thyme.\n4. Simmer 20 min.\n5. Season and serve.\n## Time\nPrep: 8 min · Cook: 30 min`,

  "Lentil and Spinach Curry": `## Ingredients\n- Red Lentils (1 cup)\n- Onions (1)\n- Garlic (3 cloves)\n- Tomatoes (2)\n- Cumin Seeds (1 tsp)\n- Turmeric (½ tsp)\n- Garam Masala (1 tsp)\n## Steps\n1. Sauté onions, garlic and cumin seeds.\n2. Add turmeric and garam masala.\n3. Add tomatoes and lentils with 600ml water.\n4. Simmer 20 min.\n5. Serve with rice.\n## Time\nPrep: 5 min · Cook: 25 min`,

  "Roasted Chickpeas": `## Ingredients\n- Chickpeas (400g)\n- Olive Oil (2 tbsp)\n- Smoked Paprika (1 tsp)\n- Cumin Seeds (1 tsp)\n## Steps\n1. Drain chickpeas, pat very dry.\n2. Toss with oil, paprika and cumin.\n3. Spread on baking tray.\n4. Roast at 200°C 30 min, shaking halfway, until crispy.\n## Time\nPrep: 3 min · Cook: 30 min`,

  "Energy Balls": `## Ingredients\n- Oats (1 cup)\n- Peanut Butter (½ cup)\n- Honey (3 tbsp)\n- Almonds (¼ cup)\n- Cinnamon (½ tsp)\n## Steps\n1. Mix all ingredients together.\n2. Roll into balls.\n3. Refrigerate 30 min.\n## Time\nPrep: 10 min · Cook: 0 min`,

  "Guacamole Vegan": `## Ingredients\n- Avocado (3)\n- Tomatoes (1, diced)\n- Onions (¼, fine)\n- Coriander (handful)\n- Limes (1)\n- Jalapeños (1)\n## Steps\n1. Mash avocado with lime juice and salt.\n2. Stir in tomato, onion, jalapeño and coriander.\n3. Adjust lime and salt.\n## Time\nPrep: 8 min · Cook: 0 min`,

  "Hummus Vegan": `## Ingredients\n- Chickpeas (400g)\n- Olive Oil (3 tbsp)\n- Lemons (1)\n- Garlic (2 cloves)\n- Cumin Seeds (½ tsp)\n## Steps\n1. Blend chickpeas with garlic, cumin and lemon.\n2. Add olive oil while blending.\n3. Add water for smoother texture.\n4. Season and serve with oil drizzle.\n## Time\nPrep: 5 min · Cook: 0 min`,

  "Kale Chips": `## Ingredients\n- Olive Oil (2 tbsp)\n- Smoked Paprika (1 tsp)\n## Steps\n1. Use any leafy green — wash and dry thoroughly.\n2. Tear into bite-size pieces.\n3. Toss with oil and paprika.\n4. Bake at 150°C 20 min until crispy.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Edamame Snack": `## Ingredients\n- Chickpeas (400g)\n- Soy Sauce (2 tbsp)\n- Sesame Oil (1 tbsp)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Cook or drain chickpeas.\n2. Toss with soy sauce and sesame oil.\n3. Scatter sesame seeds.\n4. Serve warm or cold.\n## Time\nPrep: 3 min · Cook: 5 min`,

  "Peanut Butter Banana Bites": `## Ingredients\n- Bananas (2)\n- Peanut Butter (4 tbsp)\n- Oats (4 tbsp)\n- Honey (2 tbsp)\n## Steps\n1. Slice bananas.\n2. Spread peanut butter on half the slices.\n3. Top with second slice.\n4. Roll edge in oats.\n5. Drizzle honey.\n## Time\nPrep: 5 min · Cook: 0 min`,

  "Trail Mix Bowl": `## Ingredients\n- Oats (½ cup)\n- Almonds (3 tbsp)\n- Peanut Butter (2 tbsp)\n- Honey (2 tbsp)\n## Steps\n1. Toast oats and almonds in dry pan 3 min.\n2. Mix with peanut butter and honey.\n3. Serve as granola or pack as snack.\n## Time\nPrep: 3 min · Cook: 3 min`,

  "Sweet Potato Hummus": `## Ingredients\n- Sweet Potato (1, large)\n- Chickpeas (200g)\n- Lemons (1)\n- Garlic (2 cloves)\n- Cumin Seeds (1 tsp)\n- Olive Oil (3 tbsp)\n## Steps\n1. Bake sweet potato at 200°C 30 min.\n2. Scoop flesh.\n3. Blend with chickpeas, lemon, garlic and cumin.\n4. Drizzle in olive oil while blending.\n5. Serve with bread.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Tofu and Broccoli Stir Fry": `## Ingredients\n- Tofu (400g, cubed)\n- Broccoli (400g)\n- Garlic (3 cloves)\n- Ginger (2cm)\n- Soy Sauce (4 tbsp)\n- Sesame Oil (1 tbsp)\n## Steps\n1. Pan-fry tofu until golden.\n2. Stir-fry garlic and ginger.\n3. Add broccoli, cook 4 min.\n4. Return tofu, add soy sauce.\n5. Drizzle sesame oil, serve with rice.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Jackfruit Curry": `## Ingredients\n- Chickpeas (400g)\n- Coconut Milk (400ml)\n- Tomatoes (2)\n- Onions (1)\n- Garlic (3 cloves)\n- Garam Masala (2 tsp)\n- Cumin Seeds (1 tsp)\n- Turmeric (½ tsp)\n## Steps\n1. Sauté onions, garlic and cumin seeds.\n2. Add garam masala and turmeric.\n3. Add tomatoes and chickpeas.\n4. Pour in coconut milk, simmer 20 min.\n5. Serve with rice.\n## Time\nPrep: 8 min · Cook: 30 min`,

  "Black Bean Enchiladas": `## Ingredients\n- Corn Tortillas (8)\n- Black Beans (400g)\n- Tomatoes (3)\n- Onions (1)\n- Garlic (2 cloves)\n- Cumin Seeds (1 tsp)\n- Chilli Sauce (3 tbsp)\n- Coriander (handful)\n## Steps\n1. Simmer tomatoes, onion and garlic with chilli sauce 8 min.\n2. Warm black beans with cumin.\n3. Fill tortillas with beans, roll into dish.\n4. Pour sauce over.\n5. Bake at 180°C 15 min, serve with coriander.\n## Time\nPrep: 10 min · Cook: 30 min`,

  "Lentil Bolognese": `## Ingredients\n- Red Lentils (1 cup)\n- Pasta (300g)\n- Tomatoes (3)\n- Onions (1)\n- Garlic (3 cloves)\n- Olive Oil (2 tbsp)\n- Thyme (3 sprigs)\n## Steps\n1. Sauté onions and garlic in olive oil.\n2. Add tomatoes and cook 5 min.\n3. Add lentils and 400ml water.\n4. Simmer 25 min until thick.\n5. Serve over cooked pasta.\n## Time\nPrep: 8 min · Cook: 35 min`,

  "Chickpea Tikka Masala": `## Ingredients\n- Chickpeas (400g)\n- Tomatoes (3)\n- Onions (1)\n- Garlic (3 cloves)\n- Ginger (2cm)\n- Coconut Milk (200ml)\n- Garam Masala (2 tsp)\n- Smoked Paprika (1 tsp)\n## Steps\n1. Sauté onions, garlic and ginger.\n2. Add paprika and garam masala, cook 1 min.\n3. Add tomatoes, cook 5 min.\n4. Add chickpeas and coconut milk.\n5. Simmer 20 min, serve with rice.\n## Time\nPrep: 8 min · Cook: 30 min`,

  "Tempeh Buddha Bowl": `## Ingredients\n- White Rice (1 cup)\n- Tofu (300g, cubed)\n- Broccoli (200g)\n- Avocado (1)\n- Soy Sauce (3 tbsp)\n- Sesame Seeds (2 tbsp)\n- Sesame Oil (1 tbsp)\n## Steps\n1. Cook rice.\n2. Pan-fry tofu until golden, add soy sauce.\n3. Blanch broccoli 2 min.\n4. Build bowls: rice, tofu, broccoli, avocado.\n5. Drizzle sesame oil, scatter sesame seeds.\n## Time\nPrep: 8 min · Cook: 20 min`,

  "Mushroom Stroganoff": `## Ingredients\n- Mushrooms (400g)\n- Onions (1)\n- Garlic (3 cloves)\n- Coconut Milk (200ml)\n- Dijon Mustard (1 tsp)\n- Thyme (3 sprigs)\n- Butter (2 tbsp)\n- Pasta (300g)\n## Steps\n1. Cook pasta.\n2. Sauté onions and garlic in butter.\n3. Add mushrooms and thyme, cook 8 min on high.\n4. Add coconut milk and dijon, simmer 5 min.\n5. Toss with pasta.\n## Time\nPrep: 8 min · Cook: 20 min`,

  "Vegan Thai Curry": `## Ingredients\n- Tofu (300g)\n- Broccoli (300g)\n- Coconut Milk (400ml)\n- Onions (1)\n- Garlic (3 cloves)\n- Ginger (2cm)\n- Soy Sauce (2 tbsp)\n- Cumin Seeds (1 tsp)\n## Steps\n1. Fry tofu until golden.\n2. Sauté onions, garlic and ginger.\n3. Add cumin, cook 1 min.\n4. Add broccoli and coconut milk, simmer 10 min.\n5. Return tofu, add soy sauce.\n## Time\nPrep: 8 min · Cook: 20 min`,

  "Sweet Potato and Lentil Stew": `## Ingredients\n- Sweet Potato (2, cubed)\n- Red Lentils (1 cup)\n- Tomatoes (2)\n- Onions (1)\n- Garlic (3 cloves)\n- Cumin Seeds (1 tsp)\n- Garam Masala (1 tsp)\n- Turmeric (½ tsp)\n## Steps\n1. Sauté onions, garlic and cumin.\n2. Add garam masala and turmeric.\n3. Add sweet potato, tomatoes and lentils.\n4. Add 600ml water, simmer 25 min.\n5. Serve with bread or rice.\n## Time\nPrep: 8 min · Cook: 30 min`,

  "Cauliflower Steak": `## Ingredients\n- Cauliflower (1 head)\n- Olive Oil (3 tbsp)\n- Smoked Paprika (1 tsp)\n- Garlic Powder (1 tsp)\n- Limes (½)\n- Coriander (handful)\n## Steps\n1. Cut cauliflower into 2cm-thick steaks.\n2. Brush with oil, paprika and garlic powder.\n3. Sear in hot pan 4 min per side.\n4. Finish in oven at 200°C 10 min.\n5. Squeeze lime, top with coriander.\n## Time\nPrep: 5 min · Cook: 18 min`,

  // ── South American additions ──
  "Arepas with Cheese": `## Ingredients\n- Maize Flour (2 cups)\n- Cheddar (150g)\n- Butter (2 tbsp)\n- Salt (1 tsp)\n## Steps\n1. Mix maize flour with warm water and salt into dough.\n2. Divide into balls, flatten into discs.\n3. Cook in buttered pan 5 min per side until golden crust forms.\n4. Slice open, stuff with cheddar.\n5. Return to pan 2 min until cheese melts.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Brazilian Scrambled Eggs": `## Ingredients\n- Eggs (4)\n- Tomatoes (1, diced)\n- Onions (½, diced)\n- Capsicum (½, diced)\n- Butter (2 tbsp)\n- Coriander (handful)\n## Steps\n1. Sauté onions and capsicum in butter 3 min.\n2. Add tomatoes, cook 2 min.\n3. Beat eggs, pour in.\n4. Stir gently until just set.\n5. Top with coriander.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Tropical Fruit Bowl": `## Ingredients\n- Bananas (2)\n- Coconut Milk (4 tbsp)\n- Honey (2 tbsp)\n- Almonds (2 tbsp)\n- Oats (¼ cup)\n## Steps\n1. Slice bananas.\n2. Arrange in bowl.\n3. Drizzle coconut milk and honey.\n4. Toast oats lightly.\n5. Scatter oats and almonds.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Avocado Toast Latin": `## Ingredients\n- White Bread (4 slices)\n- Avocado (2)\n- Limes (1)\n- Tomatoes (1, diced)\n- Coriander (handful)\n- Cumin Seeds (½ tsp)\n## Steps\n1. Toast bread.\n2. Mash avocado with lime, cumin and salt.\n3. Spread on toast.\n4. Top with tomato and coriander.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Colombian Oatmeal": `## Ingredients\n- Oats (1 cup)\n- Milk (300ml)\n- Cinnamon (½ tsp)\n- Honey (3 tbsp)\n- Bananas (1)\n## Steps\n1. Simmer oats in milk with cinnamon 5 min.\n2. Stir in honey.\n3. Serve with sliced banana.\n## Time\nPrep: 2 min · Cook: 8 min`,

  "Peruvian Chicken Rice": `## Ingredients\n- White Rice (1 cup)\n- Chicken Breast (400g)\n- Garlic (4 cloves)\n- Cumin Seeds (2 tsp)\n- Smoked Paprika (1 tsp)\n- Limes (1)\n- Coriander (handful)\n## Steps\n1. Marinate chicken with garlic, cumin, paprika and lime 15 min.\n2. Grill or pan-fry 5 min per side.\n3. Cook rice.\n4. Slice chicken over rice.\n5. Top with coriander and lime.\n## Time\nPrep: 18 min · Cook: 25 min`,

  "Quinoa Veggie Bowl": `## Ingredients\n- White Rice (1 cup)\n- Broccoli (200g)\n- Capsicum (1)\n- Avocado (1)\n- Limes (1)\n- Olive Oil (2 tbsp)\n- Coriander (handful)\n## Steps\n1. Cook grain.\n2. Roast broccoli and capsicum with olive oil 15 min.\n3. Build bowls with grain, vegetables and avocado.\n4. Squeeze lime and top with coriander.\n## Time\nPrep: 8 min · Cook: 20 min`,

  "Lomo Saltado": `## Ingredients\n- Mutton (400g, strips)\n- Potatoes (3)\n- Tomatoes (2, wedges)\n- Onions (1, wedges)\n- Soy Sauce (3 tbsp)\n- Cumin Seeds (1 tsp)\n- Coriander (handful)\n- White Rice (1 cup)\n## Steps\n1. Fry potato chips until golden.\n2. Cook rice.\n3. Stir-fry meat on very high heat 2 min.\n4. Add onions, tomatoes, cumin and soy sauce.\n5. Toss in chips, serve with rice and coriander.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Chicken Empanadas": `## Ingredients\n- All-Purpose Flour (2 cups)\n- Chicken Breast (300g)\n- Onions (1)\n- Garlic (3 cloves)\n- Eggs (2)\n- Butter (100g)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n## Steps\n1. Make pastry: rub butter into flour, bind with egg and water, chill 20 min.\n2. Cook chicken with onion, garlic, cumin and paprika, shred.\n3. Roll pastry, cut rounds, fill with chicken.\n4. Fold and crimp, brush with egg.\n5. Bake at 200°C 20 min.\n## Time\nPrep: 35 min · Cook: 30 min`,

  "Black Bean Soup": `## Ingredients\n- Black Beans (400g)\n- Onions (1)\n- Garlic (3 cloves)\n- Tomatoes (2)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n- Coriander (handful)\n- Limes (1)\n## Steps\n1. Sauté onions and garlic.\n2. Add cumin and paprika.\n3. Add tomatoes, cook 5 min.\n4. Add beans and 500ml water, simmer 20 min.\n5. Blend half, stir back, serve with coriander and lime.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Guacamole with Tortilla Chips": `## Ingredients\n- Avocado (3)\n- Tomatoes (1, fine)\n- Onions (¼, fine)\n- Limes (1)\n- Coriander (handful)\n- Corn Tortillas (4)\n## Steps\n1. Mash avocado with lime and salt.\n2. Stir in tomato, onion and coriander.\n3. Bake cut tortilla pieces at 200°C 8 min.\n4. Serve guacamole with chips.\n## Time\nPrep: 8 min · Cook: 8 min`,

  "Fried Plantain": `## Ingredients\n- Bananas (3, very ripe)\n- Olive Oil (3 tbsp)\n- Salt (pinch)\n## Steps\n1. Peel bananas and slice diagonally 1cm thick.\n2. Heat oil in pan on medium.\n3. Fry slices 3 min per side until golden.\n4. Drain on paper towel.\n5. Season with salt.\n## Time\nPrep: 3 min · Cook: 8 min`,

  "Arroz con Pollo": `## Ingredients\n- Chicken Breast (500g)\n- White Rice (1½ cups)\n- Onions (1)\n- Garlic (3 cloves)\n- Tomatoes (2)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n- Coriander (handful)\n## Steps\n1. Brown chicken in oil, set aside.\n2. Sauté onions and garlic with cumin and paprika.\n3. Add tomatoes, cook 5 min.\n4. Add rice and 700ml water.\n5. Return chicken, cover and cook 20 min.\n## Time\nPrep: 8 min · Cook: 35 min`,

  "Peruvian Aji Chicken": `## Ingredients\n- Chicken Breast (500g)\n- Garlic (4 cloves)\n- Cumin Seeds (2 tsp)\n- Smoked Paprika (2 tsp)\n- Limes (1)\n- Chilli Sauce (2 tbsp)\n- Coriander (handful)\n## Steps\n1. Blend garlic, cumin, paprika, lime and chilli into marinade.\n2. Coat chicken, marinate 20 min.\n3. Grill or pan-fry 5 min per side.\n4. Rest 5 min.\n5. Serve with coriander and lime.\n## Time\nPrep: 25 min · Cook: 15 min`,

  "Brazilian Chorizo Stew": `## Ingredients\n- Bacon (200g)\n- Black Beans (400g)\n- Onions (1)\n- Garlic (3 cloves)\n- Tomatoes (2)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n- White Rice (1 cup)\n## Steps\n1. Fry bacon until caramelized.\n2. Add onion and garlic.\n3. Add cumin, paprika and tomatoes.\n4. Add black beans and 200ml water.\n5. Simmer 20 min, serve with white rice.\n## Time\nPrep: 8 min · Cook: 30 min`,

  "Stuffed Plantains": `## Ingredients\n- Bananas (3, very ripe)\n- Black Beans (200g)\n- Cheddar (100g)\n- Cumin Seeds (½ tsp)\n- Coriander (handful)\n## Steps\n1. Slice bananas lengthwise, fry 3 min per side.\n2. Press flat, fry both sides again.\n3. Make slit, stuff with beans and cheddar.\n4. Grill 3 min to melt cheese.\n5. Top with coriander.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Coconut Fish Stew": `## Ingredients\n- Salmon (400g, chunks)\n- Coconut Milk (400ml)\n- Tomatoes (2)\n- Onions (1)\n- Garlic (3 cloves)\n- Coriander (handful)\n- Limes (1)\n- Cumin Seeds (1 tsp)\n## Steps\n1. Sauté onions and garlic with cumin.\n2. Add tomatoes, cook 5 min.\n3. Add coconut milk, bring to simmer.\n4. Add fish, cook 8 min gently.\n5. Top with coriander and lime.\n## Time\nPrep: 8 min · Cook: 20 min`,

  "Chorizo Rice Bowl": `## Ingredients\n- White Rice (1 cup)\n- Bacon (200g)\n- Black Beans (200g)\n- Capsicum (1)\n- Onions (½)\n- Smoked Paprika (1 tsp)\n- Coriander (handful)\n## Steps\n1. Cook rice.\n2. Fry bacon with capsicum and onion.\n3. Add paprika and black beans.\n4. Serve over rice.\n5. Top with coriander.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Yuca Fries": `## Ingredients\n- Potatoes (4, large)\n- Olive Oil (3 tbsp)\n- Garlic Powder (1 tsp)\n- Smoked Paprika (1 tsp)\n- Salt (1 tsp)\n## Steps\n1. Cut potatoes into thick chips.\n2. Par-boil 8 min, drain and dry.\n3. Toss with oil, garlic and paprika.\n4. Bake at 220°C 30 min, flipping halfway.\n5. Serve with salsa or sour cream.\n## Time\nPrep: 10 min · Cook: 40 min`,

  // ── Japanese additions ──
  "Japanese Tamagoyaki": `## Ingredients\n- Eggs (4)\n- Soy Sauce (1 tbsp)\n- Sugar (1 tbsp)\n## Steps\n1. Beat eggs with soy sauce and sugar.\n2. Heat small pan with oil.\n3. Pour thin layer of egg, roll up when set.\n4. Push roll to edge, pour another thin layer, roll again.\n5. Repeat until all egg used. Slice.\n## Time\nPrep: 3 min · Cook: 8 min`,

  "Japanese Rice Porridge": `## Ingredients\n- White Rice (½ cup)\n- Soy Sauce (2 tbsp)\n- Ginger (2cm)\n- Eggs (2)\n- Sesame Oil (1 tbsp)\n- Spring Onions (3)\n## Steps\n1. Simmer rice in 1.2L water 30 min until very soft.\n2. Stir in soy sauce and grated ginger.\n3. Poach eggs in the porridge 4 min.\n4. Drizzle sesame oil.\n5. Top with sliced spring onions.\n## Time\nPrep: 3 min · Cook: 35 min`,

  "Onigiri": `## Ingredients\n- White Rice (2 cups)\n- Soy Sauce (2 tbsp)\n- Sesame Seeds (2 tbsp)\n- Salmon (200g, cooked)\n## Steps\n1. Cook rice with slightly less water — needs to be sticky.\n2. Flake cooked salmon.\n3. Wet hands, take handful of rice.\n4. Press salmon into center, form triangles.\n5. Roll in sesame seeds, splash soy sauce.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Salmon Sushi Roll": `## Ingredients\n- White Rice (2 cups)\n- Salmon (200g)\n- Vinegar (3 tbsp)\n- Sugar (2 tbsp)\n- Cucumber (1, strips)\n- Sesame Seeds (2 tbsp)\n- Soy Sauce (to serve)\n## Steps\n1. Cook rice, stir vinegar and sugar in while hot. Cool.\n2. Lay rice on cling film, add salmon and cucumber.\n3. Roll tightly using cling film as guide.\n4. Slice and serve with soy sauce and sesame seeds.\n## Time\nPrep: 20 min · Cook: 25 min`,

  "Tofu Miso Ramen": `## Ingredients\n- Noodles (300g)\n- Tofu (200g)\n- Mushrooms (200g)\n- Soy Sauce (3 tbsp)\n- Ginger (2cm)\n- Garlic (3 cloves)\n- Sesame Oil (1 tbsp)\n- Spring Onions (4)\n## Steps\n1. Simmer garlic, ginger and mushrooms in 1.2L water 10 min.\n2. Add soy sauce.\n3. Pan-fry tofu separately until golden.\n4. Cook noodles in broth 3 min.\n5. Bowl noodles, top with tofu, sesame oil and spring onions.\n## Time\nPrep: 8 min · Cook: 18 min`,

  "Chicken Katsu": `## Ingredients\n- Chicken Breast (4 pieces)\n- All-Purpose Flour (½ cup)\n- Eggs (2)\n- Oats (1 cup, coarse)\n- Soy Sauce (4 tbsp)\n- Honey (2 tbsp)\n- Garlic (2 cloves)\n## Steps\n1. Flatten chicken between cling film.\n2. Coat in flour, beaten egg, then coarse oats.\n3. Pan-fry in oil 4 min per side until golden.\n4. Mix soy, honey and garlic into sauce.\n5. Serve sliced chicken over rice with sauce.\n## Time\nPrep: 10 min · Cook: 15 min`,

  "Agedashi Tofu": `## Ingredients\n- Tofu (400g, firm)\n- All-Purpose Flour (4 tbsp)\n- Soy Sauce (4 tbsp)\n- Ginger (2cm)\n- Spring Onions (4)\n- Sesame Seeds (1 tbsp)\n- Oil (for frying)\n## Steps\n1. Drain tofu, press dry, cube.\n2. Dust with flour.\n3. Fry in oil 3 min until crispy.\n4. Warm soy sauce with grated ginger.\n5. Serve tofu in sauce, top with spring onions and sesame.\n## Time\nPrep: 10 min · Cook: 10 min`,

  "Edamame Sesame Salad": `## Ingredients\n- Chickpeas (400g)\n- Cucumber (1, sliced)\n- Sesame Seeds (2 tbsp)\n- Soy Sauce (2 tbsp)\n- Sesame Oil (1 tbsp)\n- Ginger (1cm)\n- Limes (½)\n## Steps\n1. Cook or drain chickpeas.\n2. Combine with cucumber.\n3. Dress with soy, sesame oil, grated ginger and lime.\n4. Toss and scatter sesame seeds.\n## Time\nPrep: 5 min · Cook: 0 min`,

  "Japanese Pickled Cucumber": `## Ingredients\n- Cucumber (2)\n- Vinegar (4 tbsp)\n- Sugar (2 tbsp)\n- Soy Sauce (2 tbsp)\n- Sesame Seeds (1 tbsp)\n- Ginger (2cm)\n## Steps\n1. Slice cucumber thinly.\n2. Toss with salt, rest 10 min, squeeze out water.\n3. Mix vinegar, sugar and soy into brine.\n4. Combine with cucumber and grated ginger.\n5. Rest 20 min, scatter sesame seeds.\n## Time\nPrep: 30 min · Cook: 0 min`,

  "Sesame Onigiri": `## Ingredients\n- White Rice (2 cups)\n- Sesame Seeds (3 tbsp)\n- Soy Sauce (2 tbsp)\n- Sesame Oil (1 tsp)\n## Steps\n1. Cook rice until sticky.\n2. Mix sesame seeds and sesame oil through rice.\n3. Wet hands, form into triangles.\n4. Splash soy sauce.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Vegetable Tempura": `## Ingredients\n- All-Purpose Flour (1 cup)\n- Eggs (1)\n- Broccoli (200g, florets)\n- Capsicum (1, strips)\n- Oil (for frying)\n- Soy Sauce (4 tbsp, to serve)\n## Steps\n1. Make thin batter: flour, egg and very cold water — keep lumpy.\n2. Heat oil to 180°C.\n3. Dip vegetables in batter, fry 2–3 min until golden.\n4. Drain on paper towel.\n5. Serve with soy dipping sauce.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Oyakodon": `## Ingredients\n- Chicken Breast (400g)\n- Eggs (4)\n- Onions (1, sliced)\n- Soy Sauce (4 tbsp)\n- Sugar (1 tbsp)\n- White Rice (1 cup)\n- Spring Onions (4)\n## Steps\n1. Cook rice.\n2. Simmer onions in soy sauce, sugar and 200ml water 5 min.\n3. Add chicken strips, cook 5 min.\n4. Beat eggs and pour over, cover and cook 2 min until just set.\n5. Serve over rice with spring onions.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Yaki Udon": `## Ingredients\n- Noodles (300g)\n- Chicken Breast (300g, strips)\n- Capsicum (1)\n- Onions (1, strips)\n- Soy Sauce (4 tbsp)\n- Sesame Oil (1 tbsp)\n- Ginger (2cm)\n- Garlic (3 cloves)\n## Steps\n1. Cook noodles, drain.\n2. Stir-fry chicken in sesame oil.\n3. Add garlic, ginger, onion and capsicum.\n4. Add noodles and soy sauce.\n5. Toss on high heat 2 min.\n## Time\nPrep: 5 min · Cook: 15 min`,

          // names without needing cross-user reads (Firestore rules only allow own-profile reads).

        if (!sessionStorage.getItem("_fbSynced") && code) {
          setSyncing(true);

      }

  async function signIn() {
    if (_isNative) {
      try {
        var FirebaseAuthentication = window.Capacitor.Plugins.FirebaseAuthentication;
        if (!FirebaseAuthentication) throw new Error("FirebaseAuthentication plugin not found");
        var result = await FirebaseAuthentication.signInWithGoogle();
        var idToken = result && result.credential && result.credential.idToken;
        if (!idToken) throw new Error("No idToken in result");
        var credential = firebase.auth.GoogleAuthProvider.credential(idToken);
        return _fbAuth.signInWithCredential(credential);
      } catch(e) {
        console.error("Native sign-in failed", e);
        alert("Sign-in error: " + (e.message || String(e)));
      }
      return;
    }
    return _fbAuth.signInWithPopup(_fbGoogleProvider).catch(function(e) {
      console.error("Sign-in failed", e);
    });
  }
  function signOut() {
    _fsWriteEnabled = false;
    sessionStorage.removeItem("_fbSynced");
    sessionStorage.removeItem("_memberValidated");
    Object.values(SK).forEach(function(k){ localStorage.removeItem(k); });
    // Keep _LS_HH_KEY so next login finds the household code without a Firestore round-trip.
    // _setupHousehold always validates it against the server, so stale codes are corrected.
    localStorage.removeItem("pantryos-version");

  async function deleteAccount(deleteHouseholdData) {
    var u = _fbAuth.currentUser;

    try {

        }

      }

      await _fbDb.collection("users").doc(uid).delete().catch(function(){});
    } catch(e) {

    }
    Object.values(SK).forEach(function(k){ localStorage.removeItem(k); });

    // if Firestore is slow on their next login. _setupHousehold validates membership before use.
    localStorage.removeItem("pantryos-version");

            if(excludeMap[placedNames[ei]]&&excludeMap[placedNames[ei]].includes(cn)){blocked=true;break;}
            if(cd.excludeWith&&cd.excludeWith.includes(placedNames[ei])){blocked=true;break;}
          }
          if(blocked) continue;
          dishCommit[cn]--;
          if(dishCommit[cn]<=0) delete dishCommit[cn]; // clean up so it can't block must-include or normal pool
          freqCount[cn]=(freqCount[cn]||0)+1;
          placedNames.push(cn);
          return cn;
        }

        // ── 2. MUST-INCLUDE with mutual-exclusion cluster awareness ──
        // Skipped entirely in ignore-stock mode (don't force any dish in)
        if(!ignoreStock){
        // Step A: collect ALL eligible must-include candidates
        var mustCandidates=dishesForGen.filter(function(d){
          if(!d.mustInclude) return false;
          if(dishCommit[d.name]!==undefined) return false;
          if((freqCount[d.name]||0)>=1) return false;
          var cats=Array.isArray(d.mealCats)?d.mealCats:[d.mealCat||"Dinner"];
          if(!cats.includes(mc)) return false;
          if(d.weekendOnly===true&&!isWE) return false;
          if(d.weekendOnly==="weekday"&&isWE) return false;
          if(!isFullyStocked(d)) return false;
          if(dishHasActiveAllergen(d)) return false;
          var ings=(d.mustIncludeIngredients&&d.mustIncludeIngredients.length)
            ? d.mustIncludeIngredients
            : (d.mustIncludeIngredient?[d.mustIncludeIngredient]:[]);
          if(ings.length===0||!ings.some(function(ing){return stockedNameSet.has(ing.toLowerCase());})) return false;
          for(var i=0;i<placedNames.length;i++){
            if(excludeMap[placedNames[i]]&&excludeMap[placedNames[i]].includes(d.name)) return false;
            if(d.excludeWith&&d.excludeWith.includes(placedNames[i])) return false;
          }
          return true;
        });
        if(mustCandidates.length>0){
          // Step B: BFS connected-components — cluster dishes that mutually exclude each other
          var cNames=mustCandidates.map(function(d){return d.name;});
          var clusterOf={}; var clusters=[];
          cNames.forEach(function(n){clusterOf[n]=-1;});
          cNames.forEach(function(n){
            if(clusterOf[n]!==-1) return;
            var cluster=[]; var queue=[n];
            while(queue.length){
              var cur=queue.shift();
              if(clusterOf[cur]!==-1) continue;
              cluster.push(cur);
              clusterOf[cur]=clusters.length;
              var curDish=dishesForGen.find(function(d){return d.name===cur;});
              cNames.forEach(function(other){
                if(clusterOf[other]!==-1) return;
                var otherDish=dishesForGen.find(function(d){return d.name===other;});
                var connected=
                  (curDish&&curDish.excludeWith&&curDish.excludeWith.includes(other))||
                  (otherDish&&otherDish.excludeWith&&otherDish.excludeWith.includes(cur))||
                  (excludeMap[cur]&&excludeMap[cur].includes(other))||
                  (excludeMap[other]&&excludeMap[other].includes(cur));
                if(connected) queue.push(other);
              });
            }
            clusters.push(cluster);
          });
          // Step C: from each cluster pick the dish with lowest suggestedCount
          // Shuffle cluster first so iteration order has no bias, then pick min count
          var must=null; var bestScore=Infinity;
          clusters.forEach(function(cluster){
            // Fisher-Yates shuffle to remove first-created-dish bias
            var shuffled=cluster.slice();
            for(var si=shuffled.length-1;si>0;si--){
              var sj=Math.floor(Math.random()*(si+1));
              var tmp=shuffled[si]; shuffled[si]=shuffled[sj]; shuffled[sj]=tmp;
            }
            var winner=null; var winScore=Infinity;
            shuffled.forEach(function(nm){
              var d=dishesForGen.find(function(x){return x.name===nm;});
              var sc=d?(d.suggestedCount||0):0;
              if(sc<winScore){winScore=sc;winner=d;}
            });
            if(winner&&winScore<bestScore){bestScore=winScore;must=winner;}
          });
          if(must){
            freqCount[must.name]=(freqCount[must.name]||0)+1;
            placedNames.push(must.name);
            // Commit remaining timesPerWeek-1 slots so the winner appears the right number of times
            var mustRemaining=(must.timesPerWeek||0)-1;
            if(mustRemaining>0) dishCommit[must.name]=mustRemaining;
            return must.name;
          }
        }

        } // end if(!ignoreStock) for must-include

        // ── 3. NORMAL eligible pool (timesPerWeek=0 dishes only, max 1 each) ──
        var eligible=dishesForGen.filter(function(d){
          if(dishCommit[d.name]!==undefined) return false; // committed dishes handled above
          var cats=Array.isArray(d.mealCats)?d.mealCats:[d.mealCat||"Dinner"];
          if(!cats.includes(mc)) return false;
          if(!isFullyStocked(d)) return false;
          if(dishHasActiveAllergen(d)) return false;
          if(d.lockedForMenu===true) return false;
          if(d.weekendOnly===true&&!isWE) return false;
          if(d.weekendOnly==="weekday"&&isWE) return false;
          if(d.michelinLevel===true&&!isMich) return false;
          if((freqCount[d.name]||0)>=1) return false; // max once for timesPerWeek=0
          for(var i=0;i<placedNames.length;i++){
            if(excludeMap[placedNames[i]]&&excludeMap[placedNames[i]].includes(d.name)) return false;
            if(d.excludeWith&&d.excludeWith.includes(placedNames[i])) return false;
          }
          return true;
        });
        if(isMich){
          var mich=eligible.filter(function(d){return d.michelinLevel;});
          if(mich.length) eligible=mich;
        }
        function sortRand(arr){
          return arr.slice().sort(function(a,b){
            var diff=(a.suggestedCount||0)-(b.suggestedCount||0);
            return diff!==0?diff:Math.random()-0.5;
          });
        }
        var poolA=sortRand(eligible.filter(function(d){return !lastMenuNames.has(d.name);}));
        var poolB=sortRand(eligible.filter(function(d){return lastMenuNames.has(d.name);}));
        var chosen=(poolA.length?poolA:poolB)[0];
        if(chosen){
          freqCount[chosen.name]=(freqCount[chosen.name]||0)+1;
          placedNames.push(chosen.name);
          var chosenRemain=(chosen.timesPerWeek||0)-1;
          if(chosenRemain>0 && !dishCommit[chosen.name]){
            dishCommit[chosen.name]=chosenRemain;
          }
          return chosen.name;
        }

        // ── 4. FALLBACK: up to 2 lockedForMenu dishes (timesPerWeek=0 only) ──
        var lockedUsed=placedNames.filter(function(n){
          var d2=dishesForGen.find(function(x){return x.name===n;});
          return d2&&d2.lockedForMenu;
        }).length;
        if(lockedUsed<2){
          var lockedPool=sortRand(dishesForGen.filter(function(d){
            if(dishCommit[d.name]!==undefined) return false;
            var cats=Array.isArray(d.mealCats)?d.mealCats:[d.mealCat||"Dinner"];
            if(!cats.includes(mc)) return false;
            if(!d.lockedForMenu) return false;
            if(d.weekendOnly===true&&!isWE) return false;
            if(d.weekendOnly==="weekday"&&isWE) return false;
            if(!isFullyStocked(d)) return false;
            if(dishHasActiveAllergen(d)) return false;
            if((freqCount[d.name]||0)>=1) return false;
            for(var i=0;i<placedNames.length;i++){
              if(d.name===placedNames[i]) return false;
              if(excludeMap[placedNames[i]]&&excludeMap[placedNames[i]].includes(d.name)) return false;
              if(d.excludeWith&&d.excludeWith.includes(placedNames[i])) return false;
            }
            return true;
          }));
          if(lockedPool[0]){
            var lc=lockedPool[0];
            freqCount[lc.name]=(freqCount[lc.name]||0)+1;
            placedNames.push(lc.name);
            return lc.name;
          }
        }
        return "";
      }


      // Fill non-AI slots; unfillable inventory slots → AI fallback
      var aiSlotsNeeded=[];
      var aiFallbackSlots=[];
      remainingDays.forEach(function(d){
        mealCats.forEach(function(mc){
          if(plan[d][mc]!==null) return;
          var key=d+"|"+mc;
          if(aiSlotSel&&aiSlotSel[key]){
            aiSlotsNeeded.push({day:d,mc:mc,isUserAI:true});
          } else {
            var picked=pickFromInventory(d,mc);
            if(picked){
              plan[d][mc]=picked;
            } else {
              // No inventory dish available — AI fallback with 100% pantry adherence
              aiFallbackSlots.push({day:d,mc:mc,isUserAI:false});
              aiSlotsNeeded.push({day:d,mc:mc,isUserAI:false});
            }
          }
        });
      });

      // Call AI for AI slots (skip if AI unavailable — unfilled slots trigger post-gen warning)
      if(aiSlotsNeeded.length>0 && aiEnabled && (apiKey || geminiKey)){
        var allDishNames=dishes.map(function(d){return d.name;});
        var aiTmpl="{\n"+aiSlotsNeeded.map(function(s){
          var isWE=WEEKEND.includes(s.day);
          var isMich=isWE&&michelinWeekend&&(s.mc==="Lunch"||s.mc==="Dinner");
          var ph=isMich?"MICHELIN_"+s.mc.toUpperCase():(s.mc==="Snacks"?"SNACK":(s.isUserAI?"AI_DISH":"PANTRY_FALLBACK"));
          return '  "'+s.day+'___'+s.mc+'":"'+ph+'"';
        }).join(",\n")+"\n}";

        var hasFallback=aiSlotsNeeded.some(function(s){return !s.isUserAI;});
        var sysMix=
          "You are a creative chef. Output ONLY valid JSON, no markdown, no preamble.\n"+
          "Fill each key (DAY___MEALCATEGORY format) with a creative dish name.\n"+
          "AI_DISH=creative dish, SNACK=simple max 20min snack, MICHELIN_*=Gourmet quality.\n"+
          (hasFallback?"PANTRY_FALLBACK slots: use ONLY the exact ingredients listed. Zero creativity outside pantry.\n":"")+
          "Use ONLY pantry ingredients listed below. Staples (oil,salt,water,sugar,pepper) always available.\n"+
          "Dish names must be 30 characters or fewer (including spaces).\n"+
          allergenLine+
          stockConstraintLine+
          "Do NOT use or closely resemble: "+allDishNames.join(", ")+"\n"+
          (cookTime>0?"Max cook: "+cookTime+"min.\n":"")+
          (dietFlags.length?"Diet: "+dietFlags.join(",")+"\n":"")+
          (macroLines.length?"Macros: "+macroLines.join(",")+"\n":"");

        var msgMix="PANTRY:\n"+stockDesc+"\nFRUITS:"+fruits.join(",")+" VEGS:"+vegs.join(",")+" TODAY:"+todayName+"\n\n"+aiTmpl;

        try{
          // Stream and parse day___mc format
          var aiResult=(await callAI({system:sysMix,prompt:msgMix,maxTokens:4000,stream:true})).json;
          aiSlotsNeeded.forEach(function(s){
            var k=s.day+"___"+s.mc;
            if(aiResult&&aiResult[k]&&typeof aiResult[k]==="string"&&aiResult[k]){
              plan[s.day][s.mc]=aiResult[k];
            } else {
              plan[s.day][s.mc]=pickFromInventory(s.day,s.mc); // fallback
            }
          });
        }catch(e){
          setAiError("AI slot error: "+(e.message||"failed")+". Using inventory fallback.");
          aiSlotsNeeded.forEach(function(s){ plan[s.day][s.mc]=pickFromInventory(s.day,s.mc); });
        }
      }
    }

    // ── Fetch ingredients for AI-generated dishes (batch call) ──
    if(apiKey || geminiKey){
      var dishNameSet3=new Set(dishes.map(function(d){return d.name;}));
      var aiDishNames=[];
      Object.values(plan).forEach(function(dayPlan){
        if(!dayPlan||typeof dayPlan!=="object") return;
        Object.values(dayPlan).forEach(function(name){
          if(name && !dishNameSet3.has(name) && !(name in aiDishIngredients)){
            aiDishNames.push(name);
          }
        });
      });
      // Deduplicate
      aiDishNames=[...new Set(aiDishNames)];
      if(aiDishNames.length>0){
        try{
          // Build id→name map so Claude returns IDs (100% match, no string drift)
          var STAPLE_SET=new Set(["oil","cooking oil","salt","water","sugar","black pepper","ghee","butter"]);
          var nonStapleItems=items.filter(function(it){
            return !STAPLE_SET.has(it.name.toLowerCase().trim());
          });
          var pantryIdMap={};
          nonStapleItems.forEach(function(it){ pantryIdMap[it.id]=it.name; });
          var pantryList=nonStapleItems.map(function(it){return it.id+":"+it.name;}).join(", ");
          var ingPrompt=
            "Pantry items (id:name):\n"+pantryList+"\n\n"+
            "For each dish below, return the IDs of pantry items needed to make it.\n"+
            "Return ONLY valid JSON, no markdown: {\"dish name\": [id1, id2, ...]}\n"+
            "Use ONLY the numeric IDs from the list above. Omit staples.\n"+
            "Dishes: "+aiDishNames.join(", ");
          var ingResult=(await callAI({
            system:"You are a culinary assistant. Output ONLY valid JSON with numeric IDs. No markdown, no preamble.",
            prompt:ingPrompt,maxTokens:4000,stream:true})).json;
          if(ingResult && typeof ingResult==="object"){
            // Store as {dishName: [itemId, ...]} — IDs guaranteed to match pantry
            var mapped={};
            Object.keys(ingResult).forEach(function(dishName){
              var ids=ingResult[dishName];
              if(Array.isArray(ids)){
                // Validate each ID exists in pantry
                var validIds=ids.filter(function(id){
                  return pantryIdMap[id]!==undefined || pantryIdMap[Number(id)]!==undefined;
                }).map(function(id){return Number(id)||id;});
                mapped[dishName]=validIds; // always store, even [] — marks as "fetched, no pantry matches"
              }
            });
            setAiDishIngredients(function(prev){return Object.assign({},prev,mapped);});
          }
        }catch(e){ /* silent fail — shopping list just won't show AI ingredients */ }
      }
    }

    var newMenu={weekKey:getWeekKey(),plan:plan,generatedOnSaturday:isSaturday||false};
    if(isSaturday){
      // Saturday: store as NEXT week's menu — don't overwrite current week
      setNextMenu(newMenu);
      // Stamp lastAutoGen so the "missed Saturday" popup doesn't fire on Sunday
      // for menus generated manually (not just by the auto-scheduler)
      setLastAutoGen(newMenu.weekKey);
      // Do NOT clear confirmedDays — current week's confirmed state must stay intact
    } else {
      setMenu(newMenu);
      setNextMenu(null); // clear any leftover next-week plan
      setConfirmedDays({}); // flush confirmed state — new current week menu
    }
    // After generate: update lockedForMenu — dishes in NEW menu=true, rest=false
    // (dishesForGen only exists in mixed mode; handle both modes)
    {
      var dishNameSet2=new Set(dishes.map(function(d){return d.name;}));
      var newMenuInventoryNames=new Set();
      Object.values(plan).forEach(function(dayPlan){
        if(!dayPlan||typeof dayPlan!=="object") return;
        Object.values(dayPlan).forEach(function(name){
          if(name && dishNameSet2.has(name)) newMenuInventoryNames.add(name);
        });
      });
      setDishes(function(prev){
        return prev.map(function(d){
          return Object.assign({},d,{lockedForMenu: newMenuInventoryNames.has(d.name)});
        });
      });
    }

    if(autoNutrition){ setTimeout(function(){checkNutrition(newMenu);},400); }

    // Warn if any slots couldn’t be filled — build specific reason list
    var emptySlots=0;
    remainingDays.forEach(function(d){
      mealCats.forEach(function(mc){ if(!plan[d][mc]) emptySlots++; });
    });
    if(emptySlots>0){
      var gapReasons=[];
      if(activeAllergens.length){
        var alLabels=activeAllergens.map(function(id){var al=ALLERGENS.find(function(a){return a.id===id;});return al?al.label:id;});
        gapReasons.push("Active allergens ("+alLabels.join(", ")+") are filtering out matching dishes");
      }
      if(!_ignoreStock) gapReasons.push("’Stocked only’ mode limits dishes to fully stocked ingredients");
      if(!aiEnabled) gapReasons.push("AI is switched off — turn it on to fill remaining slots automatically");
      else if(!(apiKey||geminiKey)) gapReasons.push("No AI account connected — add a key in Settings to fill remaining slots");
      if(!gapReasons.length) gapReasons.push("Not enough dishes in your pantry to fill all meal slots");
      setMenuGapModal({count:emptySlots, reasons:gapReasons});
    }

    setAiLoading(false);
  }

  // ── Shared: stream API call, merge into plan by day key ──
  async function runStream(systemPrompt,userMsg,plan,remainingDays){
    var raw=(await callAI({system:systemPrompt,prompt:userMsg,maxTokens:4000,stream:true})).json;
    var DAY_NAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    if(!raw||!Object.keys(raw).some(function(k){return DAY_NAMES.includes(k);})){
      throw new Error("AI returned unexpected format");
    }
    remainingDays.forEach(function(d){
      if(raw[d]&&typeof raw[d]==="object"){
        Object.keys(raw[d]).forEach(function(mc){
          if(plan[d]&&plan[d][mc]===null){
            var v=raw[d][mc];
            plan[d][mc]=(typeof v==="string"?v:"");
          }
        });
      }
    });
  }

  // ── Shared: stream API call, return parsed JSON object ──
  function repairAndParse(str) {
    if(!str) return null;
    str = str.trim();
    // Strip markdown code fences
    str = str.replace(/^```[a-z]*\n?/i, '').replace(/```$/,'').trim();
    // Try direct parse first
    try { return JSON.parse(str); } catch(_) {}
    // Find first { and last } to extract JSON object
    var start = str.indexOf('{');
    var end = str.lastIndexOf('}');
    if(start < 0 || end < 0) return null;
    str = str.slice(start, end+1);
    try { return JSON.parse(str); } catch(_) {}
    // Attempt to fix common issues: trailing commas, unquoted values
    str = str.replace(/,\s*([}\]])/g, '$1');
    try { return JSON.parse(str); } catch(_) {}
    return null;
  }

  async function callGemini({ system, prompt, maxTokens }) {
    var fullPrompt = system ? system + "\n\n" + prompt : prompt;
    var body = JSON.stringify({
      contents: [{ parts: [{ text: fullPrompt }] }],
      generationConfig: { maxOutputTokens: maxTokens }
    });
    var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + geminiKey;
    var maxAttempts = 3;
    for (var attempt = 1; attempt <= maxAttempts; attempt++) {
      var res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: body });
      if (res.status === 429) {
        if (attempt < maxAttempts) {
          var errData = await res.json().catch(function(){ return {}; });
          var retryDelay = 15;
          try {
            var details = (errData.error && errData.error.details) || [];
            for (var i = 0; i < details.length; i++) {
              if (details[i].retryDelay) { retryDelay = parseInt(details[i].retryDelay) || 15; break; }
            }
          } catch(_) {}
          await new Promise(function(r){ setTimeout(r, (retryDelay + 1) * 1000); });
          continue;
        }
        throw new Error("Gemini rate limit hit. Wait a moment and try again (free tier: 15 req/min).");
      }
      if (!res.ok) throw new Error("Gemini " + res.status + ": " + res.statusText);
      var data = await res.json();
      var text = ((data.candidates || [])[0]?.content?.parts || []).map(function(p){ return p.text || ""; }).join("").trim();
      return { text: text, json: repairAndParse(text) };
    }
  }

  async function callAI({ system, prompt, maxTokens, stream = false }) {
    if (geminiKey && !apiKey) return callGemini({ system, prompt, maxTokens });
    if (!apiKey && !geminiKey) throw new Error("No AI key set. Add a Gemini or Claude key in Settings.");
    var body = {
      model: modelName, max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }]
    };
    if (system) body.system = system;
    if (stream) body.stream = true;
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json", "x-api-key": apiKey,
        "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      var err = await res.json().catch(function() { return {}; });
      throw new Error("API " + (res.status) + ": " + ((err.error && err.error.message) || res.statusText));
    }
    var text = "", inputTok = 0, outputTok = 0;
    if (stream) {
      var reader = res.body.getReader(); var decoder = new TextDecoder();
      var streamDone = false;
      while (true) {
        var rr; try { rr = await reader.read(); } catch(_) { break; }
        if (rr.done) break;
        var lines = decoder.decode(rr.value, { stream: true }).split("\n");
        for (var li = 0; li < lines.length; li++) {
          var line = lines[li];
          if (!line.startsWith("data: ")) continue;
          var sseData = line.slice(6).trim();
          if (!sseData) continue;
          if (sseData === "[DONE]") { streamDone = true; continue; }
          try {
            var evt = JSON.parse(sseData);
            if (evt.type === "content_block_delta" && evt.delta && evt.delta.text) text += evt.delta.text;
            if (evt.type === "message_delta" && evt.usage) outputTok = evt.usage.output_tokens || 0;
            if (evt.type === "message_start" && evt.message && evt.message.usage) inputTok = evt.message.usage.input_tokens || 0;
            if (evt.type === "message_stop") streamDone = true;
          } catch(_) {}
        }
        if (streamDone) break;
      }
      try { reader.cancel(); } catch(_) {}
    } else {
      var respData = await res.json();
      text = (respData.content || []).map(function(b) { return b.text || ""; }).join("").trim();
      inputTok = (respData.usage && respData.usage.input_tokens) || 0;
      outputTok = (respData.usage && respData.usage.output_tokens) || 0;
    }
    // $0.80/M input, $4.00/M output (claude-haiku-4-5 rates)
    var callCost = (inputTok * 0.8 + outputTok * 4) / 1000000;
    setApiCost(function(prev) { return Math.round((prev + callCost) * 1000000) / 1000000; });
    return { text: text, json: repairAndParse(text) };
  }


  // ── Swap single meal slot ──
  async function swapDish(day, mealCat, current, forceAI) {
    setSwapLoading(true);
    setSwapError("");

    var currentDishInInventory = dishes.some(function(d){ return d.name===current; });
    var slotWasAI = !currentDishInInventory;
    // Check if user has aiSlotSel for this slot (explicitly marked AI)
    var slotKey = day+"|"+mealCat;
    var slotIsAI = slotWasAI || !!(aiSlotSel && aiSlotSel[slotKey]);

    if(!slotIsAI && !forceAI){
      // Inventory swap: pick from inventory (excluding current dish)
      var excludeCurrent = [current];
      var WEEKEND_S=["Saturday","Sunday"];
      var STAPLE_PASS_S=new Set(["oil","cooking oil","salt","water","sugar","black pepper"]);
      var stockedNameSet_s=new Set(stockedItems.map(function(i){return i.name.toLowerCase();}));
      function isFullyStocked_s(d){
        if(!d.ingredients||d.ingredients.length===0) return true;
        return d.ingredients.every(function(ing){return stockedNameSet_s.has(ing.toLowerCase())||STAPLE_PASS_S.has(ing.toLowerCase());});
      }
      var isWE=WEEKEND_S.includes(day);
      var isMich=isWE&&michelinWeekend&&(mealCat==="Lunch"||mealCat==="Dinner");
      var lastMenuNames_s=new Set();
      if(menu&&menu.plan) Object.values(menu.plan).forEach(function(dm){
        if(dm&&typeof dm==="object") Object.values(dm).forEach(function(v){if(v)lastMenuNames_s.add(v);});
      });
      var excludeMap_s={};
      dishes.forEach(function(d){if(d.excludeWith&&d.excludeWith.length)excludeMap_s[d.name]=d.excludeWith;});
      var alreadyPlaced=menu&&menu.plan&&menu.plan[day]?Object.values(menu.plan[day]).filter(function(v){return v&&v!==current;}):[];
      var eligible_s=dishes.filter(function(d){
        var cats=Array.isArray(d.mealCats)?d.mealCats:[d.mealCat||"Dinner"];
        if(!cats.includes(mealCat)) return false;

      const isMidnightWindow = hour === 0 && minute >= 1 && minute <= 10;
