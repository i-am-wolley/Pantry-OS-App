  "Tom Yum Soup": `## Ingredients\n- Prawns (300g)\n- Lemongrass (2 stalks, bruised)\n- Kaffir Lime Leaves (4)\n- Galangal (4 slices)\n- Mushrooms (150g)\n- Fish Sauce (3 tbsp)\n- Limes (2)\n- Green Chilli (2)\n## Steps\n1. Boil lemongrass, kaffir lime, galangal and chilli in 1L water 5 min.\n2. Add mushrooms, simmer 3 min.\n3. Add prawns, cook 3 min.\n4. Season with fish sauce and lime juice.\n5. Serve immediately garnished with coriander.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Coconut Tofu Curry": `## Ingredients\n- Tofu (300g)\n- Coconut Milk (400ml)\n- Thai Red Curry Paste (2 tbsp)\n- Bok Choy (2 heads)\n- Fish Sauce (2 tbsp)\n- Limes (1)\n- Basil (handful)\n## Steps\n1. Fry curry paste in 3 tbsp coconut milk 1 min.\n2. Add cubed tofu, cook 3 min.\n3. Pour in coconut milk and ¼ cup water, simmer 8 min.\n4. Add bok choy, cook 2 min.\n5. Season with fish sauce and lime.\n6. Top with basil and serve with rice.\n## Time\nPrep: 5 min · Cook: 18 min`,

  "Larb Salad": `## Ingredients\n- Chicken Breast (400g, minced)\n- Lemongrass (1 stalk, fine)\n- Limes (2)\n- Fish Sauce (3 tbsp)\n- Spring Onion (3 stalks)\n- Coriander (handful)\n- Garlic (2 cloves)\n## Steps\n1. Cook minced chicken in pan with garlic until done, cool slightly.\n2. Toss chicken with lemongrass, lime juice and fish sauce.\n3. Add spring onion and coriander.\n4. Mix well and adjust seasoning — should be sour, salty and herby.\n5. Serve with rice or lettuce.\n## Time\nPrep: 10 min · Cook: 10 min`,

  "Som Tum Style Salad": `## Ingredients\n- Carrots (2, julienned)\n- Cucumber (1, julienned)\n- Bean Sprouts (1 cup)\n- Limes (2)\n- Fish Sauce (2 tbsp)\n- Garlic (1 clove)\n- Green Chilli (1)\n- Peanuts (3 tbsp)\n## Steps\n1. Pound garlic and chilli in mortar.\n2. Add lime juice and fish sauce, mix.\n3. Combine carrots, cucumber and bean sprouts.\n4. Toss with dressing.\n5. Top with crushed peanuts.\n## Time\nPrep: 15 min · Cook: 0 min`,

  "Rice with Thai Basil Chicken": `## Ingredients\n- White Rice (1½ cups)\n- Chicken Breast (400g, minced)\n- Basil (handful)\n- Garlic (3 cloves)\n- Fish Sauce (3 tbsp)\n- Soy Sauce (2 tbsp)\n- Eggs (2)\n- Green Chilli (2)\n## Steps\n1. Cook rice.\n2. Fry garlic and chilli on high heat 30 sec.\n3. Add chicken, break up and cook until done, 5 min.\n4. Add fish sauce and soy sauce, toss.\n5. Fold in basil, cook 30 sec.\n6. Serve over rice topped with fried egg.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Fresh Spring Rolls": `## Ingredients\n- Rice Noodles (100g, cooked)\n- Carrots (1, julienned)\n- Cucumber (½, julienned)\n- Coriander (handful)\n- Basil (handful)\n- Peanuts (3 tbsp, crushed)\n- Limes (1)\n- Bean Sprouts (½ cup)\n## Steps\n1. Briefly soak rice paper in warm water until pliable.\n2. Lay flat, arrange noodles, carrot, cucumber, herbs, bean sprouts.\n3. Roll tightly enclosing sides.\n4. Mix lime juice, fish sauce and peanuts for dip.\n5. Serve immediately.\n## Time\nPrep: 20 min · Cook: 5 min`,

  "Satay with Peanut Sauce": `## Ingredients\n- Chicken Breast (400g, strips)\n- Peanut Butter (4 tbsp)\n- Coconut Milk (200ml)\n- Soy Sauce (2 tbsp)\n- Limes (1)\n- Garlic (2 cloves)\n- Ginger (1 inch)\n## Steps\n1. Marinate chicken in soy sauce, garlic and ginger 30 min, skewer.\n2. Grill or pan-fry skewers 3 min per side.\n3. Blend peanut butter, coconut milk and lime juice into sauce.\n4. Heat sauce 3 min.\n5. Serve skewers with warm peanut sauce.\n## Time\nPrep: 35 min · Cook: 10 min`,

  "Edamame with Fish Sauce": `## Ingredients\n- Edamame (400g)\n- Fish Sauce (2 tbsp)\n- Limes (1)\n- Garlic (1 clove, minced)\n- Green Chilli (1, sliced)\n## Steps\n1. Boil edamame in lightly salted water 4 min, drain.\n2. Mix fish sauce, lime juice, garlic and chilli.\n3. Toss edamame in dressing.\n4. Serve warm.\n## Time\nPrep: 3 min · Cook: 5 min`,

  "Thai Peanut Salad": `## Ingredients\n- Peanuts (1 cup)\n- Cucumber (1, diced)\n- Spring Onion (3 stalks)\n- Limes (2)\n- Fish Sauce (2 tbsp)\n- Green Chilli (1)\n- Coriander (handful)\n## Steps\n1. Combine peanuts, cucumber and spring onion.\n2. Mix lime juice, fish sauce and chilli into dressing.\n3. Toss salad with dressing.\n4. Garnish with coriander.\n5. Serve immediately.\n## Time\nPrep: 10 min · Cook: 0 min`,

  "Coconut Banana Fritters": `## Ingredients\n- Bananas (3, halved lengthwise)\n- Rice Flour (½ cup)\n- Coconut Milk (100ml)\n- Palm Sugar (2 tbsp)\n- Sesame Seeds (1 tbsp)\n- Coconut Oil (for frying)\n## Steps\n1. Mix rice flour, coconut milk and palm sugar into thick batter.\n2. Dip banana pieces in batter.\n3. Fry in coconut oil on medium heat 2 min per side until golden.\n4. Drain, scatter sesame seeds.\n5. Serve warm with condensed milk or syrup.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Lemongrass Tea": `## Ingredients\n- Lemongrass (3 stalks, bruised)\n- Honey (2 tbsp)\n- Limes (1)\n- Ginger (1 inch, sliced)\n## Steps\n1. Bruise lemongrass by pressing with flat of knife.\n2. Boil lemongrass and ginger in 4 cups water 8 min.\n3. Strain into cups.\n4. Add honey and lime juice.\n5. Serve hot or over ice.\n## Time\nPrep: 3 min · Cook: 10 min`,

  "Papaya Salad": `## Ingredients\n- Papaya (1, green, julienned)\n- Limes (2)\n- Fish Sauce (2 tbsp)\n- Garlic (2 cloves)\n- Green Chilli (2)\n- Peanuts (3 tbsp)\n- Coriander (handful)\n## Steps\n1. Pound garlic and chilli in mortar.\n2. Add lime juice and fish sauce.\n3. Toss green papaya in dressing.\n4. Garnish with peanuts and coriander.\n## Time\nPrep: 15 min · Cook: 0 min`,

  "Thai Corn Fritters": `## Ingredients\n- Corn (2 cups)\n- Rice Flour (½ cup)\n- Spring Onion (3 stalks)\n- Green Chilli (1)\n- Coriander (handful)\n- Coconut Oil (for frying)\n## Steps\n1. Mix corn, rice flour, spring onion, chilli and coriander.\n2. Add enough water to hold mixture together.\n3. Shape into flat patties.\n4. Fry in coconut oil 3 min per side until golden.\n5. Serve with sweet chilli sauce.\n## Time\nPrep: 10 min · Cook: 15 min`,

  "Cucumber Lemongrass Salad": `## Ingredients\n- Cucumber (2, sliced)\n- Lemongrass (1 stalk, fine)\n- Limes (2)\n- Fish Sauce (2 tbsp)\n- Green Chilli (1)\n- Coriander (handful)\n- Garlic (1 clove)\n## Steps\n1. Slice cucumber thin.\n2. Mix lemongrass, lime juice, fish sauce, chilli and garlic.\n3. Toss cucumber in dressing.\n4. Garnish with coriander.\n5. Chill 10 min before serving.\n## Time\nPrep: 10 min · Cook: 0 min`,

  "Thai Prawn Curry": `## Ingredients\n- Prawns (400g)\n- Thai Red Curry Paste (3 tbsp)\n- Coconut Milk (400ml)\n- Bok Choy (2 heads)\n- Fish Sauce (2 tbsp)\n- Basil (handful)\n- Limes (1)\n## Steps\n1. Fry curry paste in 3 tbsp coconut milk 2 min.\n2. Add remaining coconut milk, bring to simmer.\n3. Add prawns, cook 4 min until pink.\n4. Add bok choy, cook 2 min.\n5. Season with fish sauce and lime.\n6. Top with basil and serve with rice.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Pad Thai Dinner": `## Ingredients\n- Rice Noodles (250g)\n- Prawns (300g)\n- Eggs (2)\n- Fish Sauce (3 tbsp)\n- Limes (1)\n- Peanuts (4 tbsp)\n- Bean Sprouts (1 cup)\n- Spring Onion (3 stalks)\n## Steps\n1. Soak noodles 20 min, drain.\n2. Stir-fry prawns until pink, set aside.\n3. Scramble eggs in wok, push aside.\n4. Add noodles and fish sauce, toss on high heat.\n5. Add prawns and bean sprouts, toss 1 min.\n6. Serve with peanuts, spring onion and lime wedges.\n## Time\nPrep: 25 min · Cook: 12 min`,

  "Massaman Style Curry": `## Ingredients\n- Chicken Breast (400g)\n- Coconut Milk (400ml)\n- Potatoes (2, cubed)\n- Onions (1)\n- Peanuts (3 tbsp)\n- Lemongrass (1 stalk)\n- Palm Sugar (2 tbsp)\n- Fish Sauce (2 tbsp)\n## Steps\n1. Fry lemongrass and onions in oil 3 min.\n2. Add chicken, cook until sealed.\n3. Pour in coconut milk, add potatoes.\n4. Simmer 20 min until potatoes are soft.\n5. Stir in peanuts, fish sauce and palm sugar.\n6. Serve over rice.\n## Time\nPrep: 10 min · Cook: 30 min`,

  "Green Curry with Tofu": `## Ingredients\n- Tofu (300g)\n- Thai Green Curry Paste (3 tbsp)\n- Coconut Milk (400ml)\n- Bok Choy (2 heads)\n- Basil (handful)\n- Fish Sauce (2 tbsp)\n- Limes (1)\n## Steps\n1. Fry curry paste in 3 tbsp coconut milk 2 min.\n2. Add tofu cubes, cook 3 min.\n3. Pour in remaining coconut milk.\n4. Simmer 10 min. Add bok choy, cook 2 min.\n5. Season with fish sauce and lime.\n6. Top with basil and serve with rice.\n## Time\nPrep: 5 min · Cook: 18 min`,

  "Tom Kha Soup": `## Ingredients\n- Chicken Breast (300g, sliced)\n- Coconut Milk (400ml)\n- Lemongrass (2 stalks)\n- Galangal (4 slices)\n- Kaffir Lime Leaves (4)\n- Mushrooms (150g)\n- Fish Sauce (3 tbsp)\n- Limes (2)\n## Steps\n1. Simmer lemongrass, galangal and kaffir lime in 400ml water 5 min.\n2. Add coconut milk, bring to gentle simmer.\n3. Add chicken and mushrooms, cook 8 min.\n4. Season with fish sauce and lime.\n5. Serve immediately.\n## Time\nPrep: 5 min · Cook: 18 min`,

  "Nasi Goreng": `## Ingredients\n- White Rice (2 cups, cold cooked)\n- Eggs (2)\n- Chicken Breast (250g, diced)\n- Soy Sauce (3 tbsp)\n- Fish Sauce (2 tbsp)\n- Garlic (2 cloves)\n- Spring Onion (3 stalks)\n- Bean Sprouts (½ cup)\n## Steps\n1. Fry garlic and chicken on high heat until cooked.\n2. Push aside, scramble eggs and break up.\n3. Add cold rice, toss on high heat 2 min.\n4. Add soy sauce and fish sauce.\n5. Add bean sprouts, toss 1 min.\n6. Serve topped with spring onion.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Mee Goreng": `## Ingredients\n- Rice Noodles (250g)\n- Eggs (2)\n- Bean Sprouts (1 cup)\n- Garlic (3 cloves)\n- Soy Sauce (3 tbsp)\n- Fish Sauce (2 tbsp)\n- Shrimp Paste (1 tsp)\n- Spring Onion (3 stalks)\n## Steps\n1. Soak noodles, drain.\n2. Fry garlic and shrimp paste 1 min.\n3. Scramble eggs, push aside.\n4. Add noodles, soy sauce and fish sauce, toss on high heat.\n5. Add bean sprouts, toss 1 min.\n6. Serve with spring onion.\n## Time\nPrep: 25 min · Cook: 12 min`,

  "Lemongrass Chicken": `## Ingredients\n- Chicken Breast (500g, pieces)\n- Lemongrass (3 stalks, fine)\n- Garlic (3 cloves)\n- Fish Sauce (3 tbsp)\n- Palm Sugar (2 tbsp)\n- Limes (1)\n- Coriander (handful)\n## Steps\n1. Blend lemongrass, garlic, fish sauce and palm sugar into paste.\n2. Marinate chicken 30 min.\n3. Pan-fry or grill on medium-high 5 min per side.\n4. Squeeze lime over.\n5. Serve with rice and fresh coriander.\n## Time\nPrep: 35 min · Cook: 12 min`,

  "Coconut Laksa": `## Ingredients\n- Rice Noodles (200g)\n- Chicken Breast (300g)\n- Coconut Milk (400ml)\n- Lemongrass (2 stalks)\n- Thai Red Curry Paste (2 tbsp)\n- Bean Sprouts (1 cup)\n- Bok Choy (2 heads)\n- Kaffir Lime Leaves (4)\n## Steps\n1. Simmer lemongrass and kaffir lime in 700ml water 5 min.\n2. Add curry paste, cook 2 min.\n3. Add chicken, cook 10 min in broth.\n4. Pour in coconut milk, simmer 5 min.\n5. Cook noodles separately, divide into bowls.\n6. Ladle soup over, top with bean sprouts and bok choy.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Steamed Fish Thai": `## Ingredients\n- Salmon (4 fillets)\n- Lemongrass (2 stalks)\n- Kaffir Lime Leaves (4)\n- Ginger (2 inch)\n- Fish Sauce (3 tbsp)\n- Limes (2)\n- Coriander (handful)\n- Garlic (2 cloves)\n## Steps\n1. Line steaming dish with lemongrass and kaffir lime.\n2. Place fish on top with ginger slices.\n3. Steam 10 min until fish flakes.\n4. Mix fish sauce, lime juice and garlic into sauce.\n5. Pour sauce over fish.\n6. Top with coriander and serve with rice.\n## Time\nPrep: 8 min · Cook: 12 min`,

  // ── West Asian additions ──
  "Labneh Toast": `## Ingredients\n- Pita Bread (4)\n- Yogurt (1 cup, drained overnight)\n- Olive Oil (3 tbsp)\n- Zatar (2 tsp)\n- Mint (handful)\n## Steps\n1. Drain yogurt in cloth overnight to make labneh.\n2. Toast pita bread.\n3. Spread labneh generously on pita.\n4. Drizzle olive oil over.\n5. Sprinkle zatar and fresh mint.\n## Time\nPrep: 5 min (+ overnight drain) · Cook: 3 min`,

  "Ful Medames": `## Ingredients\n- Lentils (400g, cooked)\n- Garlic (3 cloves, minced)\n- Lemons (2)\n- Olive Oil (4 tbsp)\n- Cumin Powder (1 tsp)\n- Parsley (handful)\n## Steps\n1. Warm lentils in a pot with garlic.\n2. Mash roughly, leaving some whole.\n3. Season with lemon juice, olive oil, cumin and salt.\n4. Simmer 5 min to meld flavours.\n5. Serve in bowls drizzled with olive oil and fresh parsley.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Pita with Zatar": `## Ingredients\n- Pita Bread (4)\n- Zatar (3 tbsp)\n- Olive Oil (4 tbsp)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Mix zatar with olive oil into a paste.\n2. Spread on pita breads.\n3. Sprinkle sesame seeds.\n4. Toast in oven at 180°C for 5 min or in dry pan.\n5. Serve warm.\n## Time\nPrep: 3 min · Cook: 5 min`,

  "Lebanese Omelette": `## Ingredients\n- Eggs (4)\n- Onions (1, fine)\n- Parsley (handful)\n- Tomatoes (1, diced)\n- Olive Oil (2 tbsp)\n- Sumac (1 tsp)\n## Steps\n1. Beat eggs with a pinch of salt.\n2. Mix in onion, parsley and tomato.\n3. Heat olive oil in pan.\n4. Pour egg mixture, cook 3 min until almost set.\n5. Fold and serve sprinkled with sumac.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Hummus Breakfast Bowl": `## Ingredients\n- Chickpeas (400g)\n- Tahini (3 tbsp)\n- Lemons (1)\n- Garlic (1 clove)\n- Eggs (2)\n- Olive Oil (3 tbsp)\n- Smoked Paprika (½ tsp)\n## Steps\n1. Blend chickpeas, tahini, lemon, garlic with ice water until smooth.\n2. Fry or poach eggs.\n3. Spread hummus in bowls.\n4. Top with egg, drizzle olive oil.\n5. Sprinkle smoked paprika.\n## Time\nPrep: 8 min · Cook: 5 min`,

  "Chickpea Scramble": `## Ingredients\n- Chickpeas (400g)\n- Eggs (3)\n- Onions (1)\n- Tomatoes (2)\n- Cumin Powder (1 tsp)\n- Olive Oil (2 tbsp)\n- Parsley (handful)\n## Steps\n1. Sauté onions until golden.\n2. Add tomatoes and cumin, cook 5 min.\n3. Add chickpeas, crush a few.\n4. Push to side, scramble eggs into gaps.\n5. Stir together, cook 2 min.\n6. Garnish with parsley.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Freekeh Porridge": `## Ingredients\n- Freekeh (1 cup)\n- Milk (400ml)\n- Honey (3 tbsp)\n- Almonds (3 tbsp)\n- Rose Water (1 tsp)\n## Steps\n1. Cook freekeh with milk and 200ml water on low heat 20 min stirring.\n2. Stir in honey and rose water.\n3. Toast almonds in dry pan until golden.\n4. Serve porridge in bowls topped with almonds.\n## Time\nPrep: 3 min · Cook: 22 min`,

  "Date and Nut Oats": `## Ingredients\n- Oats (1 cup)\n- Dates (6, pitted and chopped)\n- Almonds (3 tbsp)\n- Honey (2 tbsp)\n- Milk (300ml)\n## Steps\n1. Cook oats with milk 5 min until creamy.\n2. Stir in dates and honey.\n3. Toast almonds briefly in dry pan.\n4. Serve topped with almonds.\n## Time\nPrep: 3 min · Cook: 8 min`,

  "Fattoush": `## Ingredients\n- Pita Bread (2, toasted and broken)\n- Tomatoes (2)\n- Cucumber (1)\n- Parsley (handful)\n- Mint (handful)\n- Sumac (2 tsp)\n- Lemons (1)\n- Olive Oil (3 tbsp)\n## Steps\n1. Toast pita until very crispy, break into pieces.\n2. Chop tomatoes, cucumber and herbs.\n3. Mix lemon juice, olive oil and sumac into dressing.\n4. Toss vegetables in dressing.\n5. Add pita pieces just before serving — keep them crunchy.\n## Time\nPrep: 10 min · Cook: 5 min`,

  "Hummus Bowl": `## Ingredients\n- Chickpeas (400g)\n- Tahini (3 tbsp)\n- Lemons (1)\n- Garlic (1 clove)\n- Olive Oil (3 tbsp)\n- Sumac (1 tsp)\n- Pine Nuts (2 tbsp)\n## Steps\n1. Blend chickpeas, tahini, lemon and garlic with ice water until silky.\n2. Spread in bowls with a swirl.\n3. Drizzle olive oil, sprinkle sumac.\n4. Toast pine nuts in dry pan and scatter over.\n5. Serve with warm pita.\n## Time\nPrep: 8 min · Cook: 3 min`,

  "Freekeh Salad": `## Ingredients\n- Freekeh (1 cup)\n- Parsley (1 bunch)\n- Mint (handful)\n- Pomegranate (½ cup, seeds)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n- Onions (½)\n## Steps\n1. Cook freekeh per packet (about 20 min), cool.\n2. Chop parsley, mint and onion finely.\n3. Mix freekeh with herbs.\n4. Dress with lemon juice and olive oil.\n5. Top with pomegranate seeds.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Lentil Soup West Asian": `## Ingredients\n- Lentils (1 cup)\n- Onions (1)\n- Garlic (3 cloves)\n- Cumin Powder (2 tsp)\n- Lemons (1)\n- Olive Oil (3 tbsp)\n- Parsley (handful)\n- Sumac (1 tsp)\n## Steps\n1. Sauté onions and garlic in olive oil until golden.\n2. Add cumin and lentils, stir 1 min.\n3. Add 4 cups water, simmer 20 min.\n4. Blend half the soup, stir back in.\n5. Finish with lemon juice.\n6. Serve with sumac, olive oil and parsley.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Bulgur Pilaf": `## Ingredients\n- Bulgur Wheat (1½ cups)\n- Onions (1)\n- Chicken Breast (300g, diced)\n- Tomatoes (2)\n- Baharat (2 tsp)\n- Olive Oil (3 tbsp)\n- Pine Nuts (2 tbsp)\n## Steps\n1. Sauté onions until golden, add chicken.\n2. Add baharat and tomatoes, cook 5 min.\n3. Add bulgur and 2 cups water, season.\n4. Cover and cook 15 min until absorbed.\n5. Toast pine nuts in dry pan.\n6. Fluff pilaf, top with pine nuts.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Couscous with Chicken": `## Ingredients\n- Couscous (1½ cups)\n- Chicken Breast (400g)\n- Onions (1)\n- Carrots (2, diced)\n- Tomatoes (2)\n- Baharat (2 tsp)\n- Olive Oil (3 tbsp)\n- Almonds (3 tbsp)\n## Steps\n1. Pour boiling water over couscous, cover 5 min, fluff.\n2. Sauté onions and carrots 5 min.\n3. Add chicken and baharat, cook until done.\n4. Add tomatoes, cook 5 min.\n5. Toast almonds in dry pan.\n6. Serve chicken over couscous, top with almonds.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Stuffed Vine Leaves": `## Ingredients\n- White Rice (1 cup)\n- Parsley (1 bunch)\n- Mint (handful)\n- Lemons (2)\n- Olive Oil (5 tbsp)\n- Onions (1, fine)\n- Tomatoes (1, diced)\n## Steps\n1. Mix uncooked rice, parsley, mint, onion, tomato, 3 tbsp olive oil, lemon juice and salt.\n2. Place filling on vine leaf, roll tightly, tucking sides.\n3. Pack tightly in pot, cover with water.\n4. Simmer on very low heat 40 min.\n5. Drizzle remaining olive oil and lemon juice.\n## Time\nPrep: 30 min · Cook: 40 min`,

  "Mujaddara": `## Ingredients\n- Lentils (1 cup)\n- White Rice (½ cup)\n- Onions (2, sliced)\n- Cumin Powder (1 tsp)\n- Olive Oil (4 tbsp)\n- Yogurt (to serve)\n- Parsley (handful)\n## Steps\n1. Cook lentils 15 min, add rice and 1 cup water, simmer 15 more min.\n2. Fry onions in olive oil on low heat 20 min until golden and caramelized.\n3. Stir cumin into lentil-rice and season.\n4. Top with caramelized onions.\n5. Serve with yogurt and parsley.\n## Time\nPrep: 5 min · Cook: 40 min`,

  "Fattoush Salad": `## Ingredients\n- Pita Bread (2, toasted)\n- Tomatoes (3)\n- Cucumber (1)\n- Parsley (handful)\n- Mint (handful)\n- Sumac (2 tsp)\n- Lemons (1)\n- Olive Oil (3 tbsp)\n## Steps\n1. Toast pita until crispy, break into pieces.\n2. Dice tomatoes and cucumber.\n3. Mix lemon juice, olive oil and sumac into dressing.\n4. Toss vegetables and herbs in dressing.\n5. Add crispy pita just before serving.\n## Time\nPrep: 10 min · Cook: 5 min`,

  "Baba Ganoush": `## Ingredients\n- Aubergine (2 large)\n- Tahini (3 tbsp)\n- Garlic (2 cloves)\n- Lemons (1)\n- Olive Oil (3 tbsp)\n- Smoked Paprika (½ tsp)\n- Parsley (handful)\n## Steps\n1. Char aubergine directly over flame until completely blackened.\n2. Cool, peel, squeeze out juices, mash flesh.\n3. Mix with tahini, garlic and lemon juice.\n4. Season, drizzle olive oil.\n5. Sprinkle smoked paprika and parsley.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Muhamara": `## Ingredients\n- Capsicum (3, roasted)\n- Walnuts (½ cup)\n- Pomegranate Molasses (2 tbsp)\n- Cumin Powder (1 tsp)\n- Garlic (2 cloves)\n- Olive Oil (3 tbsp)\n## Steps\n1. Roast capsicum until charred, peel and seed.\n2. Blend capsicum, walnuts, garlic and cumin.\n3. Add pomegranate molasses and olive oil.\n4. Blend until thick paste, season.\n5. Serve with pita as a dip.\n## Time\nPrep: 30 min · Cook: 20 min`,

  "Zatar Flatbread": `## Ingredients\n- Pita Bread (4)\n- Zatar (3 tbsp)\n- Olive Oil (4 tbsp)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Mix zatar with olive oil.\n2. Brush generously over pita bread.\n3. Scatter sesame seeds.\n4. Bake at 180°C for 6 min or grill until crisp.\n5. Cut into wedges and serve.\n## Time\nPrep: 3 min · Cook: 6 min`,

  "Labneh Dip": `## Ingredients\n- Yogurt (2 cups, drained overnight)\n- Olive Oil (4 tbsp)\n- Mint (handful)\n- Garlic (1 clove, minced)\n- Sumac (1 tsp)\n## Steps\n1. Drain yogurt overnight in cheesecloth into thick labneh.\n2. Mix in garlic.\n3. Spread in shallow bowl with a well in centre.\n4. Fill well with olive oil.\n5. Top with mint and sumac.\n## Time\nPrep: 5 min (+ overnight drain) · Cook: 0 min`,

  "Stuffed Dates": `## Ingredients\n- Dates (20, pitted)\n- Almonds (20)\n- Sesame Seeds (2 tbsp)\n- Honey (2 tbsp)\n- Cinnamon (½ tsp)\n## Steps\n1. Toast sesame seeds in dry pan 2 min.\n2. Mix sesame seeds and cinnamon with honey.\n3. Stuff each date with an almond.\n4. Drizzle honey mixture over dates.\n5. Serve at room temperature.\n## Time\nPrep: 10 min · Cook: 2 min`,

  "Chickpea Snack Bowl": `## Ingredients\n- Chickpeas (400g)\n- Olive Oil (3 tbsp)\n- Sumac (1 tsp)\n- Cumin Powder (1 tsp)\n- Parsley (handful)\n- Lemons (½)\n## Steps\n1. Warm chickpeas in olive oil 3 min.\n2. Season with sumac, cumin and salt.\n3. Squeeze lemon over.\n4. Garnish with parsley.\n5. Serve as a snack or mezze.\n## Time\nPrep: 3 min · Cook: 5 min`,

  "Preserved Lemon Dip": `## Ingredients\n- Preserved Lemon (1, rinsed)\n- Yogurt (1 cup)\n- Garlic (1 clove)\n- Parsley (handful)\n- Olive Oil (2 tbsp)\n## Steps\n1. Scrape flesh from preserved lemon, use only rind.\n2. Mince rind finely with garlic.\n3. Mix into yogurt.\n4. Drizzle olive oil, top with parsley.\n5. Serve with pita or vegetables.\n## Time\nPrep: 8 min · Cook: 0 min`,

  "Walnuts with Pomegranate": `## Ingredients\n- Walnuts (1 cup)\n- Pomegranate (1, seeds)\n- Honey (3 tbsp)\n- Mint (handful)\n- Pomegranate Molasses (1 tbsp)\n## Steps\n1. Toast walnuts in dry pan 3 min.\n2. Combine walnuts and pomegranate seeds.\n3. Drizzle honey and pomegranate molasses.\n4. Top with fresh mint.\n5. Serve as snack or dessert.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Spiced Nuts": `## Ingredients\n- Almonds (½ cup)\n- Walnuts (½ cup)\n- Cumin Powder (1 tsp)\n- Smoked Paprika (½ tsp)\n- Honey (2 tbsp)\n- Olive Oil (1 tbsp)\n## Steps\n1. Toss nuts with olive oil, cumin, paprika and salt.\n2. Spread on baking tray.\n3. Roast at 180°C 12 min, tossing once.\n4. Drizzle honey over hot nuts.\n5. Cool completely before serving.\n## Time\nPrep: 3 min · Cook: 12 min`,

  "Chicken Shawarma": `## Ingredients\n- Chicken Breast (500g)\n- Pita Bread (4)\n- Yogurt (4 tbsp)\n- Garlic (3 cloves)\n- Lemons (1)\n- Cumin Powder (2 tsp)\n- Smoked Paprika (1 tsp)\n- Tahini (3 tbsp)\n## Steps\n1. Marinate chicken in yogurt, garlic, lemon, cumin and paprika 1 hour.\n2. Grill or pan-fry 5 min per side, slice thin.\n3. Mix tahini with lemon juice and water for sauce.\n4. Warm pita.\n5. Fill with chicken and tahini sauce.\n## Time\nPrep: 65 min · Cook: 12 min`,

  "Lamb Kofta": `## Ingredients\n- Mutton (500g, minced)\n- Onions (1, grated)\n- Parsley (handful, fine)\n- Cumin Powder (2 tsp)\n- Baharat (1 tsp)\n- Garlic (2 cloves)\n- Olive Oil (2 tbsp)\n## Steps\n1. Mix minced meat, onion, parsley, garlic and spices.\n2. Shape around skewers into sausage shapes.\n3. Grill on high heat 3 min per side.\n4. Rest 3 min.\n5. Serve with pita, yogurt and tomato salad.\n## Time\nPrep: 15 min · Cook: 10 min`,

  "Chicken Freekeh": `## Ingredients\n- Chicken Breast (400g)\n- Freekeh (1½ cups)\n- Onions (1)\n- Almonds (3 tbsp)\n- Pine Nuts (2 tbsp)\n- Baharat (2 tsp)\n- Olive Oil (3 tbsp)\n## Steps\n1. Sauté onions until golden, add chicken and baharat.\n2. Add freekeh, stir 2 min.\n3. Add 3 cups water, season.\n4. Cover and cook 25 min until freekeh is tender.\n5. Toast almonds and pine nuts in dry pan.\n6. Fluff and top with nuts.\n## Time\nPrep: 10 min · Cook: 35 min`,

  "Baked Chicken with Sumac": `## Ingredients\n- Chicken Breast (500g)\n- Sumac (3 tbsp)\n- Garlic (4 cloves)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n- Onions (1, sliced)\n- Zatar (1 tbsp)\n## Steps\n1. Mix sumac, zatar, garlic, lemon juice and olive oil.\n2. Marinate chicken 30 min.\n3. Layer onions in baking dish, place chicken on top.\n4. Bake at 200°C for 25 min until golden.\n5. Rest 5 min before serving.\n## Time\nPrep: 35 min · Cook: 25 min`,

  "Lamb and Chickpea Stew": `## Ingredients\n- Mutton (400g, cubed)\n- Chickpeas (400g)\n- Tomatoes (2)\n- Onions (1)\n- Baharat (2 tsp)\n- Garlic (3 cloves)\n- Olive Oil (3 tbsp)\n- Parsley (handful)\n## Steps\n1. Brown mutton in olive oil, set aside.\n2. Sauté onions and garlic until golden.\n3. Add tomatoes and baharat, cook 5 min.\n4. Return mutton, add chickpeas and 1 cup water.\n5. Simmer 35 min until tender.\n6. Garnish with parsley.\n## Time\nPrep: 10 min · Cook: 45 min`,

  "Harissa Chicken": `## Ingredients\n- Chicken Breast (500g)\n- Harissa (3 tbsp)\n- Garlic (3 cloves)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n- Yogurt (4 tbsp)\n## Steps\n1. Mix harissa, garlic, lemon juice and olive oil.\n2. Marinate chicken 1 hour.\n3. Grill or roast at 200°C for 20–25 min.\n4. Rest 5 min.\n5. Serve with yogurt and lemon wedges.\n## Time\nPrep: 65 min · Cook: 25 min`,

  "Bulgur with Lamb": `## Ingredients\n- Bulgur Wheat (1½ cups)\n- Mutton (400g, minced)\n- Onions (1)\n- Tomatoes (2)\n- Baharat (2 tsp)\n- Pine Nuts (3 tbsp)\n- Olive Oil (3 tbsp)\n## Steps\n1. Brown minced lamb with onions, breaking up lumps.\n2. Add tomatoes and baharat, cook 8 min.\n3. Add bulgur and 2 cups water, season.\n4. Cover and cook 15 min.\n5. Toast pine nuts in dry pan.\n6. Fluff and top with pine nuts.\n## Time\nPrep: 10 min · Cook: 30 min`,

  "Grilled Fish West Asian": `## Ingredients\n- Salmon (4 fillets)\n- Preserved Lemon (1, rinsed and sliced)\n- Garlic (3 cloves)\n- Olive Oil (4 tbsp)\n- Parsley (handful)\n- Cumin Powder (1 tsp)\n## Steps\n1. Mix garlic, cumin, olive oil and preserved lemon.\n2. Marinate salmon 20 min.\n3. Grill 4 min per side or bake at 200°C 12 min.\n4. Garnish with parsley.\n5. Serve with rice or couscous.\n## Time\nPrep: 25 min · Cook: 12 min`,

  "Vegetable Couscous": `## Ingredients\n- Couscous (1½ cups)\n- Zucchini (1, diced)\n- Carrots (2, diced)\n- Tomatoes (2)\n- Onions (1)\n- Baharat (2 tsp)\n- Olive Oil (3 tbsp)\n- Chickpeas (200g)\n## Steps\n1. Pour boiling water over couscous, cover 5 min, fluff.\n2. Sauté onions, add carrots and baharat.\n3. Add zucchini, tomatoes and chickpeas.\n4. Cook 10 min until vegetables are tender.\n5. Toss with couscous.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Mansaf Style Rice": `## Ingredients\n- Basmati Rice (1½ cups)\n- Mutton (500g, pieces)\n- Yogurt (1 cup)\n- Onions (1)\n- Almonds (3 tbsp)\n- Pine Nuts (2 tbsp)\n- Turmeric Powder (½ tsp)\n- Baharat (2 tsp)\n## Steps\n1. Brown mutton with onions and baharat.\n2. Add 2 cups water, pressure cook until tender.\n3. Cook rice with turmeric in meat stock.\n4. Beat yogurt smooth, warm gently (do not boil).\n5. Toast almonds and pine nuts.\n6. Serve rice topped with meat, pour yogurt over, scatter nuts.\n## Time\nPrep: 15 min · Cook: 50 min`,

  // ── Mediterranean additions ──
  "Greek Yogurt Bowl": `## Ingredients\n- Yogurt (1 cup)\n- Honey (2 tbsp)\n- Almonds (3 tbsp)\n- Strawberries (½ cup)\n- Mint (handful)\n## Steps\n1. Spoon yogurt into bowl.\n2. Arrange sliced strawberries on top.\n3. Scatter almonds.\n4. Drizzle honey.\n5. Top with mint leaves.\n## Time\nPrep: 5 min · Cook: 0 min`,

  "Shakshuka": `## Ingredients\n- Eggs (4)\n- Tomatoes (4, crushed)\n- Capsicum (1, diced)\n- Onions (1)\n- Garlic (3 cloves)\n- Cumin Powder (1 tsp)\n- Smoked Paprika (1 tsp)\n- Olive Oil (3 tbsp)\n## Steps\n1. Sauté onions and capsicum in olive oil until soft.\n2. Add garlic, cumin and paprika, cook 1 min.\n3. Add tomatoes, season and simmer 10 min.\n4. Make wells, crack eggs into each.\n5. Cover and cook 5–7 min until whites set.\n6. Serve with crusty bread.\n## Time\nPrep: 5 min · Cook: 22 min`,

  "Feta and Tomato Toast": `## Ingredients\n- Pita Bread (4)\n- Feta Cheese (150g)\n- Tomatoes (2, sliced)\n- Olive Oil (3 tbsp)\n- Oregano (1 tsp)\n## Steps\n1. Toast pita bread.\n2. Layer tomato slices on top.\n3. Crumble feta over tomatoes.\n4. Drizzle olive oil.\n5. Sprinkle oregano and serve.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Avocado and Hummus Toast": `## Ingredients\n- Pita Bread (4)\n- Tahini (3 tbsp)\n- Avocado (2)\n- Lemons (1)\n- Olive Oil (2 tbsp)\n## Steps\n1. Make quick hummus or use tahini directly.\n2. Spread tahini on toasted pita.\n3. Mash avocado with lemon juice and salt.\n4. Spread avocado over tahini.\n5. Drizzle olive oil and season.\n## Time\nPrep: 8 min · Cook: 3 min`,

  "Olive and Feta Omelette": `## Ingredients\n- Eggs (3)\n- Feta Cheese (60g)\n- Black Olives (8, sliced)\n- Tomatoes (1, diced)\n- Olive Oil (1 tbsp)\n## Steps\n1. Beat eggs with salt.\n2. Heat olive oil in pan.\n3. Pour eggs, cook until edges set.\n4. Scatter feta, olives and tomatoes on one half.\n5. Fold and cook 1 min more.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Tahini Banana Oats": `## Ingredients\n- Oats (1 cup)\n- Tahini (3 tbsp)\n- Bananas (1, sliced)\n- Honey (2 tbsp)\n- Sesame Seeds (1 tbsp)\n## Steps\n1. Cook oats with water until creamy.\n2. Stir in tahini and honey.\n3. Serve topped with banana slices.\n4. Scatter sesame seeds.\n## Time\nPrep: 3 min · Cook: 8 min`,

  "Lentil Soup Breakfast": `## Ingredients\n- Lentils (1 cup)\n- Onions (1)\n- Garlic (2 cloves)\n- Cumin Powder (2 tsp)\n- Lemons (1)\n- Olive Oil (3 tbsp)\n- Parsley (handful)\n## Steps\n1. Sauté onions and garlic in olive oil.\n2. Add lentils and cumin, stir 1 min.\n3. Add 4 cups water, simmer 20 min.\n4. Blend partially for a creamy texture.\n5. Season with lemon and serve with parsley.\n## Time\nPrep: 5 min · Cook: 25 min`,

  "Mediterranean Egg Scramble": `## Ingredients\n- Eggs (4)\n- Tomatoes (1, diced)\n- Black Olives (8, sliced)\n- Feta Cheese (60g)\n- Olive Oil (2 tbsp)\n- Oregano (½ tsp)\n## Steps\n1. Beat eggs with oregano and salt.\n2. Heat olive oil, add tomatoes and cook 2 min.\n3. Pour in eggs, stir gently.\n4. Add olives when eggs are almost set.\n5. Remove from heat, crumble feta over.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Couscous Porridge": `## Ingredients\n- Couscous (1 cup)\n- Milk (300ml)\n- Honey (3 tbsp)\n- Almonds (3 tbsp)\n- Pomegranate (3 tbsp, seeds)\n## Steps\n1. Heat milk to simmer.\n2. Pour over couscous, cover 5 min.\n3. Fluff with fork, stir in honey.\n4. Serve topped with almonds and pomegranate.\n## Time\nPrep: 3 min · Cook: 8 min`,

  "Pita with Labneh": `## Ingredients\n- Pita Bread (4)\n- Yogurt (1 cup, drained)\n- Olive Oil (3 tbsp)\n- Mint (handful)\n- Cumin Powder (½ tsp)\n## Steps\n1. Drain yogurt 2 hours to make labneh.\n2. Warm pita in dry pan.\n3. Spread labneh on pita.\n4. Drizzle olive oil.\n5. Top with mint and cumin.\n## Time\nPrep: 5 min (+ 2h drain) · Cook: 2 min`,

  "Falafel Bowl": `## Ingredients\n- Chickpeas (400g)\n- Parsley (handful)\n- Cumin Powder (2 tsp)\n- Garlic (2 cloves)\n- Olive Oil (for frying)\n- Pita Bread (2)\n- Tahini (3 tbsp)\n## Steps\n1. Blend chickpeas, parsley, cumin, garlic and salt — keep texture rough.\n2. Shape into balls, chill 15 min.\n3. Fry in hot oil 3 min until crispy.\n4. Thin tahini with lemon juice.\n5. Serve falafels in bowl with pita and tahini drizzle.\n## Time\nPrep: 25 min · Cook: 10 min`,

  "Greek Salad": `## Ingredients\n- Cucumber (1, chunks)\n- Tomatoes (3, chunks)\n- Black Olives (½ cup)\n- Feta Cheese (200g, cubed)\n- Onions (½, rings)\n- Olive Oil (4 tbsp)\n- Oregano (1 tsp)\n## Steps\n1. Combine cucumber, tomatoes, olives and onion in a bowl.\n2. Top with feta cubes.\n3. Drizzle olive oil generously.\n4. Sprinkle oregano and season.\n5. Serve at room temperature.\n## Time\nPrep: 8 min · Cook: 0 min`,

  "Hummus and Veggie Bowl": `## Ingredients\n- Chickpeas (400g)\n- Tahini (3 tbsp)\n- Lemons (1)\n- Garlic (1 clove)\n- Cucumber (1)\n- Tomatoes (2)\n- Pita Bread (2)\n## Steps\n1. Blend chickpeas, tahini, lemon and garlic with ice water until smooth.\n2. Slice cucumber and tomatoes.\n3. Spread hummus in bowl.\n4. Arrange vegetables alongside.\n5. Serve with warm pita.\n## Time\nPrep: 10 min · Cook: 3 min`,

  "Lentil Soup": `## Ingredients\n- Lentils (1 cup)\n- Onions (1)\n- Garlic (3 cloves)\n- Cumin Powder (2 tsp)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n- Spinach (2 cups)\n## Steps\n1. Sauté onions and garlic in olive oil.\n2. Add cumin and lentils, stir.\n3. Add 4 cups water, simmer 20 min.\n4. Stir in spinach, cook 2 min.\n5. Finish with lemon juice and season.\n## Time\nPrep: 5 min · Cook: 28 min`,

  "Couscous Salad": `## Ingredients\n- Couscous (1½ cups)\n- Cucumber (1, diced)\n- Tomatoes (2, diced)\n- Black Olives (½ cup)\n- Feta Cheese (100g)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n- Mint (handful)\n## Steps\n1. Pour boiling water over couscous, cover 5 min, fluff.\n2. Cool completely.\n3. Toss with cucumber, tomatoes, olives and mint.\n4. Dress with olive oil and lemon juice.\n5. Top with crumbled feta.\n## Time\nPrep: 10 min · Cook: 5 min`,

  "Stuffed Aubergine": `## Ingredients\n- Aubergine (2, halved)\n- Onions (1)\n- Tomatoes (2)\n- Garlic (3 cloves)\n- Lentils (½ cup, cooked)\n- Olive Oil (4 tbsp)\n- Parsley (handful)\n## Steps\n1. Scoop out aubergine flesh, leaving 1cm shell.\n2. Dice flesh, sauté with onions, garlic and tomatoes.\n3. Add cooked lentils, season.\n4. Fill aubergine shells with mixture.\n5. Bake at 180°C 30 min until tender.\n6. Garnish with parsley.\n## Time\nPrep: 15 min · Cook: 40 min`,

  "Chickpea Spinach Stew": `## Ingredients\n- Chickpeas (400g)\n- Spinach (300g)\n- Tomatoes (3)\n- Garlic (3 cloves)\n- Cumin Powder (2 tsp)\n- Smoked Paprika (1 tsp)\n- Olive Oil (3 tbsp)\n## Steps\n1. Sauté garlic in olive oil 1 min.\n2. Add cumin and paprika, cook 30 sec.\n3. Add tomatoes and chickpeas, simmer 12 min.\n4. Add spinach, cook until wilted.\n5. Season and serve with crusty bread.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Grilled Zucchini Salad": `## Ingredients\n- Zucchini (3, sliced lengthwise)\n- Feta Cheese (100g)\n- Mint (handful)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n- Capers (2 tbsp)\n## Steps\n1. Brush zucchini with olive oil, season.\n2. Grill on hot griddle 2 min per side until char marks show.\n3. Arrange on plate.\n4. Crumble feta over, scatter capers and mint.\n5. Drizzle olive oil and lemon juice.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Pita Wrap with Salad": `## Ingredients\n- Pita Bread (4)\n- Cucumber (1, sliced)\n- Tomatoes (2, sliced)\n- Feta Cheese (100g)\n- Hummus (4 tbsp)\n- Olive Oil (2 tbsp)\n## Steps\n1. Warm pita.\n2. Spread hummus on each.\n3. Layer cucumber and tomatoes.\n4. Crumble feta over.\n5. Drizzle olive oil, roll and serve.\n## Time\nPrep: 8 min · Cook: 2 min`,

  "Tzatziki": `## Ingredients\n- Yogurt (1 cup)\n- Cucumber (1, grated)\n- Garlic (1 clove, minced)\n- Mint (handful)\n- Olive Oil (2 tbsp)\n- Lemons (½)\n## Steps\n1. Grate cucumber, squeeze dry.\n2. Mix into yogurt with garlic and mint.\n3. Drizzle olive oil, squeeze lemon.\n4. Season and chill 20 min.\n5. Serve as dip or sauce.\n## Time\nPrep: 10 min · Cook: 0 min`,

  "Marinated Olives": `## Ingredients\n- Black Olives (300g)\n- Olive Oil (4 tbsp)\n- Garlic (2 cloves, sliced)\n- Thyme (3 sprigs)\n- Lemons (½, zested)\n## Steps\n1. Combine olives, garlic, thyme and lemon zest.\n2. Cover with olive oil.\n3. Rest 30 min at room temperature.\n4. Serve with bread.\n## Time\nPrep: 5 min · Cook: 0 min`,

  "Feta and Watermelon Bites": `## Ingredients\n- Feta Cheese (200g)\n- Watermelon (4 cups, cubed)\n- Mint (handful)\n- Olive Oil (2 tbsp)\n## Steps\n1. Cube feta and watermelon into similar sizes.\n2. Arrange on plate alternating.\n3. Scatter mint leaves.\n4. Drizzle olive oil.\n5. Season with black pepper.\n## Time\nPrep: 8 min · Cook: 0 min`,

  "Caponata": `## Ingredients\n- Aubergine (2, diced)\n- Tomatoes (3)\n- Capers (2 tbsp)\n- Black Olives (½ cup)\n- Onions (1)\n- Olive Oil (5 tbsp)\n- Vinegar (3 tbsp)\n## Steps\n1. Salt aubergine 10 min, rinse and pat dry.\n2. Fry aubergine in olive oil until golden.\n3. Sauté onions separately.\n4. Add tomatoes, capers and olives.\n5. Stir in aubergine and vinegar, simmer 8 min.\n6. Cool before serving — better at room temperature.\n## Time\nPrep: 15 min · Cook: 25 min`,

  "Dolma": `## Ingredients\n- White Rice (1 cup)\n- Parsley (1 bunch)\n- Mint (handful)\n- Lemons (2)\n- Olive Oil (5 tbsp)\n- Onions (1, fine)\n## Steps\n1. Mix uncooked rice, herbs, onion, olive oil, lemon juice and salt.\n2. Stuff grape leaves (or use cabbage leaves as substitute) and roll tightly.\n3. Pack in pot lined with extra leaves.\n4. Cover with water and a plate to weigh down.\n5. Simmer 40 min on very low heat.\n## Time\nPrep: 30 min · Cook: 40 min`,

  "Spanakopita Bites": `## Ingredients\n- Spinach (400g)\n- Feta Cheese (200g)\n- Eggs (2)\n- Olive Oil (3 tbsp)\n- Onions (1)\n## Steps\n1. Sauté onions until soft. Wilt spinach, squeeze very dry.\n2. Mix spinach, onion, crumbled feta and eggs.\n3. Spread in oiled baking dish or stuff into puff pastry.\n4. Bake at 180°C for 25 min until golden.\n5. Cut into pieces and serve.\n## Time\nPrep: 15 min · Cook: 30 min`,

  "Mediterranean Platter": `## Ingredients\n- Hummus (½ cup)\n- Pita Bread (4)\n- Cucumber (1)\n- Tomatoes (2)\n- Black Olives (½ cup)\n- Feta Cheese (150g)\n## Steps\n1. Arrange hummus in centre of platter.\n2. Slice cucumber and tomatoes.\n3. Arrange pita, vegetables and olives around hummus.\n4. Crumble feta over.\n5. Drizzle olive oil and serve.\n## Time\nPrep: 10 min · Cook: 0 min`,

  "Lemon Lentil Soup": `## Ingredients\n- Lentils (1 cup)\n- Lemons (2)\n- Garlic (3 cloves)\n- Cumin Powder (2 tsp)\n- Olive Oil (4 tbsp)\n- Parsley (handful)\n## Steps\n1. Simmer lentils in 4 cups water 20 min.\n2. Fry garlic and cumin in olive oil until golden.\n3. Pour oil into lentils.\n4. Squeeze both lemons into soup, stir.\n5. Season and top with parsley.\n## Time\nPrep: 5 min · Cook: 25 min`,

  "Grilled Fish with Herbs": `## Ingredients\n- Salmon (4 fillets)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n- Garlic (3 cloves)\n- Parsley (handful)\n- Capers (2 tbsp)\n## Steps\n1. Mix olive oil, garlic, capers and parsley into herb oil.\n2. Brush fish generously with herb oil.\n3. Grill 4 min per side.\n4. Rest 3 min.\n5. Squeeze lemon and serve with roasted vegetables.\n## Time\nPrep: 8 min · Cook: 10 min`,

  "Stuffed Peppers": `## Ingredients\n- Capsicum (4, tops cut off)\n- White Rice (1 cup)\n- Tomatoes (2, diced)\n- Onions (1)\n- Parsley (handful)\n- Olive Oil (3 tbsp)\n- Feta Cheese (100g)\n## Steps\n1. Cook rice until just tender, mix with tomato, onion and parsley.\n2. Add feta and olive oil, season.\n3. Fill capsicums with rice mixture.\n4. Bake in oiled dish at 180°C covered 30 min.\n5. Remove cover, bake 10 more min.\n## Time\nPrep: 15 min · Cook: 45 min`,

  "Lamb Stew Mediterranean": `## Ingredients\n- Mutton (500g, cubed)\n- Tomatoes (3)\n- Onions (1)\n- Garlic (4 cloves)\n- Cinnamon (½ tsp)\n- Olive Oil (3 tbsp)\n- Rosemary (2 sprigs)\n## Steps\n1. Brown mutton in olive oil, set aside.\n2. Sauté onions and garlic.\n3. Add tomatoes, cinnamon and rosemary.\n4. Return mutton, add ½ cup water.\n5. Cover and simmer 45 min until tender.\n## Time\nPrep: 10 min · Cook: 55 min`,

  "Pasta with Feta": `## Ingredients\n- Pasta (300g)\n- Feta Cheese (200g)\n- Tomatoes (3, cherry or diced)\n- Black Olives (½ cup)\n- Garlic (3 cloves)\n- Olive Oil (4 tbsp)\n- Basil (handful)\n## Steps\n1. Cook pasta until al dente.\n2. Roast tomatoes and garlic in olive oil at 200°C 20 min.\n3. Place feta in centre of roasting dish — blend everything once done.\n4. Toss pasta in feta-tomato sauce.\n5. Add olives and basil.\n## Time\nPrep: 5 min · Cook: 25 min`,

  "Grilled Aubergine Stack": `## Ingredients\n- Aubergine (2, sliced rounds)\n- Tomatoes (3, sliced)\n- Feta Cheese (150g)\n- Basil (handful)\n- Olive Oil (4 tbsp)\n- Garlic (2 cloves)\n## Steps\n1. Brush aubergine with olive oil and grill 3 min per side.\n2. Stack: aubergine, tomato, feta, basil.\n3. Drizzle garlic-infused olive oil.\n4. Serve warm.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Baked Salmon Mediterranean": `## Ingredients\n- Salmon (4 fillets)\n- Tomatoes (2, diced)\n- Black Olives (½ cup)\n- Capers (2 tbsp)\n- Garlic (3 cloves)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n## Steps\n1. Place salmon in baking dish.\n2. Top with tomatoes, olives, capers and garlic.\n3. Drizzle olive oil, season.\n4. Bake at 200°C 15 min.\n5. Squeeze lemon over and serve.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Couscous with Roasted Veg": `## Ingredients\n- Couscous (1½ cups)\n- Zucchini (1, diced)\n- Aubergine (1, diced)\n- Capsicum (2)\n- Onions (1)\n- Olive Oil (5 tbsp)\n- Lemons (1)\n- Parsley (handful)\n## Steps\n1. Toss vegetables with olive oil, season and roast at 200°C 25 min.\n2. Pour boiling water over couscous, cover 5 min, fluff.\n3. Toss couscous with roasted vegetables.\n4. Dress with lemon juice and remaining olive oil.\n5. Garnish with parsley.\n## Time\nPrep: 10 min · Cook: 25 min`,

  // ── Italian additions ──
  "Frittata": `## Ingredients\n- Eggs (6)\n- Zucchini (1, sliced)\n- Capsicum (1, diced)\n- Onions (1)\n- Olive Oil (3 tbsp)\n- Parmesan (40g, grated)\n## Steps\n1. Beat eggs with parmesan and salt.\n2. Sauté onions and capsicum in oven-safe pan 5 min.\n3. Add zucchini, cook 3 min.\n4. Pour eggs over vegetables.\n5. Cook 3 min on hob until edges set, then bake at 180°C 10 min.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Bruschetta": `## Ingredients\n- White Bread (8 slices, thick)\n- Tomatoes (3, diced)\n- Garlic (2 cloves)\n- Basil (handful)\n- Olive Oil (4 tbsp)\n## Steps\n1. Toast bread until crispy.\n2. Rub hot toast with cut garlic clove.\n3. Mix tomatoes with olive oil, basil and salt.\n4. Top toast with tomato mixture.\n5. Serve immediately.\n## Time\nPrep: 5 min · Cook: 5 min`,

  "Eggs in Tomato Sauce": `## Ingredients\n- Eggs (4)\n- Tomatoes (3, crushed)\n- Garlic (3 cloves)\n- Basil (handful)\n- Olive Oil (3 tbsp)\n## Steps\n1. Sauté garlic in olive oil 1 min.\n2. Add tomatoes, simmer 10 min.\n3. Season sauce.\n4. Make wells, crack eggs in.\n5. Cover and cook 6 min until whites set.\n6. Top with basil.\n## Time\nPrep: 5 min · Cook: 18 min`,

  "Caprese Toast": `## Ingredients\n- White Bread (4 slices)\n- Mozzarella (200g, sliced)\n- Tomatoes (2, sliced)\n- Basil (handful)\n- Olive Oil (2 tbsp)\n## Steps\n1. Toast bread.\n2. Layer mozzarella and tomato.\n3. Tuck in basil leaves.\n4. Drizzle olive oil.\n5. Season and serve.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Italian Omelette": `## Ingredients\n- Eggs (3)\n- Onions (½, diced)\n- Capsicum (½, diced)\n- Olive Oil (2 tbsp)\n- Parmesan (30g, grated)\n## Steps\n1. Beat eggs with parmesan.\n2. Sauté onions and capsicum in olive oil 3 min.\n3. Pour eggs over vegetables.\n4. Cook on medium, lifting edges to let egg run under.\n5. Fold and serve.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Focaccia Toast": `## Ingredients\n- White Bread (4 slices)\n- Olive Oil (4 tbsp)\n- Oregano (1 tsp)\n- Garlic (1 clove, minced)\n## Steps\n1. Mix olive oil with garlic.\n2. Brush bread with garlic oil.\n3. Sprinkle oregano and sea salt.\n4. Toast in pan or oven until golden.\n5. Serve warm.\n## Time\nPrep: 3 min · Cook: 5 min`,

  "Ricotta Pancakes": `## Ingredients\n- All-Purpose Flour (1 cup)\n- Eggs (2)\n- Milk (150ml)\n- Lemons (½, zested)\n- Honey (2 tbsp)\n## Steps\n1. Whisk flour, eggs, milk, lemon zest and pinch of salt.\n2. Rest 5 min.\n3. Cook ladles of batter in buttered pan 2 min per side.\n4. Serve with honey drizzled over.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Garlic Mushrooms on Toast": `## Ingredients\n- Mushrooms (300g, sliced)\n- Garlic (3 cloves)\n- White Bread (4 slices)\n- Olive Oil (3 tbsp)\n- Parsley (handful)\n- Thyme (2 sprigs)\n## Steps\n1. Toast bread.\n2. Fry garlic in olive oil 1 min.\n3. Add mushrooms and thyme on high heat, cook 5 min without stirring much.\n4. Season and toss in parsley.\n5. Pile onto toast.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Tomato and Egg Scramble": `## Ingredients\n- Eggs (4)\n- Tomatoes (2, diced)\n- Basil (handful)\n- Olive Oil (2 tbsp)\n- Parmesan (30g)\n## Steps\n1. Sauté tomatoes in olive oil 3 min.\n2. Beat eggs and add to pan.\n3. Stir gently on low heat until just set.\n4. Remove from heat, stir in parmesan.\n5. Top with basil.\n## Time\nPrep: 5 min · Cook: 8 min`,

  "Zucchini Fritters": `## Ingredients\n- Zucchini (2, grated)\n- Eggs (2)\n- All-Purpose Flour (4 tbsp)\n- Parmesan (40g, grated)\n- Garlic (1 clove)\n## Steps\n1. Grate zucchini, salt and squeeze very dry.\n2. Mix with eggs, flour, parmesan and garlic.\n3. Shape into patties.\n4. Fry in olive oil 3 min per side until golden.\n5. Serve with yogurt dip.\n## Time\nPrep: 15 min · Cook: 15 min`,

  "Pasta al Pomodoro": `## Ingredients\n- Pasta (300g)\n- Tomatoes (500g, crushed)\n- Garlic (4 cloves)\n- Basil (handful)\n- Olive Oil (5 tbsp)\n- Parmesan (50g)\n## Steps\n1. Fry garlic in olive oil until golden — do not burn.\n2. Add tomatoes, season and simmer 15 min.\n3. Cook pasta until al dente, reserve pasta water.\n4. Toss pasta in sauce with a splash of pasta water.\n5. Remove from heat, add basil and parmesan.\n## Time\nPrep: 5 min · Cook: 22 min`,

  "Lentil Pasta": `## Ingredients\n- Pasta (300g)\n- Lentils (1 cup)\n- Tomatoes (3)\n- Garlic (3 cloves)\n- Olive Oil (4 tbsp)\n- Rosemary (2 sprigs)\n## Steps\n1. Cook lentils until tender, 20 min.\n2. Fry garlic and rosemary in olive oil.\n3. Add tomatoes, cook 8 min.\n4. Add lentils, simmer 5 min.\n5. Toss with cooked pasta.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Pasta Primavera": `## Ingredients\n- Penne (300g)\n- Zucchini (1, diced)\n- Capsicum (1, diced)\n- Tomatoes (2)\n- Olive Oil (4 tbsp)\n- Parmesan (50g)\n## Steps\n1. Roast vegetables with olive oil at 200°C 20 min.\n2. Cook pasta until al dente.\n3. Toss pasta with roasted vegetables.\n4. Add a splash of pasta water.\n5. Top with parmesan.\n## Time\nPrep: 8 min · Cook: 25 min`,

  "Minestrone Soup": `## Ingredients\n- Pasta (100g)\n- Tomatoes (3, diced)\n- Carrots (1, diced)\n- Zucchini (1, diced)\n- Lentils (½ cup)\n- Olive Oil (3 tbsp)\n- Basil (handful)\n## Steps\n1. Sauté onions and carrots in olive oil.\n2. Add tomatoes, cook 5 min.\n3. Add lentils and 1.5L water, simmer 20 min.\n4. Add pasta and zucchini, cook 10 more min.\n5. Top with basil and parmesan.\n## Time\nPrep: 10 min · Cook: 40 min`,

  "Pasta with Anchovies": `## Ingredients\n- Spaghetti (300g)\n- Anchovies (8 fillets)\n- Garlic (4 cloves)\n- Olive Oil (5 tbsp)\n- Capers (2 tbsp)\n- Black Olives (½ cup)\n## Steps\n1. Cook spaghetti until al dente.\n2. Fry garlic and anchovies in olive oil until anchovies dissolve.\n3. Add capers and olives.\n4. Toss hot pasta in sauce with pasta water.\n5. Season and serve.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Pasta e Fagioli": `## Ingredients\n- Pasta (200g)\n- Lentils (1 cup)\n- Tomatoes (2)\n- Garlic (3 cloves)\n- Rosemary (2 sprigs)\n- Olive Oil (4 tbsp)\n## Steps\n1. Cook lentils until soft, 20 min.\n2. Fry garlic and rosemary.\n3. Add tomatoes, cook 5 min.\n4. Add lentils and pasta, cover with water.\n5. Simmer 10 min until pasta is cooked.\n6. Serve with parmesan.\n## Time\nPrep: 5 min · Cook: 35 min`,

  "Risotto Milanese": `## Ingredients\n- Arborio Rice (300g)\n- Onions (1, fine)\n- White Wine (½ cup)\n- Parmesan (60g)\n- Butter (3 tbsp)\n- Saffron (pinch)\n## Steps\n1. Soak saffron in 2 tbsp warm water.\n2. Sauté onions in butter until soft.\n3. Add rice, stir 2 min.\n4. Add wine, stir until absorbed.\n5. Add warm stock ladle by ladle 18–20 min, stirring constantly.\n6. Stir in saffron, parmesan and butter off heat.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Bruschetta with Tomato": `## Ingredients\n- White Bread (8 slices)\n- Tomatoes (4, diced)\n- Garlic (2 cloves)\n- Basil (handful)\n- Olive Oil (4 tbsp)\n## Steps\n1. Toast bread until golden.\n2. Rub with cut garlic clove.\n3. Toss diced tomatoes with olive oil, salt and pepper.\n4. Top toast with tomatoes and basil.\n5. Serve immediately.\n## Time\nPrep: 5 min · Cook: 5 min`,

  "Garlic Bread": `## Ingredients\n- White Bread (1 loaf or 8 slices)\n- Garlic (4 cloves, minced)\n- Butter (4 tbsp)\n- Parsley (handful)\n## Steps\n1. Mix butter, garlic and parsley.\n2. Spread generously on bread.\n3. Wrap in foil for soft, or leave open for crispy.\n4. Bake at 180°C 12 min.\n5. Serve immediately.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Olive and Caper Platter": `## Ingredients\n- Black Olives (300g)\n- Capers (3 tbsp)\n- Olive Oil (3 tbsp)\n- White Bread (4 slices)\n## Steps\n1. Arrange olives and capers on serving plate.\n2. Drizzle olive oil over.\n3. Toast bread and slice.\n4. Serve as antipasto.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Parmesan Crisps": `## Ingredients\n- Parmesan (150g, grated)\n- Black Pepper (½ tsp)\n- Oregano (½ tsp)\n## Steps\n1. Mix parmesan with pepper and oregano.\n2. Spoon small mounds onto baking paper.\n3. Flatten slightly.\n4. Bake at 200°C 5–6 min until golden and lacy.\n5. Cool completely — they crisp as they cool.\n## Time\nPrep: 3 min · Cook: 6 min`,

  "Tomato Soup": `## Ingredients\n- Tomatoes (800g)\n- Garlic (4 cloves)\n- Onions (1)\n- Basil (handful)\n- Olive Oil (4 tbsp)\n- Fresh Cream (3 tbsp)\n## Steps\n1. Roast tomatoes and garlic with olive oil at 200°C 25 min.\n2. Sauté onions separately.\n3. Blend roasted tomatoes, garlic and onions until smooth.\n4. Simmer 5 min, season.\n5. Stir in cream and top with basil.\n## Time\nPrep: 5 min · Cook: 35 min`,

  "Zucchini Boats": `## Ingredients\n- Zucchini (4, halved)\n- Tomatoes (2, diced)\n- Mozzarella (150g)\n- Basil (handful)\n- Olive Oil (3 tbsp)\n## Steps\n1. Scoop centres from zucchini halves.\n2. Fill with diced tomato.\n3. Top with mozzarella.\n4. Bake at 180°C 20 min until zucchini is tender.\n5. Top with basil and serve.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Anchovy Toast": `## Ingredients\n- White Bread (8 slices)\n- Anchovies (12 fillets)\n- Capers (2 tbsp)\n- Olive Oil (3 tbsp)\n- Garlic (1 clove)\n## Steps\n1. Toast bread and rub with garlic.\n2. Drizzle olive oil.\n3. Top with anchovy fillets.\n4. Scatter capers.\n5. Serve as antipasto.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Pasta Salad": `## Ingredients\n- Pasta (300g)\n- Black Olives (½ cup)\n- Capers (2 tbsp)\n- Tomatoes (2)\n- Olive Oil (4 tbsp)\n- Basil (handful)\n## Steps\n1. Cook pasta until al dente, rinse cold.\n2. Toss with olives, capers and tomatoes.\n3. Dress with olive oil.\n4. Add basil and season.\n5. Chill 15 min before serving.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Egg Crostini": `## Ingredients\n- White Bread (8 slices)\n- Eggs (4)\n- Olive Oil (3 tbsp)\n- Parsley (handful)\n- Garlic (1 clove)\n## Steps\n1. Toast bread slices until very crispy.\n2. Rub with garlic.\n3. Fry eggs.\n4. Place egg on each toast.\n5. Drizzle olive oil, top with parsley.\n## Time\nPrep: 3 min · Cook: 8 min`,

  "Chicken Cacciatore": `## Ingredients\n- Chicken Breast (500g)\n- Tomatoes (3)\n- Capsicum (1)\n- Onions (1)\n- Garlic (3 cloves)\n- Oregano (2 tsp)\n- Olive Oil (3 tbsp)\n## Steps\n1. Brown chicken in olive oil, set aside.\n2. Sauté onions, garlic and capsicum.\n3. Add tomatoes and oregano, simmer 10 min.\n4. Return chicken, cover and cook 20 min.\n5. Serve with crusty bread.\n## Time\nPrep: 10 min · Cook: 35 min`,

  "Pasta Bolognese": `## Ingredients\n- Spaghetti (300g)\n- Onions (1)\n- Tomatoes (400g, crushed)\n- Tomato Paste (2 tbsp)\n- Garlic (3 cloves)\n- Olive Oil (3 tbsp)\n- Basil (handful)\n## Steps\n1. Sauté onions and garlic.\n2. Add tomato paste, cook 2 min.\n3. Add crushed tomatoes, simmer 20 min.\n4. Season and add basil.\n5. Toss with cooked spaghetti.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Salmon with Capers": `## Ingredients\n- Salmon (4 fillets)\n- Capers (3 tbsp)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n- Garlic (2 cloves)\n- Parsley (handful)\n## Steps\n1. Season salmon.\n2. Fry in olive oil 4 min per side.\n3. Remove fish, add garlic and capers to pan.\n4. Deglaze with lemon juice.\n5. Pour sauce over salmon and top with parsley.\n## Time\nPrep: 3 min · Cook: 12 min`,

  "Shrimp Pasta": `## Ingredients\n- Pasta (300g)\n- Prawns (300g)\n- Garlic (4 cloves)\n- Olive Oil (5 tbsp)\n- Tomatoes (3)\n- Basil (handful)\n- White Wine (½ cup)\n## Steps\n1. Cook pasta until al dente.\n2. Fry garlic in olive oil, add prawns 2 min.\n3. Add white wine, reduce 1 min.\n4. Add tomatoes, cook 5 min.\n5. Toss pasta in sauce.\n6. Top with basil.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Pasta Puttanesca": `## Ingredients\n- Spaghetti (300g)\n- Anchovies (6 fillets)\n- Capers (3 tbsp)\n- Black Olives (½ cup)\n- Tomatoes (400g, crushed)\n- Garlic (4 cloves)\n- Olive Oil (5 tbsp)\n## Steps\n1. Fry garlic and anchovies until anchovies dissolve.\n2. Add capers and olives, cook 1 min.\n3. Add tomatoes, simmer 12 min.\n4. Season and toss with cooked spaghetti.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Risotto with Salmon": `## Ingredients\n- Arborio Rice (300g)\n- Salmon (300g, cubed)\n- Onions (1)\n- White Wine (½ cup)\n- Parmesan (50g)\n- Butter (3 tbsp)\n- Dill (handful)\n## Steps\n1. Sauté onions in butter until soft.\n2. Add rice, stir 2 min.\n3. Add wine, stir until absorbed.\n4. Add warm water ladle by ladle 18 min, stirring.\n5. Stir in salmon in last 5 min of cooking.\n6. Finish with parmesan and dill.\n## Time\nPrep: 5 min · Cook: 30 min`,

  "Chicken Marsala": `## Ingredients\n- Chicken Breast (500g, sliced thin)\n- Mushrooms (200g)\n- White Wine (½ cup)\n- Butter (3 tbsp)\n- Garlic (2 cloves)\n- Thyme (3 sprigs)\n## Steps\n1. Flatten chicken, season and dust with flour.\n2. Fry in butter 3 min per side, set aside.\n3. Sauté garlic and mushrooms.\n4. Add wine and thyme, reduce 3 min.\n5. Return chicken, simmer 5 min.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Eggplant Parmigiana": `## Ingredients\n- Aubergine (2, sliced)\n- Tomatoes (400g, crushed)\n- Mozzarella (250g)\n- Parmesan (60g)\n- Basil (handful)\n- Olive Oil (5 tbsp)\n## Steps\n1. Salt aubergine slices, drain 10 min, fry in olive oil until golden.\n2. Simmer tomatoes with garlic and basil 10 min.\n3. Layer: sauce, aubergine, mozzarella, sauce, aubergine, mozzarella.\n4. Top with parmesan.\n5. Bake at 180°C 25 min.\n## Time\nPrep: 25 min · Cook: 40 min`,

  "Pasta al Forno": `## Ingredients\n- Penne (300g)\n- Tomatoes (400g, crushed)\n- Mozzarella (200g)\n- Parmesan (60g)\n- Basil (handful)\n- Olive Oil (4 tbsp)\n## Steps\n1. Cook pasta until al dente.\n2. Simmer tomatoes with olive oil 10 min.\n3. Mix pasta into sauce, season.\n4. Transfer to baking dish.\n5. Top with mozzarella, parmesan and bake at 200°C 15 min.\n## Time\nPrep: 5 min · Cook: 35 min`,

  "Osso Buco Style Chicken": `## Ingredients\n- Chicken Breast (500g)\n- Onions (1)\n- Carrots (1, diced)\n- Tomatoes (3)\n- White Wine (½ cup)\n- Rosemary (2 sprigs)\n- Garlic (3 cloves)\n## Steps\n1. Brown chicken in olive oil, set aside.\n2. Sauté onions, carrots and garlic.\n3. Add wine, reduce 2 min.\n4. Add tomatoes and rosemary.\n5. Return chicken, braise covered 30 min on low heat.\n## Time\nPrep: 10 min · Cook: 40 min`,

  // ── French Continental additions ──
  "Crepes": `## Ingredients\n- All-Purpose Flour (1 cup)\n- Eggs (2)\n- Milk (300ml)\n- Butter (2 tbsp)\n- Sugar (1 tbsp)\n## Steps\n1. Whisk flour, eggs and milk into smooth batter, rest 20 min.\n2. Melt butter in pan on medium heat.\n3. Pour small ladle of batter and swirl to coat pan thinly.\n4. Cook 1–2 min, flip when edges lift, cook 30 sec.\n5. Serve with honey, jam or lemon and sugar.\n## Time\nPrep: 25 min · Cook: 15 min`,

  "French Toast": `## Ingredients\n- White Bread (6 slices, thick)\n- Eggs (3)\n- Milk (100ml)\n- Butter (2 tbsp)\n- Sugar (2 tbsp)\n- Cinnamon (½ tsp)\n- Vanilla Extract (½ tsp)\n## Steps\n1. Whisk eggs, milk, cinnamon and vanilla.\n2. Dip bread slices, coat both sides.\n3. Fry in butter on medium heat 2–3 min per side until golden.\n4. Dust with sugar.\n5. Serve with maple syrup or fruit.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Omelette Fines Herbes": `## Ingredients\n- Eggs (3)\n- Butter (2 tbsp)\n- Parsley (1 tbsp, fine)\n- Chives (1 tbsp, fine)\n- Thyme (½ tsp)\n## Steps\n1. Beat eggs with salt — don't overbeat.\n2. Heat butter in pan until foamy but not browned.\n3. Pour in eggs, stir with fork while shaking pan.\n4. Stop stirring when almost set, scatter herbs over.\n5. Fold and slide onto plate — should be pale yellow, not browned.\n## Time\nPrep: 3 min · Cook: 3 min`,

  "Croque Monsieur": `## Ingredients\n- White Bread (8 slices)\n- Bacon (150g)\n- Cheddar (150g, grated)\n- Butter (3 tbsp)\n- Dijon Mustard (2 tbsp)\n- Milk (100ml)\n## Steps\n1. Make béchamel: melt butter, add flour, whisk in milk until thick.\n2. Spread mustard on bread, layer bacon and cheddar.\n3. Top with second slice, spread béchamel on top.\n4. Top with more cheddar.\n5. Grill until bubbling and golden.\n## Time\nPrep: 10 min · Cook: 15 min`,

  "Baguette with Butter": `## Ingredients\n- White Bread (1 baguette)\n- Butter (4 tbsp)\n- Dijon Mustard (2 tbsp)\n## Steps\n1. Slice baguette open lengthwise.\n2. Spread generously with butter.\n3. Add a smear of dijon mustard on one side.\n4. Press together and slice into portions.\n5. Serve with coffee.\n## Time\nPrep: 3 min · Cook: 0 min`,

  "Mushroom Crepes": `## Ingredients\n- All-Purpose Flour (1 cup)\n- Eggs (2)\n- Milk (300ml)\n- Mushrooms (250g, sliced)\n- Shallots (2, diced)\n- Butter (3 tbsp)\n- Gruyere (80g, grated)\n## Steps\n1. Make crepe batter, rest 20 min, cook thin crepes.\n2. Sauté shallots in butter, add mushrooms, cook 6 min.\n3. Fill each crepe with mushroom mixture, scatter gruyere.\n4. Roll and place in baking dish.\n5. Bake at 180°C 10 min until cheese melts.\n## Time\nPrep: 30 min · Cook: 25 min`,

  "Soft Boiled Eggs with Toast": `## Ingredients\n- Eggs (4)\n- White Bread (4 slices)\n- Butter (2 tbsp)\n## Steps\n1. Boil water, gently lower eggs in, cook exactly 6 min.\n2. Transfer to cold water 1 min.\n3. Toast bread, butter generously, cut into soldiers.\n4. Place eggs in egg cups, tap top off.\n5. Dip soldiers into runny yolk.\n## Time\nPrep: 2 min · Cook: 8 min`,

  "Yogurt with Honey": `## Ingredients\n- Yogurt (1 cup)\n- Honey (3 tbsp)\n- Almonds (3 tbsp)\n- Strawberries (½ cup)\n## Steps\n1. Spoon yogurt into bowl.\n2. Drizzle honey over.\n3. Scatter sliced almonds and strawberries.\n4. Serve immediately.\n## Time\nPrep: 3 min · Cook: 0 min`,

  "Granola Bowls": `## Ingredients\n- Oats (1 cup)\n- Honey (3 tbsp)\n- Almonds (3 tbsp)\n- Butter (2 tbsp)\n- Yogurt (1 cup)\n- Strawberries (½ cup)\n## Steps\n1. Toss oats and almonds with honey and melted butter.\n2. Bake at 180°C 15 min, tossing once, until golden.\n3. Cool completely.\n4. Serve granola over yogurt with strawberries.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Quiche with Salad": `## Ingredients\n- Eggs (4)\n- Fresh Cream (200ml)\n- Gruyere (100g)\n- All-Purpose Flour (150g)\n- Butter (100g)\n- Rocket (2 cups)\n- Lemons (½)\n## Steps\n1. Make pastry, chill 20 min, blind bake 12 min.\n2. Whisk eggs, cream and gruyere.\n3. Pour into pastry shell.\n4. Bake at 180°C 25 min until set.\n5. Dress rocket with lemon and olive oil, serve alongside.\n## Time\nPrep: 40 min · Cook: 40 min`,

  "Nicoise Style Salad": `## Ingredients\n- Salmon (300g, cooked)\n- Eggs (3, hard-boiled)\n- Potatoes (3, boiled)\n- Tomatoes (2)\n- Black Olives (½ cup)\n- Capers (2 tbsp)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n## Steps\n1. Flake salmon, slice eggs and potatoes.\n2. Arrange all ingredients on a platter.\n3. Whisk lemon juice, olive oil and dijon mustard.\n4. Drizzle dressing over.\n5. Season and serve.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Croque Madame": `## Ingredients\n- White Bread (8 slices)\n- Bacon (150g)\n- Cheddar (150g)\n- Eggs (2)\n- Butter (3 tbsp)\n- Dijon Mustard (2 tbsp)\n## Steps\n1. Make croque monsieur base with bacon, cheddar and mustard.\n2. Grill until cheese is melted and top is golden.\n3. Fry eggs sunny-side up.\n4. Place fried egg on top of each sandwich.\n5. Serve immediately.\n## Time\nPrep: 10 min · Cook: 15 min`,

  "Vichyssoise": `## Ingredients\n- Potatoes (4, diced)\n- Onions (1)\n- Leeks (2, sliced)\n- Fresh Cream (150ml)\n- Butter (3 tbsp)\n- Thyme (2 sprigs)\n## Steps\n1. Sauté leeks and onions in butter until soft.\n2. Add potatoes, thyme and 1L water.\n3. Simmer 20 min until potatoes are tender.\n4. Blend until very smooth.\n5. Stir in cream, season and serve chilled or warm.\n## Time\nPrep: 10 min · Cook: 30 min`,

  "Salmon en Papillote": `## Ingredients\n- Salmon (4 fillets)\n- Lemons (1, sliced)\n- Capers (2 tbsp)\n- Shallots (2, sliced)\n- White Wine (4 tbsp)\n- Butter (2 tbsp)\n- Thyme (4 sprigs)\n## Steps\n1. Place each salmon fillet on a large piece of foil.\n2. Top with lemon, capers, shallots, thyme and a knob of butter.\n3. Splash white wine over each.\n4. Fold foil into sealed parcels.\n5. Bake at 200°C 14 min.\n## Time\nPrep: 8 min · Cook: 14 min`,

  "Leek and Gruyere Tart": `## Ingredients\n- All-Purpose Flour (150g)\n- Eggs (3)\n- Fresh Cream (200ml)\n- Gruyere (100g)\n- Butter (100g)\n- Shallots (3)\n- Thyme (3 sprigs)\n## Steps\n1. Make pastry, chill 20 min, blind bake 12 min.\n2. Sauté shallots and leeks in butter until soft.\n3. Whisk eggs, cream and gruyere.\n4. Add shallots to pastry shell.\n5. Pour egg mixture over, bake at 180°C 25 min.\n## Time\nPrep: 40 min · Cook: 40 min`,

  "Chicken Waldorf Salad": `## Ingredients\n- Chicken Breast (300g, cooked)\n- Apples (2, diced)\n- Celery (3 stalks)\n- Walnuts (½ cup)\n- Yogurt (4 tbsp)\n- Lemons (½)\n- Dijon Mustard (1 tsp)\n## Steps\n1. Shred or dice cooked chicken.\n2. Combine with apple and celery.\n3. Mix yogurt, lemon juice and dijon into dressing.\n4. Toss salad in dressing.\n5. Top with toasted walnuts.\n## Time\nPrep: 10 min · Cook: 0 min`,

  "Pasta Gratin": `## Ingredients\n- Pasta (300g)\n- Fresh Cream (250ml)\n- Gruyere (150g, grated)\n- Butter (2 tbsp)\n- Mushrooms (200g)\n- Shallots (2)\n- Thyme (3 sprigs)\n## Steps\n1. Cook pasta until al dente.\n2. Sauté shallots and mushrooms in butter.\n3. Add cream and thyme, simmer 3 min.\n4. Toss pasta in sauce.\n5. Transfer to dish, top with gruyere, bake at 200°C 15 min.\n## Time\nPrep: 8 min · Cook: 30 min`,

  "Cheese Platter": `## Ingredients\n- Gruyere (100g)\n- Cheddar (100g)\n- White Bread (4 slices)\n- Dijon Mustard (2 tbsp)\n- Almonds (3 tbsp)\n- Dates (6)\n## Steps\n1. Slice cheeses.\n2. Toast bread.\n3. Arrange cheeses, bread, almonds, dates and mustard on board.\n4. Serve at room temperature.\n## Time\nPrep: 8 min · Cook: 3 min`,

  "Gougeres": `## Ingredients\n- All-Purpose Flour (1 cup)\n- Eggs (4)\n- Butter (5 tbsp)\n- Milk (200ml)\n- Gruyere (100g, grated)\n- Thyme (1 tsp)\n## Steps\n1. Bring butter and milk to boil, add flour all at once, stir vigorously off heat.\n2. Cool 3 min, beat in eggs one at a time.\n3. Stir in gruyere and thyme.\n4. Pipe or spoon mounds onto baking tray.\n5. Bake at 200°C 20–22 min until puffed and golden.\n## Time\nPrep: 15 min · Cook: 22 min`,

  "Pate on Toast": `## Ingredients\n- White Bread (8 slices)\n- Chicken Breast (300g)\n- Butter (4 tbsp)\n- Shallots (2)\n- Thyme (3 sprigs)\n- Dijon Mustard (1 tsp)\n## Steps\n1. Sauté shallots in butter, add chicken.\n2. Cook until done, add thyme.\n3. Blend chicken mixture with extra butter and mustard until smooth.\n4. Season and chill 30 min.\n5. Spread on toast and serve.\n## Time\nPrep: 10 min · Cook: 20 min`,

  "Deviled Eggs": `## Ingredients\n- Eggs (6, hard-boiled)\n- Dijon Mustard (2 tsp)\n- Fresh Cream (2 tbsp)\n- Paprika (½ tsp)\n- Chives (handful)\n## Steps\n1. Peel eggs and halve lengthwise.\n2. Remove yolks and mash with dijon and cream.\n3. Season well.\n4. Pipe or spoon yolk mixture back into whites.\n5. Garnish with paprika and chives.\n## Time\nPrep: 15 min · Cook: 10 min`,

  "Mushroom Bruschetta": `## Ingredients\n- White Bread (8 slices)\n- Mushrooms (300g)\n- Shallots (2)\n- Garlic (2 cloves)\n- Butter (3 tbsp)\n- Thyme (3 sprigs)\n- Parsley (handful)\n## Steps\n1. Toast bread.\n2. Sauté shallots and garlic in butter.\n3. Add mushrooms and thyme, cook 6 min on high until golden.\n4. Season and toss in parsley.\n5. Pile on toast.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Creme Fraiche Dip": `## Ingredients\n- Creme Fraiche (1 cup)\n- Garlic (1 clove, minced)\n- Chives (handful, fine)\n- Lemons (½)\n- Dijon Mustard (1 tsp)\n## Steps\n1. Mix creme fraiche with garlic and dijon.\n2. Squeeze lemon juice in.\n3. Stir in chives.\n4. Season and chill 10 min.\n5. Serve with vegetables or bread.\n## Time\nPrep: 5 min · Cook: 0 min`,

  "French Dressing Salad": `## Ingredients\n- Lettuce (1 head)\n- Tomatoes (2)\n- Dijon Mustard (1 tsp)\n- Vinegar (2 tbsp)\n- Olive Oil (4 tbsp)\n- Shallots (1, minced)\n## Steps\n1. Whisk dijon, vinegar and shallots.\n2. Drizzle in olive oil while whisking.\n3. Season dressing.\n4. Tear lettuce and slice tomatoes.\n5. Toss in dressing just before serving.\n## Time\nPrep: 8 min · Cook: 0 min`,

  "Baguette Canapes": `## Ingredients\n- White Bread (8 slices, thin)\n- Butter (2 tbsp)\n- Cheddar (80g)\n- Tomatoes (1, diced)\n- Parsley (handful)\n## Steps\n1. Toast bread slices small.\n2. Spread butter.\n3. Top with cheddar and tomato.\n4. Grill 2 min until cheese melts.\n5. Garnish with parsley.\n## Time\nPrep: 5 min · Cook: 5 min`,

  "Onion Tart": `## Ingredients\n- Onions (3, sliced)\n- Butter (3 tbsp)\n- All-Purpose Flour (150g)\n- Eggs (2)\n- Fresh Cream (150ml)\n- Thyme (3 sprigs)\n- Gruyere (80g)\n## Steps\n1. Make pastry, chill and blind bake 12 min.\n2. Caramelize onions in butter on low heat 25 min.\n3. Whisk eggs and cream, season.\n4. Spread onions in pastry, pour egg mixture over.\n5. Top with gruyere and thyme, bake at 180°C 25 min.\n## Time\nPrep: 40 min · Cook: 55 min`,

  "Rillettes Toast": `## Ingredients\n- White Bread (8 slices)\n- Bacon (200g)\n- Shallots (2)\n- Butter (4 tbsp)\n- Thyme (3 sprigs)\n- Dijon Mustard (1 tsp)\n## Steps\n1. Slowly cook bacon with shallots and thyme in butter 20 min until soft.\n2. Shred bacon finely with forks.\n3. Mix in extra butter and dijon mustard.\n4. Season, chill 30 min.\n5. Spread on toast.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Coq au Vin": `## Ingredients\n- Chicken Breast (500g)\n- Bacon (150g)\n- Mushrooms (200g)\n- Onions (1)\n- Garlic (3 cloves)\n- White Wine (200ml)\n- Thyme (3 sprigs)\n- Butter (2 tbsp)\n## Steps\n1. Brown chicken in butter, set aside.\n2. Fry bacon, add onions and garlic.\n3. Add mushrooms, cook 3 min.\n4. Add wine and thyme, bring to simmer.\n5. Return chicken, cover and cook 25 min.\n## Time\nPrep: 10 min · Cook: 40 min`,

  "Beef Bourguignon Style": `## Ingredients\n- Mutton (600g, cubed)\n- Bacon (150g)\n- Onions (1)\n- Carrots (2)\n- Mushrooms (200g)\n- White Wine (200ml)\n- Thyme (3 sprigs)\n- Garlic (3 cloves)\n- Butter (2 tbsp)\n## Steps\n1. Brown mutton in butter, set aside.\n2. Fry bacon, add onions and carrots.\n3. Return meat, add wine, thyme and garlic.\n4. Simmer covered 45 min.\n5. Add mushrooms last 10 min.\n## Time\nPrep: 15 min · Cook: 60 min`,

  "Salmon with Creme Fraiche": `## Ingredients\n- Salmon (4 fillets)\n- Creme Fraiche (150ml)\n- Dijon Mustard (2 tbsp)\n- Lemons (1)\n- Capers (2 tbsp)\n- Shallots (2, minced)\n## Steps\n1. Mix creme fraiche, dijon, capers and shallots.\n2. Season salmon, pan-fry 4 min per side.\n3. Remove fish, add creme fraiche mixture to pan.\n4. Stir 2 min on low heat until warm.\n5. Pour sauce over salmon, squeeze lemon.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Chicken with Mushroom Sauce": `## Ingredients\n- Chicken Breast (500g)\n- Mushrooms (300g)\n- Fresh Cream (200ml)\n- Shallots (3)\n- White Wine (100ml)\n- Butter (3 tbsp)\n- Thyme (3 sprigs)\n## Steps\n1. Pan-fry chicken in butter 5 min per side, rest.\n2. Sauté shallots and mushrooms in same pan.\n3. Add wine, reduce 2 min.\n4. Add cream and thyme, simmer 5 min.\n5. Slice chicken, pour sauce over.\n## Time\nPrep: 8 min · Cook: 20 min`,

  "Gratin Dauphinois": `## Ingredients\n- Potatoes (800g, sliced thin)\n- Fresh Cream (300ml)\n- Gruyere (150g, grated)\n- Butter (2 tbsp)\n- Garlic (2 cloves)\n- Thyme (3 sprigs)\n- Nutmeg (pinch)\n## Steps\n1. Rub baking dish with garlic and butter.\n2. Layer potatoes, season and dust with nutmeg.\n3. Pour cream over, scatter gruyere and thyme.\n4. Bake covered at 180°C for 40 min.\n5. Uncover last 15 min until golden.\n## Time\nPrep: 15 min · Cook: 55 min`,

  "Duck Confit Style Chicken": `## Ingredients\n- Chicken Breast (500g)\n- Garlic (4 cloves)\n- Thyme (4 sprigs)\n- Rosemary (2 sprigs)\n- Butter (4 tbsp)\n- Shallots (3)\n- White Wine (100ml)\n## Steps\n1. Score chicken, rub with garlic, thyme, rosemary and salt.\n2. Rest 30 min.\n3. Sear skin-side down in butter until golden, flip.\n4. Add shallots and wine, cover.\n5. Cook in oven at 160°C for 25 min.\n## Time\nPrep: 35 min · Cook: 35 min`,

  "Boeuf Style Stew": `## Ingredients\n- Mutton (600g, cubed)\n- Carrots (2, diced)\n- Onions (1)\n- Celery (3 stalks)\n- Potatoes (3, diced)\n- Thyme (3 sprigs)\n- Garlic (3 cloves)\n- White Wine (150ml)\n## Steps\n1. Brown mutton in batches.\n2. Sauté onions, carrots and celery.\n3. Add wine and garlic, reduce 2 min.\n4. Return meat, add potatoes and thyme.\n5. Cover and simmer 50 min until tender.\n## Time\nPrep: 15 min · Cook: 65 min`,

  "Pasta with Cream Sauce": `## Ingredients\n- Pasta (300g)\n- Fresh Cream (250ml)\n- Garlic (3 cloves)\n- Parmesan (60g)\n- Butter (2 tbsp)\n- Thyme (3 sprigs)\n- Shallots (2)\n## Steps\n1. Cook pasta until al dente.\n2. Sauté shallots and garlic in butter.\n3. Add cream and thyme, reduce 4 min.\n4. Toss pasta in cream sauce.\n5. Stir in parmesan off heat.\n## Time\nPrep: 5 min · Cook: 18 min`,

  "Chicken with Dijon": `## Ingredients\n- Chicken Breast (500g)\n- Dijon Mustard (3 tbsp)\n- Fresh Cream (200ml)\n- Shallots (3)\n- Thyme (3 sprigs)\n- Butter (3 tbsp)\n- White Wine (100ml)\n## Steps\n1. Pan-fry chicken in butter 5 min per side, set aside.\n2. Sauté shallots in same pan.\n3. Add white wine, reduce 2 min.\n4. Add cream and dijon, stir well.\n5. Return chicken, simmer 8 min in sauce.\n## Time\nPrep: 5 min · Cook: 25 min`,

  "Tuna Nicoise": `## Ingredients\n- Salmon (300g, cooked)\n- Eggs (3, hard-boiled)\n- Potatoes (3, boiled)\n- Tomatoes (2)\n- Black Olives (½ cup)\n- Capers (2 tbsp)\n- Lemons (1)\n- Olive Oil (4 tbsp)\n- Dijon Mustard (1 tsp)\n## Steps\n1. Flake fish, slice eggs, halve potatoes.\n2. Arrange on platter with tomatoes and olives.\n3. Whisk dijon, lemon juice and olive oil.\n4. Drizzle dressing over everything.\n5. Scatter capers.\n## Time\nPrep: 10 min · Cook: 20 min`,

  // ── Mexican additions ──
  "Huevos Rancheros": `## Ingredients\n- Eggs (4)\n- Corn Tortillas (4)\n- Tomatoes (3)\n- Onions (½)\n- Garlic (2 cloves)\n- Cumin Seeds (1 tsp)\n- Coriander (handful)\n## Steps\n1. Blend tomatoes, onion and garlic into sauce.\n2. Cook sauce with cumin seeds 8 min.\n3. Warm tortillas in dry pan.\n4. Fry eggs.\n5. Serve eggs and salsa over tortillas with coriander.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Breakfast Burrito": `## Ingredients\n- Tortilla Wraps (4)\n- Eggs (4)\n- Black Beans (200g)\n- Cheddar (100g)\n- Salsa (4 tbsp)\n- Avocado (1)\n## Steps\n1. Scramble eggs.\n2. Warm black beans.\n3. Warm tortillas.\n4. Layer eggs, beans, cheddar and salsa.\n5. Add sliced avocado, roll tightly.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Mexican Scrambled Eggs": `## Ingredients\n- Eggs (4)\n- Jalapeños (1, diced)\n- Onions (½, diced)\n- Tomatoes (1, diced)\n- Coriander (handful)\n- Cumin Seeds (½ tsp)\n## Steps\n1. Sauté onions, jalapeño and cumin seeds 3 min.\n2. Add tomatoes, cook 2 min.\n3. Beat eggs and pour in, stir gently.\n4. Cook until just set.\n5. Top with coriander.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Avocado Toast Mexican": `## Ingredients\n- White Bread (4 slices)\n- Avocado (2)\n- Limes (1)\n- Jalapeños (1, sliced)\n- Coriander (handful)\n- Cumin Seeds (½ tsp)\n## Steps\n1. Toast bread.\n2. Mash avocado with lime juice, cumin and salt.\n3. Spread on toast.\n4. Top with jalapeño slices and coriander.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Black Bean Breakfast Bowl": `## Ingredients\n- Black Beans (400g)\n- Eggs (2)\n- Tomatoes (1)\n- Coriander (handful)\n- Limes (1)\n- Corn Tortillas (2)\n## Steps\n1. Warm black beans with cumin and salt.\n2. Fry eggs.\n3. Warm tortillas.\n4. Serve beans in bowl with egg on top.\n5. Add tomato, coriander and lime.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Corn Tortilla Quesadilla": `## Ingredients\n- Corn Tortillas (8)\n- Eggs (3)\n- Cheddar (150g)\n- Onions (½, diced)\n- Capsicum (½, diced)\n## Steps\n1. Scramble eggs with onion and capsicum.\n2. Place one tortilla in pan, add eggs and cheddar.\n3. Top with second tortilla.\n4. Cook 2 min per side until golden and crispy.\n5. Cut into wedges.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Chilaquiles": `## Ingredients\n- Corn Tortillas (6, torn)\n- Tomatoes (3)\n- Garlic (2 cloves)\n- Onions (½)\n- Eggs (3)\n- Coriander (handful)\n- Sour Cream (3 tbsp)\n## Steps\n1. Blend tomatoes, garlic and onion into sauce.\n2. Fry tortilla pieces until crispy.\n3. Pour sauce over tortillas, simmer 3 min until softened.\n4. Crack eggs into gaps, cover and cook 5 min.\n5. Serve with sour cream and coriander.\n## Time\nPrep: 5 min · Cook: 18 min`,

  "Mexican Oatmeal": `## Ingredients\n- Oats (1 cup)\n- Cinnamon (½ tsp)\n- Honey (3 tbsp)\n- Almonds (3 tbsp)\n- Bananas (1)\n## Steps\n1. Cook oats with water.\n2. Stir in cinnamon and honey.\n3. Serve topped with sliced banana.\n4. Scatter almonds.\n## Time\nPrep: 2 min · Cook: 8 min`,

  "Rice and Bean Bowl": `## Ingredients\n- White Rice (1 cup)\n- Black Beans (400g)\n- Salsa (4 tbsp)\n- Coriander (handful)\n- Limes (1)\n## Steps\n1. Cook rice.\n2. Warm black beans with cumin and salt.\n3. Serve rice topped with beans.\n4. Add salsa, coriander and lime.\n## Time\nPrep: 3 min · Cook: 20 min`,

  "Tamale Bowl": `## Ingredients\n- Maize Flour (1 cup)\n- Black Beans (400g)\n- Chilli Sauce (3 tbsp)\n- Coriander (handful)\n- Onions (½, diced)\n## Steps\n1. Mix maize flour with warm water into thick paste.\n2. Cook paste in pan stirring 5 min until thick.\n3. Warm black beans with chilli sauce.\n4. Serve masa in bowls topped with beans.\n5. Garnish with onion and coriander.\n## Time\nPrep: 5 min · Cook: 15 min`,

  "Black Bean Burrito": `## Ingredients\n- Tortilla Wraps (4)\n- Black Beans (400g)\n- White Rice (1 cup)\n- Cheddar (100g)\n- Sour Cream (4 tbsp)\n- Salsa (4 tbsp)\n- Coriander (handful)\n## Steps\n1. Cook rice.\n2. Warm black beans with cumin.\n3. Warm tortillas.\n4. Layer rice, beans, cheddar, salsa and sour cream.\n5. Add coriander, roll tightly.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Guacamole and Tortilla Bowl": `## Ingredients\n- Avocado (3)\n- Tomatoes (2)\n- Onions (½, fine)\n- Coriander (handful)\n- Limes (1)\n- Corn Tortillas (4)\n- Jalapeños (1)\n## Steps\n1. Mash avocado with lime juice and salt.\n2. Stir in onion, tomato, jalapeño and coriander.\n3. Warm tortillas.\n4. Serve guacamole in bowl with tortillas.\n## Time\nPrep: 8 min · Cook: 2 min`,

  "Chicken Fajitas": `## Ingredients\n- Chicken Breast (500g, strips)\n- Capsicum (2, strips)\n- Onions (1, strips)\n- Cumin Seeds (1 tsp)\n- Smoked Paprika (1 tsp)\n- Limes (1)\n- Tortilla Wraps (4)\n## Steps\n1. Season chicken with cumin, paprika and salt.\n2. Grill or pan-fry chicken on high heat 4 min per side.\n3. Stir-fry capsicum and onions in same pan 4 min.\n4. Warm tortillas.\n5. Fill with chicken, vegetables and squeeze of lime.\n## Time\nPrep: 8 min · Cook: 15 min`,

  "Vegetarian Quesadillas": `## Ingredients\n- Tortilla Wraps (4)\n- Black Beans (200g)\n- Cheddar (200g)\n- Capsicum (1, diced)\n- Onions (½)\n- Salsa (4 tbsp)\n## Steps\n1. Sauté capsicum and onions 3 min.\n2. Add black beans, cook 2 min.\n3. Spread filling on one half of each tortilla.\n4. Cover with cheddar and fold.\n5. Cook in dry pan 2 min per side until golden.\n## Time\nPrep: 5 min · Cook: 12 min`,

  "Taco Salad": `## Ingredients\n- Black Beans (400g)\n- Corn (1 cup)\n- Tomatoes (2, diced)\n- Lettuce (4 cups)\n- Cheddar (100g)\n- Sour Cream (4 tbsp)\n- Salsa (4 tbsp)\n- Limes (1)\n## Steps\n1. Warm black beans and corn.\n2. Toss lettuce with tomatoes.\n3. Top with beans, corn and cheddar.\n4. Drizzle sour cream and salsa.\n5. Squeeze lime and serve.\n## Time\nPrep: 10 min · Cook: 5 min`,

  "Bean and Cheese Burrito": `## Ingredients\n- Tortilla Wraps (4)\n- Kidney Beans (400g)\n- Cheddar (150g)\n- White Rice (1 cup)\n- Chipotle (2 tbsp)\n- Sour Cream (4 tbsp)\n## Steps\n1. Cook rice.\n2. Warm kidney beans with chipotle.\n3. Warm tortillas.\n4. Layer rice, beans and cheddar.\n5. Add sour cream, roll tightly.\n## Time\nPrep: 5 min · Cook: 20 min`,

  "Enchilada Bowl": `## Ingredients\n- Corn Tortillas (4, torn)\n- Chicken Breast (300g)\n- Tomatoes (3)\n- Onions (1)\n- Chilli Sauce (4 tbsp)\n- Cheddar (100g)\n- Sour Cream (3 tbsp)\n## Steps\n1. Cook chicken, shred.\n2. Simmer tomatoes and onions with chilli sauce 8 min.\n3. Toss chicken and tortilla pieces in sauce.\n4. Top with cheddar, bake at 180°C 10 min.\n5. Serve with sour cream.\n## Time\nPrep: 10 min · Cook: 25 min`,

  "Guacamole": `## Ingredients\n- Avocado (3)\n- Tomatoes (1, fine)\n- Onions (¼, fine)\n- Coriander (handful)\n- Limes (1)\n- Jalapeños (1)\n## Steps\n1. Mash avocado with lime juice and salt.\n2. Keep chunky or smooth per preference.\n3. Stir in tomato, onion, jalapeño and coriander.\n4. Adjust lime and salt.\n5. Serve immediately with tortilla chips.\n## Time\nPrep: 8 min · Cook: 0 min`,

  "Nachos with Salsa": `## Ingredients\n- Corn Tortillas (4, cut and baked crispy)\n- Cheddar (150g)\n- Salsa (½ cup)\n- Jalapeños (1, sliced)\n- Sour Cream (4 tbsp)\n## Steps\n1. Spread tortilla chips on baking tray.\n2. Cover with cheddar.\n3. Scatter jalapeños.\n4. Bake at 200°C 8 min until cheese bubbles.\n5. Top with salsa and sour cream.\n## Time\nPrep: 5 min · Cook: 10 min`,

  "Black Bean Dip": `## Ingredients\n- Black Beans (400g)\n- Limes (1)\n- Cumin Seeds (1 tsp)\n- Garlic (2 cloves)\n- Coriander (handful)\n- Chilli Sauce (1 tbsp)\n## Steps\n1. Blend black beans with garlic, lime juice and cumin.\n2. Add chilli sauce.\n3. Season and blend until smooth.\n4. Top with coriander.\n5. Serve with tortilla chips.\n## Time\nPrep: 5 min · Cook: 3 min`,

  "Corn Salsa": `## Ingredients\n- Corn (2 cups)\n- Tomatoes (2, diced)\n- Onions (½, fine)\n- Coriander (handful)\n- Limes (1)\n- Jalapeños (1)\n## Steps\n1. Char corn in dry pan on high heat 3 min.\n2. Mix with tomato, onion and jalapeño.\n3. Add coriander and lime juice.\n4. Season and serve as dip or topping.\n## Time\nPrep: 8 min · Cook: 3 min`,

  "Mini Quesadillas": `## Ingredients\n- Corn Tortillas (8, small)\n- Cheddar (150g)\n- Black Beans (200g)\n- Salsa (4 tbsp)\n## Steps\n1. Warm tortillas.\n2. Layer beans and cheddar on half of each.\n3. Fold over.\n4. Cook in dry pan 1–2 min per side.\n5. Serve with salsa for dipping.\n## Time\nPrep: 3 min · Cook: 10 min`,
