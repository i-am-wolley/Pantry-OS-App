function _generateHouseholdCode() {
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no 0/O or 1/I
  var code = "";
  for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];

        _householdCode = cached;
        // Repair: re-sync householdCode back to Firestore so next login (any device) finds it.

function parseRecipeMD(md) {
  if (typeof md !== "string") return null;
  var out = { ingredients: [], steps: [], time: "" };
  var current = null;
  md.split("\n").forEach(function(raw){
    var l = raw.trim();
    if (/^#+\s*ingredients/i.test(l)) { current = "ingredients"; return; }
    if (/^#+\s*steps/i.test(l)) { current = "steps"; return; }
    if (/^#+\s*time/i.test(l)) { current = "time"; return; }
    if (!l) return;
    if (current === "ingredients") out.ingredients.push(l.replace(/^[-*]\s*/, ""));

  return (raw||[]).map(function(ing){

      var it = (items||[]).find(function(i){ return i.id === asNum || i.id === ing; });
      return it ? it.name : null;
    }
    var sl = normIngName2(ing);
    if (!sl) return null;

    // "Mint Leaves" -> "Mint", "Spring Onions" -> "Spring Onion", while avoiding loose

    var slWords = sl.split(/\s+/);

function getPantryCheckKey() {
  var now = new Date();
  var day = now.getDay();
  var sat = new Date(now);
  var daysBack = day === 6 ? 0 : day + 1;
  sat.setDate(sat.getDate() - daysBack);
  if (day === 6 && now.getHours() < 7) sat.setDate(sat.getDate() - 7);
  return sat.getFullYear() + '-' + (sat.getMonth() + 1) + '-' + sat.getDate();
}
function getWeekKey() {
  const d = new Date(),
    day = d.getDay(),
    sun = new Date(d);
  // On Saturday: key represents NEXT week (advance by 1 day to get to Sunday)
  if(day===6) sun.setDate(d.getDate() + 1);
  else sun.setDate(d.getDate() - day);
  return `${sun.getFullYear()}-${sun.getMonth() + 1}-${sun.getDate()}`;
}
function getDayName(offset = 0) {
  const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return {
    name: days[d.getDay()],
    date: d.toLocaleDateString("en-IN", {
      day: "numeric",
      month: "short"
    })
  };
}

  }

  // ── Derived ──
  const stockedItems = items.filter(i => i.type === "quantity" ? (stock[i.id] || 0) > 0 : stock[i.id] === true);
  const neededItems = items.filter(i => i.type === "quantity" ? !(stock[i.id] || 0) : !stock[i.id]);
  const stockedNames = stockedItems.map(i => i.name);
  const fruits = stockedItems.filter(i => i.cat === "fruit").map(i => i.name);
  const vegs = stockedItems.filter(i => i.cat === "veg").map(i => i.name);
  const haveCount = stockedItems.length;
  const today = getDayName(0);
  const tomorrow = getDayName(1);
  function dishIngredientsCovered(dish) {
    if (!dish.ingredients || dish.ingredients.length === 0) return true;
    const covered = dish.ingredients.filter(ing => stockedItems.some(si => si.name.toLowerCase() === ing.toLowerCase())).length;

  }

  // Items to show in summary based on filter
  const summaryItems = summaryFilter === "stocked" ? stockedItems : summaryFilter === "needed" ? neededItems : items;

  // Pantry groups (all items, no availability filter – pantry is just a list manager now)
  const pantryGroups = PANTRY_CATEGORIES.map(pc => ({
    ...pc,

  })).filter(g => g.items.length > 0);

  // ── Generate Menu ──
    async function generateMenu(overrides){
    setAiLoading(true); setAiError("");
    var _genMode = (overrides && overrides.genMode) || genMode;
    var _ignoreStock = (overrides && overrides.ignoreStock !== undefined) ? overrides.ignoreStock : ignoreStock;

    const DAY_NAMES=DAYS.slice(); // Sunday-first, matches getDay()
    const WEEKEND=["Saturday","Sunday"];
    const todayIdx=new Date().getDay();
    const isSaturday=todayIdx===6;
    const remainingDays=isSaturday ? DAY_NAMES.slice(0) : DAY_NAMES.slice(todayIdx);
    const todayName=DAY_NAMES[todayIdx];
    const STAPLE_PASS=new Set(["oil","cooking oil","salt","water","sugar","black pepper"]);

    function dishHasActiveAllergen(dish){
      if(!activeAllergens.length||!dish.ingredients||!dish.ingredients.length) return false;
      return dish.ingredients.some(function(ing){
        var als=ALLERGEN_MAP[(ing||"").toLowerCase().trim()]||[];
        return als.some(function(a){return activeAllergens.includes(a);});
      });
    }

    const stockedNameSet=new Set(stockedItems.map(function(i){return i.name.toLowerCase();}));
    function isFullyStocked(dish){
      if(_ignoreStock) return true; // ignore stock mode: all dishes eligible
      if(!dish.ingredients||dish.ingredients.length===0) return true;
      return dish.ingredients.every(function(ing){return stockedNameSet.has(ing.toLowerCase())||STAPLE_PASS.has(ing.toLowerCase());});
    }

    // Build locked plan skeleton
    var plan={};
    remainingDays.forEach(function(d){
      plan[d]={};
      mealCats.forEach(function(mc){
        var skelSrc=(nextMenu||menu);
        plan[d][mc]=(lockedDays&&lockedDays[d]&&skelSrc&&skelSrc.plan&&skelSrc.plan[d]&&skelSrc.plan[d][mc])?skelSrc.plan[d][mc]:null;
      });
    });

    // Build stock description — Any pantry uses all items; Stocked only uses stocked items
    var promptItems = _ignoreStock ? items : stockedItems;
    var stockByCat={};
    PANTRY_CATEGORIES.forEach(function(pc){
      var seen=new Set();
      var names=promptItems.filter(function(i){return i.cat===pc.id;}).map(function(i){return i.name;}).filter(function(n){
        var k=n.toLowerCase().trim(); if(seen.has(k))return false; seen.add(k); return true;
      });
      if(names.length) stockByCat[pc.label]=names;
    });
    var stockDesc=Object.entries(stockByCat).map(function(e){return e[0]+": "+e[1].join(", ");}).join("\n");
    var fruits=promptItems.filter(function(i){return i.cat==="fruit";}).map(function(i){return i.name;});
    var vegs=promptItems.filter(function(i){return i.cat==="veg";}).map(function(i){return i.name;});
    var dietFlags=Object.keys(dietary).filter(function(k){return dietary[k];});
    if(cuisines&&cuisines.includes("vegan")&&!dietFlags.includes("Vegan")) dietFlags=dietFlags.concat(["Vegan"]);
    if(cuisines&&cuisines.includes("vegan")&&!dietFlags.includes("Vegan")) dietFlags=dietFlags.concat(["Vegan"]);
    var macroLines=[];
    if(macros.calories>0)macroLines.push("cal:"+macros.calories);
    if(macros.protein>0)macroLines.push("prot:"+macros.protein+"g");
    if(macros.carbs>0)macroLines.push("carbs:"+macros.carbs+"g");
    if(macros.fat>0)macroLines.push("fat:"+macros.fat+"g");
    // Allergen exclusion line for AI prompts
    var allergenLine="";
    if(activeAllergens.length){
      var allergenLabels=activeAllergens.map(function(id){
        var al=ALLERGENS.find(function(a){return a.id===id;});
        return al?al.label+" ("+al.desc+")":id;
      });
      allergenLine="STRICT ALLERGEN EXCLUSIONS — do NOT use any of these or any ingredient containing them: "+allergenLabels.join(", ")+".\n";
    }
    // Stock constraint line for AI prompts
    var stockConstraintLine=!_ignoreStock?"STRICT STOCKED ONLY — use ONLY the exact ingredients listed in PANTRY. Do not suggest any ingredient not on that list.\n":"";

    if(_genMode==="allai"){
      // ALL AI: full AI for every non-locked slot
      if(!(apiKey || geminiKey)){ setAiError("No AI key. Go to Settings."); setAiLoading(false); return; }
      var tmpl=remainingDays.map(function(d){
        var slots=mealCats.map(function(mc){
          if(plan[d][mc]!==null) return '"'+mc+'":"'+plan[d][mc]+'"';
          var isWE=WEEKEND.includes(d);
          if(mc==="Snacks") return '"'+mc+'":"SNACK"';
          if((mc==="Lunch"||mc==="Dinner")&&isWE&&michelinWeekend) return '"'+mc+'":"MICHELIN_'+mc.toUpperCase()+'"';
          return '"'+mc+'":"AI_DISH"';
        });
        return '  "'+d+'":{'+slots.join(",")+'}';
      }).join(",\n");

      var sysAll=
        "You are a creative chef. Output ONLY valid JSON, no markdown, no preamble.\n"+
        "PLACEHOLDERS: AI_DISH=creative dish from pantry, SNACK=simple creative snack max 20min from pantry,\n"+
        "MICHELIN_LUNCH/MICHELIN_DINNER=Gourmet quality dish from pantry.\n"+
        "Use ONLY pantry ingredients listed. Staples: oil,salt,water,sugar,black pepper always available.\n"+
        "Every day needs fruit and vegetable. Respect meal slot appropriateness.\n"+
        allergenLine+
        stockConstraintLine+
        (cookTime>0?"Max cook time "+cookTime+"min for weekday meals.\n":"")+
        (dietFlags.length?"Diet: "+dietFlags.join(",")+"\n":"")+
        (macroLines.length?"Macros: "+macroLines.join(",")+"\n":"");

      var msgAll="PANTRY:\n"+stockDesc+"\nFRUITS:"+fruits.join(",")+" VEGS:"+vegs.join(",")+" TODAY:"+todayName+"\n\nFill all placeholders:\n{\n"+tmpl+"\n}";

      try{ await runStream(sysAll,msgAll,plan,remainingDays); }
      catch(e){ setAiError("Error: "+(e.message||"failed")); setAiLoading(false); return; }

    } else {
      // MIXED: inventory for non-AI slots, AI for selected slots

      // ── Step A: Compute which dishes were in the PREVIOUS menu ──
      var prevMenuNames=new Set();
      var prevMenuSource=(nextMenu||menu);
      if(prevMenuSource&&prevMenuSource.plan){
        Object.values(prevMenuSource.plan).forEach(function(dm){
          if(dm&&typeof dm==="object") Object.values(dm).forEach(function(v){if(v)prevMenuNames.add(v);});
        });
      }
      // dishesForGen: same as dishes but with correct lockedForMenu (prev menu = locked)
      var dishesForGen=dishes.map(function(d){
        return Object.assign({},d,{lockedForMenu: prevMenuNames.has(d.name)});
      });

      var excludeMap={};
      dishesForGen.forEach(function(d){ if(d.excludeWith&&d.excludeWith.length) excludeMap[d.name]=d.excludeWith; });
      var placedNames=[];
      var freqCount={};

      // ── Step B: dishCommit starts empty — filled on-demand when dishes are chosen ──
      // mustInclude: cluster logic commits remaining after winner picked
      // normal pool: committed when first chosen (if timesPerWeek>0)
      // timesPerWeek = "appear N times IF chosen" not "force in N times"
      var dishCommit={};

      var lastMenuNames=new Set();
      if(menu&&menu.plan){
        Object.values(menu.plan).forEach(function(dm){
          if(dm&&typeof dm==="object") Object.values(dm).forEach(function(v){if(v)lastMenuNames.add(v);});
        });
      }

      function pickFromInventory(dayName,mc){
        var isWE=WEEKEND.includes(dayName);
        var isMich=isWE&&michelinWeekend&&(mc==="Lunch"||mc==="Dinner");

        // ── 1. COMMITTED (timesPerWeek>0): run first, bypass lockedForMenu ──
        var committed=Object.keys(dishCommit).filter(function(n){return dishCommit[n]>0;});
        for(var ci=0;ci<committed.length;ci++){
          var cn=committed[ci];
          var cd=dishesForGen.find(function(d){return d.name===cn;});
          if(!cd) continue;
          var cdCats=Array.isArray(cd.mealCats)?cd.mealCats:[cd.mealCat||"Dinner"];
          if(!cdCats.includes(mc)) continue;
          if(!isFullyStocked(cd)) continue;
          if(dishHasActiveAllergen(cd)) continue;
          if(cd.weekendOnly===true&&!isWE) continue;
          if(cd.weekendOnly==="weekday"&&isWE) continue;
          if(cd.michelinLevel===true&&!isMich) continue;
          var blocked=false;
          for(var ei=0;ei<placedNames.length;ei++){
            if(excludeMap[placedNames[ei]]&&excludeMap[placedNames[ei]].includes(cn)){blocked=true;break;}
            if(cd.excludeWith&&cd.excludeWith.includes(placedNames[ei])){blocked=true;break;}
          }
          if(blocked) continue;
          dishCommit[cn]--;
          if(dishCommit[cn]<=0) delete dishCommit[cn]; // clean up so it can't block must-include or normal pool
          freqCount[cn]=(freqCount[cn]||0)+1;
          placedNames.push(cn);
          return cn;
        }

        // ── 2. MUST-INCLUDE with mutual-exclusion cluster awareness ──
        // Skipped entirely in ignore-stock mode (don't force any dish in)
        if(!ignoreStock){
        // Step A: collect ALL eligible must-include candidates
        var mustCandidates=dishesForGen.filter(function(d){
          if(!d.mustInclude) return false;
          if(dishCommit[d.name]!==undefined) return false;
          if((freqCount[d.name]||0)>=1) return false;
          var cats=Array.isArray(d.mealCats)?d.mealCats:[d.mealCat||"Dinner"];
          if(!cats.includes(mc)) return false;
          if(d.weekendOnly===true&&!isWE) return false;
          if(d.weekendOnly==="weekday"&&isWE) return false;
          if(!isFullyStocked(d)) return false;
          if(dishHasActiveAllergen(d)) return false;
          var ings=(d.mustIncludeIngredients&&d.mustIncludeIngredients.length)
            ? d.mustIncludeIngredients
            : (d.mustIncludeIngredient?[d.mustIncludeIngredient]:[]);
          if(ings.length===0||!ings.some(function(ing){return stockedNameSet.has(ing.toLowerCase());})) return false;
          for(var i=0;i<placedNames.length;i++){
            if(excludeMap[placedNames[i]]&&excludeMap[placedNames[i]].includes(d.name)) return false;
            if(d.excludeWith&&d.excludeWith.includes(placedNames[i])) return false;
          }
          return true;
        });
        if(mustCandidates.length>0){
          // Step B: BFS connected-components — cluster dishes that mutually exclude each other
          var cNames=mustCandidates.map(function(d){return d.name;});
          var clusterOf={}; var clusters=[];
          cNames.forEach(function(n){clusterOf[n]=-1;});
          cNames.forEach(function(n){
            if(clusterOf[n]!==-1) return;
            var cluster=[]; var queue=[n];
            while(queue.length){
              var cur=queue.shift();
              if(clusterOf[cur]!==-1) continue;
              cluster.push(cur);
              clusterOf[cur]=clusters.length;
              var curDish=dishesForGen.find(function(d){return d.name===cur;});
              cNames.forEach(function(other){
                if(clusterOf[other]!==-1) return;
                var otherDish=dishesForGen.find(function(d){return d.name===other;});
                var connected=
                  (curDish&&curDish.excludeWith&&curDish.excludeWith.includes(other))||
                  (otherDish&&otherDish.excludeWith&&otherDish.excludeWith.includes(cur))||
                  (excludeMap[cur]&&excludeMap[cur].includes(other))||
                  (excludeMap[other]&&excludeMap[other].includes(cur));
                if(connected) queue.push(other);
              });

            clusters.push(cluster);
          });
          // Step C: from each cluster pick the dish with lowest suggestedCount
          // Shuffle cluster first so iteration order has no bias, then pick min count

          });

            var mustRemaining=(must.timesPerWeek||0)-1;

          }
        }

        } // end if(!ignoreStock) for must-include

        // ── 3. NORMAL eligible pool (timesPerWeek=0 dishes only, max 1 each) ──
        var eligible=dishesForGen.filter(function(d){
          if(dishCommit[d.name]!==undefined) return false; // committed dishes handled above
          var cats=Array.isArray(d.mealCats)?d.mealCats:[d.mealCat||"Dinner"];

          if(!isFullyStocked(d)) return false;

          if(d.weekendOnly==="weekday"&&isWE) return false;

            var cats=Array.isArray(d.mealCats)?d.mealCats:[d.mealCat||"Dinner"];
            if(!cats.includes(mc)) return false;
            if(!d.lockedForMenu) return false;
            if(d.weekendOnly===true&&!isWE) return false;
            if(d.weekendOnly==="weekday"&&isWE) return false;
            if(!isFullyStocked(d)) return false;
            if(dishHasActiveAllergen(d)) return false;
            if((freqCount[d.name]||0)>=1) return false;
            for(var i=0;i<placedNames.length;i++){
              if(d.name===placedNames[i]) return false;
              if(excludeMap[placedNames[i]]&&excludeMap[placedNames[i]].includes(d.name)) return false;
              if(d.excludeWith&&d.excludeWith.includes(placedNames[i])) return false;
            }
            return true;
          }));
          if(lockedPool[0]){
            var lc=lockedPool[0];
            freqCount[lc.name]=(freqCount[lc.name]||0)+1;

            return lc.name;
          }
        }
        return "";
      }


      // Fill non-AI slots; unfillable inventory slots → AI fallback
      var aiSlotsNeeded=[];
      var aiFallbackSlots=[];
      remainingDays.forEach(function(d){
        mealCats.forEach(function(mc){
          if(plan[d][mc]!==null) return;

          if(aiSlotSel&&aiSlotSel[key]){

          } else {

          }
        });

      if(aiSlotsNeeded.length>0 && aiEnabled && (apiKey || geminiKey)){

        var aiTmpl="{\n"+aiSlotsNeeded.map(function(s){
          var isWE=WEEKEND.includes(s.day);
          var isMich=isWE&&michelinWeekend&&(s.mc==="Lunch"||s.mc==="Dinner");
          var ph=isMich?"MICHELIN_"+s.mc.toUpperCase():(s.mc==="Snacks"?"SNACK":(s.isUserAI?"AI_DISH":"PANTRY_FALLBACK"));

        var sysMix=
          "You are a creative chef. Output ONLY valid JSON, no markdown, no preamble.\n"+

          (hasFallback?"PANTRY_FALLBACK slots: use ONLY the exact ingredients listed. Zero creativity outside pantry.\n":"")+
          "Use ONLY pantry ingredients listed below. Staples (oil,salt,water,sugar,pepper) always available.\n"+

          stockConstraintLine+

          (cookTime>0?"Max cook: "+cookTime+"min.\n":"")+
          (dietFlags.length?"Diet: "+dietFlags.join(",")+"\n":"")+
          (macroLines.length?"Macros: "+macroLines.join(",")+"\n":"");

        var msgMix="PANTRY:\n"+stockDesc+"\nFRUITS:"+fruits.join(",")+" VEGS:"+vegs.join(",")+" TODAY:"+todayName+"\n\n"+aiTmpl;

        try{
          // Stream and parse day___mc format
          var aiResult=(await callAI({system:sysMix,prompt:msgMix,maxTokens:4000,stream:true})).json;
          aiSlotsNeeded.forEach(function(s){
            var k=s.day+"___"+s.mc;
            if(aiResult&&aiResult[k]&&typeof aiResult[k]==="string"&&aiResult[k]){
              plan[s.day][s.mc]=aiResult[k];
            } else {
              plan[s.day][s.mc]=pickFromInventory(s.day,s.mc); // fallback
            }
          });
        }catch(e){
          setAiError("AI slot error: "+(e.message||"failed")+". Using inventory fallback.");
          aiSlotsNeeded.forEach(function(s){ plan[s.day][s.mc]=pickFromInventory(s.day,s.mc); });
        }
      }
    }

    // ── Fetch ingredients for AI-generated dishes (batch call) ──
    if(apiKey || geminiKey){
      var dishNameSet3=new Set(dishes.map(function(d){return d.name;}));
      var aiDishNames=[];
      Object.values(plan).forEach(function(dayPlan){
        if(!dayPlan||typeof dayPlan!=="object") return;
        Object.values(dayPlan).forEach(function(name){
          if(name && !dishNameSet3.has(name) && !(name in aiDishIngredients)){
            aiDishNames.push(name);
          }
        });
      });
      // Deduplicate
      aiDishNames=[...new Set(aiDishNames)];
      if(aiDishNames.length>0){
        try{
          // Build id→name map so Claude returns IDs (100% match, no string drift)
          var STAPLE_SET=new Set(["oil","cooking oil","salt","water","sugar","black pepper","ghee","butter"]);
          var nonStapleItems=items.filter(function(it){
            return !STAPLE_SET.has(it.name.toLowerCase().trim());
          });
          var pantryIdMap={};
          nonStapleItems.forEach(function(it){ pantryIdMap[it.id]=it.name; });
          var pantryList=nonStapleItems.map(function(it){return it.id+":"+it.name;}).join(", ");
          var ingPrompt=
            "Pantry items (id:name):\n"+pantryList+"\n\n"+
            "For each dish below, return the IDs of pantry items needed to make it.\n"+
            "Return ONLY valid JSON, no markdown: {\"dish name\": [id1, id2, ...]}\n"+
            "Use ONLY the numeric IDs from the list above. Omit staples.\n"+
            "Dishes: "+aiDishNames.join(", ");
          var ingResult=(await callAI({
            system:"You are a culinary assistant. Output ONLY valid JSON with numeric IDs. No markdown, no preamble.",
            prompt:ingPrompt,maxTokens:4000,stream:true})).json;
          if(ingResult && typeof ingResult==="object"){
            // Store as {dishName: [itemId, ...]} — IDs guaranteed to match pantry
            var mapped={};
            Object.keys(ingResult).forEach(function(dishName){
              var ids=ingResult[dishName];
              if(Array.isArray(ids)){
                // Validate each ID exists in pantry
                var validIds=ids.filter(function(id){
                  return pantryIdMap[id]!==undefined || pantryIdMap[Number(id)]!==undefined;
                }).map(function(id){return Number(id)||id;});
                mapped[dishName]=validIds; // always store, even [] — marks as "fetched, no pantry matches"
              }
            });
            setAiDishIngredients(function(prev){return Object.assign({},prev,mapped);});
          }
        }catch(e){ /* silent fail — shopping list just won't show AI ingredients */ }
      }
    }

    var newMenu={weekKey:getWeekKey(),plan:plan,generatedOnSaturday:isSaturday||false};
    if(isSaturday){
      // Saturday: store as NEXT week's menu — don't overwrite current week
      setNextMenu(newMenu);
      // Stamp lastAutoGen so the "missed Saturday" popup doesn't fire on Sunday
      // for menus generated manually (not just by the auto-scheduler)
      setLastAutoGen(newMenu.weekKey);
      // Do NOT clear confirmedDays — current week's confirmed state must stay intact
    } else {
      setMenu(newMenu);
      setNextMenu(null); // clear any leftover next-week plan
      setConfirmedDays({}); // flush confirmed state — new current week menu
    }
    // After generate: update lockedForMenu — dishes in NEW menu=true, rest=false

  // ── Shared: stream API call, return parsed JSON object ──
  function repairAndParse(str) {
    if(!str) return null;
    str = str.trim();
    // Strip markdown code fences
    str = str.replace(/^```[a-z]*\n?/i, '').replace(/```$/,'').trim();
    // Try direct parse first
    try { return JSON.parse(str); } catch(_) {}
    // Find first { and last } to extract JSON object
    var start = str.indexOf('{');
    var end = str.lastIndexOf('}');
    if(start < 0 || end < 0) return null;
    str = str.slice(start, end+1);
    try { return JSON.parse(str); } catch(_) {}
    // Attempt to fix common issues: trailing commas, unquoted values
    str = str.replace(/,\s*([}\]])/g, '$1');
    try { return JSON.parse(str); } catch(_) {}
    return null;
  }

  async function callGemini({ system, prompt, maxTokens }) {
    var fullPrompt = system ? system + "\n\n" + prompt : prompt;
    var body = JSON.stringify({
      contents: [{ parts: [{ text: fullPrompt }] }],
      generationConfig: { maxOutputTokens: maxTokens }
    });
    var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + geminiKey;
    var maxAttempts = 3;
    for (var attempt = 1; attempt <= maxAttempts; attempt++) {
      var res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: body });
      if (res.status === 429) {
        if (attempt < maxAttempts) {
          var errData = await res.json().catch(function(){ return {}; });
          var retryDelay = 15;
          try {
            var details = (errData.error && errData.error.details) || [];
            for (var i = 0; i < details.length; i++) {
              if (details[i].retryDelay) { retryDelay = parseInt(details[i].retryDelay) || 15; break; }
            }
          } catch(_) {}
          await new Promise(function(r){ setTimeout(r, (retryDelay + 1) * 1000); });
          continue;
        }
        throw new Error("Gemini rate limit hit. Wait a moment and try again (free tier: 15 req/min).");
      }
      if (!res.ok) throw new Error("Gemini " + res.status + ": " + res.statusText);
      var data = await res.json();
      var text = ((data.candidates || [])[0]?.content?.parts || []).map(function(p){ return p.text || ""; }).join("").trim();
      return { text: text, json: repairAndParse(text) };
    }
  }

  async function callAI({ system, prompt, maxTokens, stream = false }) {
    if (geminiKey && !apiKey) return callGemini({ system, prompt, maxTokens });
    if (!apiKey && !geminiKey) throw new Error("No AI key set. Add a Gemini or Claude key in Settings.");
    var body = {
      model: modelName, max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }]
    };
    if (system) body.system = system;
    if (stream) body.stream = true;
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json", "x-api-key": apiKey,
        "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      var err = await res.json().catch(function() { return {}; });
      throw new Error("API " + (res.status) + ": " + ((err.error && err.error.message) || res.statusText));
    }
    var text = "", inputTok = 0, outputTok = 0;
    if (stream) {
      var reader = res.body.getReader(); var decoder = new TextDecoder();
      var streamDone = false;
      while (true) {
        var rr; try { rr = await reader.read(); } catch(_) { break; }
        if (rr.done) break;
        var lines = decoder.decode(rr.value, { stream: true }).split("\n");
        for (var li = 0; li < lines.length; li++) {
          var line = lines[li];
          if (!line.startsWith("data: ")) continue;
          var sseData = line.slice(6).trim();
          if (!sseData) continue;
          if (sseData === "[DONE]") { streamDone = true; continue; }
          try {
            var evt = JSON.parse(sseData);
            if (evt.type === "content_block_delta" && evt.delta && evt.delta.text) text += evt.delta.text;
            if (evt.type === "message_delta" && evt.usage) outputTok = evt.usage.output_tokens || 0;
            if (evt.type === "message_start" && evt.message && evt.message.usage) inputTok = evt.message.usage.input_tokens || 0;
            if (evt.type === "message_stop") streamDone = true;
          } catch(_) {}
        }
        if (streamDone) break;
      }
      try { reader.cancel(); } catch(_) {}
    } else {
      var respData = await res.json();
      text = (respData.content || []).map(function(b) { return b.text || ""; }).join("").trim();
      inputTok = (respData.usage && respData.usage.input_tokens) || 0;
      outputTok = (respData.usage && respData.usage.output_tokens) || 0;
    }
    // $0.80/M input, $4.00/M output (claude-haiku-4-5 rates)
    var callCost = (inputTok * 0.8 + outputTok * 4) / 1000000;
    setApiCost(function(prev) { return Math.round((prev + callCost) * 1000000) / 1000000; });
    return { text: text, json: repairAndParse(text) };
  }

      const todayIdx = now.getDay(); // 0=Sun, 6=Sat

          if (idx >= todayIdx) return; // only past days
          if (confirmedDays && confirmedDays[dayName]) return; // already confirmed
          if (!activeMenu.plan[dayName] || Object.keys(activeMenu.plan[dayName]).length === 0) return;
          const dayPlan = activeMenu.plan[dayName];

          if (allDineOut) return;

          if (beforeReset && satHasPlan && satNotConfirmed && satNotAllDineOut) {

      }
      
      // ── Check 2: Saturday midnight auto-generation ──
      const hour = now.getHours();
      const minute = now.getMinutes();
      const isSaturday = todayIdx === 6;
      const isMidnightWindow = hour === 0 && minute >= 1 && minute <= 10;
      
      // Saturday: trigger any time during the day, not just midnight window

  // ── Auto-reset menu at Sunday 00:30 AM (gives scheduler time to confirm Saturday) ──
  useEffect(() => {
    if (!loaded) return;
    function scheduleWeekReset() {
      const now = new Date();
      // Next Sunday midnight
      const daysUntilSun = (now.getDay() === 0 && (now.getHours() > 0 || now.getMinutes() >= 30)) ? 7 : (now.getDay() === 0 ? 0 : 7 - now.getDay());
      const target = new Date(now);
      target.setDate(now.getDate() + daysUntilSun);
      target.setHours(0, 30, 0, 0); // 00:30 — gives scheduler 30min to confirm Saturday
      const msUntil = target - now;
      return setTimeout(() => {
        // If nextMenu exists (generated on Saturday), promote it → menu
        // Keep lockedDays and confirmedDays — they belong to the new week
        var storedNextMenu = null;
        try {
          var snm = storage.get(SK.nextMenu);
          if (snm) storedNextMenu = JSON.parse(snm);
        } catch(e) {}
        if (storedNextMenu) {
          // Promote next week's plan to current
          setMenu(storedNextMenu);
          storage.set(SK.menu, JSON.stringify(storedNextMenu));
          setNextMenu(null);
          storage.remove(SK.nextMenu);
          // Clear lockedDays and confirmedDays — they belong to the old week
          setLockedDays({});
          storage.remove(SK.lockedDays);
          setConfirmedDays({});
          storage.remove(SK.confirmedDays);
          // Keep nutrition — belongs to the promoted plan
        } else {
          // No pre-generated plan — blank slate
          setMenu(null);
          storage.remove(SK.menu);
          setLockedDays({});
          storage.remove(SK.lockedDays);
          setNutrition({}); // only clear nutrition when no plan carried over
        }
      }, msUntil);
    }
    const t = scheduleWeekReset();
    return () => clearTimeout(t);
  }, [loaded]);
